name: "Vercel Deploy"
description: "Deploy to Vercel with reusable configuration"

outputs:
  url:
    description: "The deployment URL"
    value: ${{ steps.deploy.outputs.url }}
  deployment-id:
    description: "The GitHub deployment ID (for finishing deployment later)"
    value: ${{ steps.deployment.outputs.deployment_id }}
  deployment-env:
    description: "The GitHub deployment environment name"
    value: ${{ steps.deployment.outputs.env }}

inputs:
  vercel-token:
    description: "Vercel authentication token"
    required: true
  vercel-org-id:
    description: "Vercel organization ID"
    required: true
  vercel-project-id:
    description: "Vercel project ID"
    required: true
  environment:
    description: "Deployment environment (preview or production)"
    required: false
    default: "preview"
  environment-variables:
    description: "Environment variables for deployment (key=value pairs, one per line)"
    required: false
    default: ""
  environment-file:
    description: "Path to a file containing environment variables (key=value pairs, one per line)"
    required: false
    default: ""
  meta-branch:
    description: "Branch name for metadata"
    required: false
    default: ""
  meta-pr:
    description: "PR number for metadata"
    required: false
    default: ""
  deployment-env:
    description: "Deployment environment name (e.g., web, platform)"
    required: true
  skip-start:
    description: "Skip creating the GitHub Deployment record (use when the downstream promote job will own its own record)"
    required: false
    default: "false"
  skip-finish:
    description: "Skip finishing the deployment (use when you need to set a custom env_url later)"
    required: false
    default: "false"
  prebuilt:
    description: "Build locally and deploy prebuilt artifacts (skips remote build on Vercel)"
    required: false
    default: "false"
  prebuilt-build-command:
    description: "Optional command that produces .vercel/output for prebuilt deployments. Defaults to vercel build."
    required: false
    default: ""
  skip-domain:
    description: "Produce a Staged production deployment that is prod-eligible but not yet serving traffic (requires prebuilt=true and environment=production). Promote later via vercel-promote."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Start deployment
      id: deployment
      if: inputs.skip-start != 'true'
      uses: bobheadxi/deployments@v1
      with:
        step: start
        token: ${{ github.token }}
        env: ${{ inputs.environment == 'production' && format('{0}/production', inputs.deployment-env) || format('{0}/preview/{1}', inputs.deployment-env, inputs.meta-branch || github.head_ref || github.ref_name) }}
        ref: ${{ github.head_ref && format('refs/heads/{0}', github.head_ref) || github.ref }}
        desc: Deploying ${{ inputs.environment }} environment

    - name: Setup Vercel
      uses: ./.github/actions/vercel-setup
      with:
        vercel-token: ${{ inputs.vercel-token }}
        vercel-org-id: ${{ inputs.vercel-org-id }}
        vercel-project-id: ${{ inputs.vercel-project-id }}

    - name: Build and Deploy to Vercel
      id: deploy
      shell: bash
      env:
        INPUT_ENV_VARS: ${{ inputs.environment-variables }}
        INPUT_ENV_FILE: ${{ inputs.environment-file }}
        INPUT_PREBUILT: ${{ inputs.prebuilt }}
        INPUT_PREBUILT_BUILD_COMMAND: ${{ inputs.prebuilt-build-command }}
        INPUT_SKIP_DOMAIN: ${{ inputs.skip-domain }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        INPUT_VERCEL_TOKEN: ${{ inputs.vercel-token }}
        INPUT_META_BRANCH: ${{ inputs.meta-branch }}
        INPUT_META_PR: ${{ inputs.meta-pr }}
      run: |
        env_lines() {
          if [ -n "$INPUT_ENV_FILE" ]; then
            cat "$INPUT_ENV_FILE"
          fi
          if [ -n "$INPUT_ENV_VARS" ]; then
            printf '%s\n' "$INPUT_ENV_VARS"
          fi
        }

        if [ "$INPUT_SKIP_DOMAIN" == "true" ]; then
          if [ "$INPUT_PREBUILT" != "true" ] || [ "$INPUT_ENVIRONMENT" != "production" ]; then
            echo "::error::skip-domain=true requires prebuilt=true and environment=production (got prebuilt=$INPUT_PREBUILT, environment=$INPUT_ENVIRONMENT)"
            exit 1
          fi
        fi

        if [ -n "$INPUT_ENV_FILE" ] && [ ! -f "$INPUT_ENV_FILE" ]; then
          echo "::error::environment-file does not exist: $INPUT_ENV_FILE"
          exit 1
        fi

        if [ "$INPUT_PREBUILT" == "true" ]; then
          # === Prebuilt mode: build locally, deploy artifacts only ===

          # Export environment variables for local build
          if [ -n "$INPUT_ENV_FILE" ] || [ -n "$INPUT_ENV_VARS" ]; then
            echo "Exporting environment variables for local build..."
            while IFS= read -r line; do
              line=$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              if [ -n "$line" ]; then
                KEY="${line%%=*}"
                VALUE="${line#*=}"
                echo "Exporting env: $KEY"
                export "$KEY=$VALUE"
              fi
            done < <(env_lines)
          fi

          if [ -n "$INPUT_PREBUILT_BUILD_COMMAND" ]; then
            echo "Building prebuilt output with custom command..."
            bash -euo pipefail -c "$INPUT_PREBUILT_BUILD_COMMAND"
          else
            # Build locally using Vercel CLI
            echo "Building locally with vercel build..."
            BUILD_ARGS=(build "--token=$INPUT_VERCEL_TOKEN")
            if [ "$INPUT_ENVIRONMENT" == "production" ]; then
              BUILD_ARGS+=(--prod)
            fi
            vercel "${BUILD_ARGS[@]}"
          fi

          if [ ! -f .vercel/output/config.json ]; then
            echo "::error::prebuilt deployment requires .vercel/output/config.json"
            exit 1
          fi

          # Deploy prebuilt artifacts (no remote build)
          echo "Deploying prebuilt artifacts..."
          DEPLOY_ARGS=(deploy --prebuilt --archive=tgz "--token=$INPUT_VERCEL_TOKEN")

          if [ "$INPUT_ENVIRONMENT" == "production" ]; then
            DEPLOY_ARGS+=(--prod)
          fi

          if [ "$INPUT_SKIP_DOMAIN" == "true" ]; then
            DEPLOY_ARGS+=(--skip-domain)
          fi

          # Add runtime environment variables
          # NOTE: `--build-env` is required alongside `--env` even in prebuilt mode;
          # without it `vercel deploy --prebuilt` does not register these vars in the
          # deployment's runtime env, leaving `process.env.CRON_SECRET` (and every
          # other secret) undefined. This mirrors the standard-mode branch below.
          if [ -n "$INPUT_ENV_FILE" ] || [ -n "$INPUT_ENV_VARS" ]; then
            echo "Adding runtime environment variables..."
            while IFS= read -r line; do
              line=$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              if [ -n "$line" ]; then
                KEY="${line%%=*}"
                VALUE="${line#*=}"
                echo "Adding runtime env: $KEY"
                DEPLOY_ARGS+=(--build-env "$KEY=$VALUE" --env "$KEY=$VALUE")
              fi
            done < <(env_lines)
          fi
        else
          # === Standard mode: remote build on Vercel ===
          DEPLOY_ARGS=(deploy --archive=tgz "--token=$INPUT_VERCEL_TOKEN")

          if [ "$INPUT_ENVIRONMENT" == "production" ]; then
            DEPLOY_ARGS+=(--prod)
          fi

          # Add environment variables for both build-time and runtime
          if [ -n "$INPUT_ENV_FILE" ] || [ -n "$INPUT_ENV_VARS" ]; then
            echo "Adding environment variables for build and runtime..."
            while IFS= read -r line; do
              line=$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              if [ -n "$line" ]; then
                KEY="${line%%=*}"
                VALUE="${line#*=}"
                echo "Adding env: $KEY"
                DEPLOY_ARGS+=(--build-env "$KEY=$VALUE" --env "$KEY=$VALUE")
              fi
            done < <(env_lines)
          fi
        fi

        # Add metadata if provided
        if [ -n "$INPUT_META_BRANCH" ]; then
          DEPLOY_ARGS+=(--meta "branch=$INPUT_META_BRANCH")
        fi

        if [ -n "$INPUT_META_PR" ]; then
          DEPLOY_ARGS+=(--meta "pr=$INPUT_META_PR")
        fi

        # Execute deployment and capture URL
        echo "Executing deployment..."
        DEPLOYMENT_URL=$(vercel "${DEPLOY_ARGS[@]}")

        # Output the deployment URL
        echo "url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
        echo "Deployment URL: $DEPLOYMENT_URL"

    - name: Finish deployment
      uses: bobheadxi/deployments@v1
      if: always() && inputs.skip-start != 'true' && inputs.skip-finish != 'true'
      with:
        step: finish
        token: ${{ github.token }}
        status: ${{ job.status }}
        env: ${{ steps.deployment.outputs.env }}
        env_url: ${{ steps.deploy.outputs.url }}
        deployment_id: ${{ steps.deployment.outputs.deployment_id }}
