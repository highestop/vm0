name: Cloudflare Tunnel SSH

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        type: choice
        required: true
        options:
          - provision
          - deprovision
      host:
        description: "Target host (e.g. prod-1.aws.vm3.ai)"
        type: string
        required: true

jobs:
  tunnel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Uses direct SSH (not setup-ssh-tunnel) because this workflow
      # bootstraps the tunnel itself — the tunnel doesn't exist yet.
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.AWS_METAL_RUNNER_SSH_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          echo "$SSH_KEY" > "$HOME/.ssh/runner.pem"
          chmod 600 "$HOME/.ssh/runner.pem"
          {
            echo "Host *.vm3.ai"
            echo "  StrictHostKeyChecking no"
            echo "  UserKnownHostsFile /dev/null"
            echo "  ConnectTimeout 10"
            echo "  IdentityFile $HOME/.ssh/runner.pem"
          } > "$HOME/.ssh/config"
          chmod 600 "$HOME/.ssh/config"

      - name: Run cloudflared-ssh.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TUNNEL_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_TUNNEL_ACCOUNT_ID }}
          ACTION: ${{ inputs.action }}
          HOST: ${{ inputs.host }}
          METAL_USER: ${{ vars.AWS_METAL_RUNNER_USER }}
        run: |
          scripts/cloudflared-ssh.sh "$ACTION" "$HOST" --user "$METAL_USER"
