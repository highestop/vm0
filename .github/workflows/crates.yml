name: Crates

on:
  pull_request:
    paths:
      - 'crates/**'
      - '.github/workflows/crates.yml'
  push:
    branches:
      - main
    paths:
      - 'crates/**'
      - '.github/workflows/crates.yml'

jobs:
  detect:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain-rust:20260203
    outputs:
      workflow-changed: ${{ steps.detect.outputs.workflow-changed }}
      ably-subscriber-changed: ${{ steps.detect.outputs.ably-subscriber-changed }}
      runner-changed: ${{ steps.detect.outputs.runner-changed }}
      guest-init-changed: ${{ steps.detect.outputs.guest-init-changed }}
      guest-download-changed: ${{ steps.detect.outputs.guest-download-changed }}
      guest-agent-changed: ${{ steps.detect.outputs.guest-agent-changed }}
      guest-mock-claude-changed: ${{ steps.detect.outputs.guest-mock-claude-changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed crates
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
          else
            BASE_REF="HEAD^"
          fi
          # In CI containers, the repo may be owned by a different user (host vs container).
          # Git 2.35.2+ rejects such repos unless marked as safe.
          git config --global --add safe.directory "$GITHUB_WORKSPACE" 2>/dev/null || true

          # Check if the workflow file itself changed
          if git diff --name-only "$BASE_REF" HEAD | grep -q "^\.github/workflows/crates\.yml$"; then
            echo "workflow-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "workflow-changed=false" >> "$GITHUB_OUTPUT"
          fi

          # scripts/crate-changed.sh: exit 0=changed, 1=not changed, 2+=error
          check_crate() {
            ./scripts/crate-changed.sh "$1" "$BASE_REF" && echo "$1-changed=true" >> "$GITHUB_OUTPUT" || {
              rc=$?; [ $rc -eq 1 ] && echo "$1-changed=false" >> "$GITHUB_OUTPUT" || exit $rc
            }
          }
          check_crate ably-subscriber
          check_crate runner
          check_crate guest-init
          check_crate guest-download
          check_crate guest-agent
          check_crate guest-mock-claude

  check:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain-rust:20260203
    needs: [detect]
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target

      - name: Check formatting
        run: |
          cd crates
          cargo fmt --all -- --check

      - name: Run clippy
        run: |
          cd crates
          cargo clippy --all-targets --all-features

      - name: Run tests
        run: |
          cd crates
          cargo test --all-targets

      - name: Run ably-subscriber smoke test
        if: |
          needs.detect.outputs.ably-subscriber-changed == 'true' ||
          needs.detect.outputs.workflow-changed == 'true'
        env:
          ABLY_API_KEY: ${{ secrets.ABLY_API_KEY }}
        run: |
          cd crates
          cargo run -p ably-subscriber --example smoke_test

  runner-build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain-rust:20260203
    needs: [detect]
    if: |
      needs.detect.outputs.workflow-changed == 'true' ||
      needs.detect.outputs.runner-changed == 'true' ||
      needs.detect.outputs.guest-init-changed == 'true' ||
      needs.detect.outputs.guest-download-changed == 'true' ||
      needs.detect.outputs.guest-agent-changed == 'true' ||
      needs.detect.outputs.guest-mock-claude-changed == 'true'
    timeout-minutes: 20
    outputs:
      host: ${{ steps.host.outputs.host }}
      job-ref: ${{ steps.host.outputs.job-ref }}
      rootfs-hash: ${{ steps.build.outputs.rootfs-hash }}
      snapshot-hash: ${{ steps.build.outputs.snapshot-hash }}
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target
          key: aarch64-musl

      - name: Cross-compile runner and guest binaries for ARM64
        run: |
          cd crates
          cargo build --release --target aarch64-unknown-linux-musl \
            -p runner -p guest-init -p guest-download -p guest-agent -p guest-mock-claude

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.AWS_METAL_RUNNER_SSH_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          echo "$SSH_KEY" > "$HOME/.ssh/runner.pem"
          chmod 600 "$HOME/.ssh/runner.pem"

      - name: Select metal host
        id: host
        env:
          METAL_HOSTS: ${{ secrets.AWS_METAL_RUNNER_HOSTS }}
          JOB_REF: ${{ github.event_name == 'pull_request' && format('pr-{0}-test', github.event.pull_request.number) || 'main-test' }}
        run: |
          NUM_HOSTS=$(echo "$METAL_HOSTS" | tr ',' '\n' | wc -l)
          HASH=$(echo -n "$JOB_REF" | md5sum | cut -c1-8)
          HOST_INDEX=$(( 0x$HASH % NUM_HOSTS ))
          HOST=$(echo "$METAL_HOSTS" | tr ',' '\n' | sed -n "$((HOST_INDEX + 1))p")
          echo "host=${HOST}" >> "$GITHUB_OUTPUT"
          echo "job-ref=${JOB_REF}" >> "$GITHUB_OUTPUT"
          echo "Selected metal host: ${HOST} (index ${HOST_INDEX}/${NUM_HOSTS})"

      - name: Deploy and build on metal host
        id: build
        env:
          METAL_USER: ${{ vars.AWS_METAL_RUNNER_USER }}
          HOST: ${{ steps.host.outputs.host }}
          JOB_REF: ${{ steps.host.outputs.job-ref }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -i $HOME/.ssh/runner.pem"
          REMOTE="${METAL_USER}@${HOST}"
          BIN_DIR="~/.vm0-runner/bin/${JOB_REF}"
          TARGET_DIR="crates/target/aarch64-unknown-linux-musl/release"

          # Clean previous run artifacts and upload binaries
          echo "=== Deploying binaries to ${HOST}:${BIN_DIR} ==="
          ssh $SSH_OPTS $REMOTE "rm -rf ${BIN_DIR} ~/.vm0-runner/runners/${JOB_REF}-bench ~/.vm0-runner/runners/${JOB_REF}-local && mkdir -p ${BIN_DIR}"
          for bin in runner guest-init guest-download guest-agent guest-mock-claude; do
            scp $SSH_OPTS "${TARGET_DIR}/${bin}" "${REMOTE}:${BIN_DIR}/"
          done

          # Run setup (downloads firecracker/kernel/mitmdump, cached + idempotent)
          echo "=== Running setup ==="
          ssh $SSH_OPTS $REMOTE "${BIN_DIR}/runner setup"

          # Run build (rootfs via Docker + snapshot via Firecracker)
          echo "=== Running build ==="
          BUILD_OUTPUT=$(ssh $SSH_OPTS $REMOTE "${BIN_DIR}/runner build \
            --guest-init ${BIN_DIR}/guest-init \
            --guest-download ${BIN_DIR}/guest-download \
            --guest-agent ${BIN_DIR}/guest-agent \
            --guest-mock-claude ${BIN_DIR}/guest-mock-claude")
          ROOTFS_HASH=$(echo "$BUILD_OUTPUT" | grep '^rootfs_hash=' | cut -d= -f2)
          SNAPSHOT_HASH=$(echo "$BUILD_OUTPUT" | grep '^snapshot_hash=' | cut -d= -f2)
          if [ -z "$ROOTFS_HASH" ] || [ -z "$SNAPSHOT_HASH" ]; then
            echo "ERROR: Failed to extract build hashes"
            exit 1
          fi
          echo "rootfs-hash=${ROOTFS_HASH}" >> "$GITHUB_OUTPUT"
          echo "snapshot-hash=${SNAPSHOT_HASH}" >> "$GITHUB_OUTPUT"

  runner-benchmark:
    runs-on: ubuntu-latest
    needs: [runner-build]
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.AWS_METAL_RUNNER_SSH_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          echo "$SSH_KEY" > "$HOME/.ssh/runner.pem"
          chmod 600 "$HOME/.ssh/runner.pem"

      - name: Run benchmark
        env:
          METAL_USER: ${{ vars.AWS_METAL_RUNNER_USER }}
          OFFICIAL_RUNNER_SECRET: ${{ secrets.OFFICIAL_RUNNER_SECRET }}
          HOST: ${{ needs.runner-build.outputs.host }}
          JOB_REF: ${{ needs.runner-build.outputs.job-ref }}
          ROOTFS_HASH: ${{ needs.runner-build.outputs.rootfs-hash }}
          SNAPSHOT_HASH: ${{ needs.runner-build.outputs.snapshot-hash }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -i $HOME/.ssh/runner.pem"
          REMOTE="${METAL_USER}@${HOST}"
          BIN_DIR="~/.vm0-runner/bin/${JOB_REF}"
          RUNNER_DIR="~/.vm0-runner/runners/${JOB_REF}-bench"

          echo "=== Generating config ==="
          ssh $SSH_OPTS $REMOTE "${BIN_DIR}/runner config \
            --rootfs-hash ${ROOTFS_HASH} \
            --snapshot-hash ${SNAPSHOT_HASH} \
            --name ${JOB_REF}-bench \
            --group vm0/development-${JOB_REF} \
            --runner-dirname ${JOB_REF}-bench \
            --api-url https://localhost \
            --token vm0_official_${OFFICIAL_RUNNER_SECRET}"

          echo "=== Running benchmark ==="
          ssh $SSH_OPTS $REMOTE "${BIN_DIR}/runner benchmark \
            --config ${RUNNER_DIR}/runner.yaml \
            'curl -sf --max-time 10 https://httpbin.org/get'"

  runner-upgrade-local:
    runs-on: ubuntu-latest
    needs: [runner-build]
    timeout-minutes: 5
    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.AWS_METAL_RUNNER_SSH_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          echo "$SSH_KEY" > "$HOME/.ssh/runner.pem"
          chmod 600 "$HOME/.ssh/runner.pem"

      - name: Run upgrade test
        env:
          METAL_USER: ${{ vars.AWS_METAL_RUNNER_USER }}
          OFFICIAL_RUNNER_SECRET: ${{ secrets.OFFICIAL_RUNNER_SECRET }}
          HOST: ${{ needs.runner-build.outputs.host }}
          JOB_REF: ${{ needs.runner-build.outputs.job-ref }}
          ROOTFS_HASH: ${{ needs.runner-build.outputs.rootfs-hash }}
          SNAPSHOT_HASH: ${{ needs.runner-build.outputs.snapshot-hash }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -i $HOME/.ssh/runner.pem"
          REMOTE="${METAL_USER}@${HOST}"
          BIN_DIR="~/.vm0-runner/bin/${JOB_REF}"
          GROUP="vm0/upgrade-${JOB_REF}"

          echo "=== Generating configs for runner A and B ==="
          for SUFFIX in upgrade-a upgrade-b; do
            ssh $SSH_OPTS $REMOTE "${BIN_DIR}/runner config \
              --rootfs-hash ${ROOTFS_HASH} \
              --snapshot-hash ${SNAPSHOT_HASH} \
              --name ${JOB_REF}-${SUFFIX} \
              --group ${GROUP} \
              --runner-dirname ${JOB_REF}-${SUFFIX} \
              --api-url https://localhost \
              --token vm0_official_${OFFICIAL_RUNNER_SECRET}"
          done

          echo "=== Running upgrade test ==="
          ssh $SSH_OPTS $REMOTE bash -s -- "${BIN_DIR}" "${JOB_REF}" "${GROUP}" <<'REMOTE_SCRIPT'
          BIN_DIR=$1; JOB_REF=$2; GROUP=$3
          RUNNER_DIR_A="$HOME/.vm0-runner/runners/${JOB_REF}-upgrade-a"
          RUNNER_DIR_B="$HOME/.vm0-runner/runners/${JOB_REF}-upgrade-b"

          cleanup() {
            kill $PID_A $PID_B 2>/dev/null || true
            wait $PID_A $PID_B 2>/dev/null || true
          }
          trap cleanup EXIT

          # Kill leftover runners from previous CI runs
          pkill -f "runner start.*${JOB_REF}-upgrade" 2>/dev/null || true
          sleep 1

          # 1. Start runner A
          echo "--- Starting runner A ---"
          USE_MOCK_CLAUDE=true "$BIN_DIR/runner" start \
            --local --config "$RUNNER_DIR_A/runner.yaml" \
            > "$RUNNER_DIR_A/local.log" 2>&1 &
          PID_A=$!
          sleep 2
          kill -0 $PID_A 2>/dev/null || { echo "ERROR: Runner A crashed"; cat "$RUNNER_DIR_A/local.log"; exit 1; }

          # 2. Submit job 1 (background, long-running) → only A running
          echo "--- Submit job 1 (only A, long-running) ---"
          "$BIN_DIR/runner" submit --group "$GROUP" --prompt 'sleep 12 && echo job1' &
          SUBMIT1_PID=$!
          sleep 3

          # 3. Start runner B while job 1 still in-flight on A
          echo "--- Starting runner B ---"
          USE_MOCK_CLAUDE=true "$BIN_DIR/runner" start \
            --local --config "$RUNNER_DIR_B/runner.yaml" \
            > "$RUNNER_DIR_B/local.log" 2>&1 &
          PID_B=$!
          sleep 2
          kill -0 $PID_B 2>/dev/null || { echo "ERROR: Runner B crashed"; cat "$RUNNER_DIR_B/local.log"; exit 1; }

          # 4. Submit job 2 (background, long-running) → A and B compete
          echo "--- Submit job 2 (A and B compete, long-running) ---"
          "$BIN_DIR/runner" submit --group "$GROUP" --prompt 'sleep 12 && echo job2' &
          SUBMIT2_PID=$!
          sleep 3

          # 5. Drain A while jobs may be in-flight
          echo "--- Draining runner A ---"
          kill -USR1 $PID_A 2>/dev/null

          # 6. Verify both jobs complete despite drain
          echo "--- Waiting for job 1 ---"
          wait $SUBMIT1_PID
          [ $? -eq 0 ] || { echo "ERROR: Job 1 failed"; cat "$RUNNER_DIR_A/local.log"; exit 1; }
          echo "--- Waiting for job 2 ---"
          wait $SUBMIT2_PID
          [ $? -eq 0 ] || { echo "ERROR: Job 2 failed"; cat "$RUNNER_DIR_A/local.log"; cat "$RUNNER_DIR_B/local.log"; exit 1; }

          # 7. Wait for A to exit
          wait $PID_A 2>/dev/null || true

          # 8. Submit job 3 → only B is left
          echo "--- Submit job 3 (only B) ---"
          "$BIN_DIR/runner" submit --group "$GROUP" --prompt 'echo job3'
          [ $? -eq 0 ] || { echo "ERROR: Job 3 failed"; cat "$RUNNER_DIR_B/local.log"; exit 1; }

          # 9. Drain B
          echo "--- Draining runner B ---"
          kill -USR1 $PID_B 2>/dev/null
          wait $PID_B 2>/dev/null || true
          trap - EXIT

          echo "=== Upgrade test passed ==="
          REMOTE_SCRIPT

  runner-cleanup:
    runs-on: ubuntu-latest
    needs: [runner-build, runner-benchmark, runner-upgrade-local]
    if: ${{ always() && needs.runner-build.result != 'skipped' }}
    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.AWS_METAL_RUNNER_SSH_KEY }}
        run: |
          mkdir -p "$HOME/.ssh"
          echo "$SSH_KEY" > "$HOME/.ssh/runner.pem"
          chmod 600 "$HOME/.ssh/runner.pem"

      - name: Cleanup
        env:
          METAL_USER: ${{ vars.AWS_METAL_RUNNER_USER }}
          HOST: ${{ needs.runner-build.outputs.host }}
          JOB_REF: ${{ needs.runner-build.outputs.job-ref }}
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 -i $HOME/.ssh/runner.pem"
          REMOTE="${METAL_USER}@${HOST}"
          BIN_DIR="~/.vm0-runner/bin/${JOB_REF}"
          echo "Cleaning up ${JOB_REF} on ${HOST}"
          ssh $SSH_OPTS $REMOTE "rm -rf ${BIN_DIR} ~/.vm0-runner/runners/${JOB_REF}-bench ~/.vm0-runner/runners/${JOB_REF}-upgrade-a ~/.vm0-runner/runners/${JOB_REF}-upgrade-b ~/.vm0-runner/groups/vm0/upgrade-${JOB_REF}" || true
