name: Docker Toolchain Build

on:
  pull_request:
    paths:
      - 'docker/toolchain/**'
      - '.github/workflows/docker-toolchain.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  toolchain:
    # Skip for release-please PRs (only version bumps and changelogs)
    if: "!startsWith(github.head_ref || '', 'release-please--branches--')"
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # `target: development` builds through `toolchain` and `toolchain-rust`
      # transitively, so this single step validates the entire Dockerfile.
      - name: Build development image
        uses: docker/build-push-action@v7
        with:
          context: ./docker/toolchain
          file: ./docker/toolchain/Dockerfile
          target: development
          platforms: ${{ matrix.platform }}
          push: false
          tags: vm0-dev:test
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
