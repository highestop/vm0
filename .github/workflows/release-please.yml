      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Install dependencies
        run: cd turbo && pnpm install --frozen-lockfile

      - name: Use latest npm for OIDC support
        run: npm install -g npm@latest

      - name: Build CLI
        run: cd turbo && pnpm --filter @vm0/cli build
        env:
          DEFAULT_SENTRY_DSN: ${{ vars.SENTRY_DSN_CLI }}

      - name: Publish to npm with OIDC
        run: cd turbo/apps/cli/dist && npm publish --access public

      - name: Calculate duration
        id: duration
        if: ${{ always() && steps.timer.outputs.start }}
        run: |
          elapsed=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          h=$((elapsed / 3600)) m=$(( (elapsed % 3600) / 60 )) s=$((elapsed % 60))
          if [ $h -gt 0 ]; then text="${h}h ${m}m ${s}s"
          elif [ $m -gt 0 ]; then text="${m}m ${s}s"
          else text="${s}s"; fi
          echo "text=$text" >> "$GITHUB_OUTPUT"

      - name: Notify Slack - Success
