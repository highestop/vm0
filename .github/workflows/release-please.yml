name: release-please

on:
  workflow_run:
    workflows: ["Turbo"]
    branches: ["main"]
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  packages: write
  checks: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      cli_release_created: ${{ steps.release.outputs['turbo/apps/cli--release_created'] }}
      web_release_created: ${{ steps.release.outputs['turbo/apps/web--release_created'] }}
      api_release_created: ${{ steps.release.outputs['turbo/apps/api--release_created'] }}
      app_release_created: ${{ steps.release.outputs['turbo/apps/platform--release_created'] }}
      runner_rs_release_created: ${{ steps.release.outputs['crates/runner--release_created'] }}
      runner_rs_version: ${{ steps.release.outputs['crates/runner--version'] }}
      web_version: ${{ steps.release.outputs['turbo/apps/web--version'] }}
      api_version: ${{ steps.release.outputs['turbo/apps/api--version'] }}
      app_version: ${{ steps.release.outputs['turbo/apps/platform--version'] }}
      cli_version: ${{ steps.release.outputs['turbo/apps/cli--version'] }}
    steps:
      - uses: vm0-ai/release-please-action@vm0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Create ci-gate check runs on release PR head commit.
      # GITHUB_TOKEN pushes don't trigger pull_request events, so the CI
      # workflows never run on the new commit. The Checks API with GITHUB_TOKEN
      # produces check runs with integration_id 15368 (GitHub Actions),
      # satisfying the required_status_checks ruleset.
      - name: Pass ci-gate checks for release PR
        if: ${{ steps.release.outputs.releases_created != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_HEAD=$(gh pr view release-please--branches--main --repo "${{ github.repository }}" --json headRefOid --jq .headRefOid 2>/dev/null || echo "")
          if [ -z "$PR_HEAD" ]; then
            echo "No release PR found, skipping"
            exit 0
          fi
          for gate in ci-gate-turbo ci-gate-crates ci-gate-security; do
            gh api repos/${{ github.repository }}/check-runs -X POST \
              -f name="$gate" \
              -f head_sha="$PR_HEAD" \
              -f status="completed" \
              -f conclusion="success" \
              -f "output[title]=Release PR — CI skipped" \
              -f "output[summary]=Release-please PRs only contain version bumps and changelogs."
            echo "✅ Created $gate check run on $PR_HEAD"
          done

  # Run database migrations in production (runs after builds-complete to reduce
  # downtime: builds stage first, then migrate, then promote traffic.)
  migrate-production:
    needs: [release-please, builds-complete]
    # always() prevents GitHub Actions from propagating "skipped" when upstream
    # build jobs (build-runner-production, etc.) are skipped. The explicit
    # builds-complete.result check gates on actual build success.
    if: >-
      always() &&
      needs.release-please.outputs.releases_created == 'true' &&
      needs.builds-complete.result == 'success'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260419
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/toolchain-init

      - name: Install neonctl
        run: npm install -g neonctl@2.15.0

      - name: Notify Slack - Starting
        id: slack-start
        if: ${{ vars.SLACK_RELEASE_CHANNEL_ID != '' }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            text: "*Database Migration* starting..."
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Database Migration* starting...\n📦 Version: `${{ needs.release-please.outputs.web_version }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/web-v${{ needs.release-please.outputs.web_version }}|View Release>"

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Create Production Migration Smoke Branch
        id: create-migration-smoke-branch
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          BRANCH_NAME: release-smoke/production-migration
        run: |
          if neonctl branches list --project-id "$NEON_PROJECT_ID" --output json | jq -e --arg name "$BRANCH_NAME" '.[] | select(.name == $name)' > /dev/null; then
            echo "Smoke branch $BRANCH_NAME already exists, resetting..."
            neonctl branches reset "$BRANCH_NAME" --project-id "$NEON_PROJECT_ID" --parent
          else
            echo "Creating smoke branch $BRANCH_NAME from production"
            neonctl branches create --name "$BRANCH_NAME" --parent production --project-id "$NEON_PROJECT_ID"
          fi

          echo "Waiting for smoke branch $BRANCH_NAME to become ready"
          CURRENT_STATE=""
          for i in $(seq 1 30); do
            CURRENT_STATE=$(neonctl branches list --project-id "$NEON_PROJECT_ID" --output json | jq -r --arg name "$BRANCH_NAME" '.[] | select(.name == $name) | .current_state')
            if [ "$CURRENT_STATE" = "ready" ]; then
              echo "Smoke branch ready"
              break
            fi
            echo "Smoke branch state: ${CURRENT_STATE:-missing} (attempt $i/30)"
            sleep 2
          done

          if [ "$CURRENT_STATE" != "ready" ]; then
            echo "::error::Smoke branch $BRANCH_NAME not ready after 60 seconds (state: ${CURRENT_STATE:-missing})"
            exit 1
          fi

      - name: Run Production Migration Smoke Test
        id: run-migration-smoke-test
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          BRANCH_NAME: release-smoke/production-migration
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}
        run: |
          echo "Getting pooled database URL for smoke branch $BRANCH_NAME"
          DATABASE_URL=$(neonctl connection-string "$BRANCH_NAME" --project-id "$NEON_PROJECT_ID" --database-name neondb --pooled)

          echo "Running production migration smoke test on $BRANCH_NAME"
          cd turbo
          DATABASE_URL="$DATABASE_URL" pnpm -F web db:migrate
          echo "Production migration smoke test completed"

      - name: Delete Production Migration Smoke Branch
        id: delete-migration-smoke-branch
        if: ${{ always() && steps.create-migration-smoke-branch.outcome != 'skipped' }}
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          BRANCH_NAME: release-smoke/production-migration
        run: |
          echo "Cleaning up smoke branch $BRANCH_NAME"
          BRANCHES_JSON=$(neonctl branches list --project-id "$NEON_PROJECT_ID" --output json)

          if echo "$BRANCHES_JSON" | jq -e --arg name "$BRANCH_NAME" '.[] | select(.name == $name)' > /dev/null; then
            neonctl branches delete "$BRANCH_NAME" --project-id "$NEON_PROJECT_ID"
            echo "Smoke branch $BRANCH_NAME deleted"
          else
            echo "Smoke branch $BRANCH_NAME does not exist; cleanup skipped"
          fi

      - name: Get Production Database URL
        id: get-db-url
        run: |
          # Get the production branch database URL.
          DATABASE_URL=$(neonctl connection-string production --project-id ${{ vars.NEON_PROJECT_ID }} --database-name neondb --pooled)
          echo "database-url=$DATABASE_URL" >> "$GITHUB_OUTPUT"
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

      - name: Run Production Migrations
        run: |
          echo "Running production migrations on production"
          cd turbo && pnpm -F web db:migrate
        env:
          DATABASE_URL: ${{ steps.get-db-url.outputs.database-url }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}

      - name: Calculate duration
        id: duration
        if: ${{ always() && steps.timer.outputs.start }}
        run: |
          elapsed=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          h=$((elapsed / 3600)) m=$(( (elapsed % 3600) / 60 )) s=$((elapsed % 60))
          if [ $h -gt 0 ]; then text="${h}h ${m}m ${s}s"
          elif [ $m -gt 0 ]; then text="${m}m ${s}s"
          else text="${s}s"; fi
          echo "text=$text" >> "$GITHUB_OUTPUT"

      - name: Notify Slack - Success
        if: ${{ success() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*Database Migration* ✅ Migration completed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Database Migration* ✅ Migration completed\n📦 Version: `${{ needs.release-please.outputs.web_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/web-v${{ needs.release-please.outputs.web_version }}|View Release>"

      - name: Notify Slack - Smoke Failure
        if: >-
          ${{
            failure() &&
            steps.slack-start.outputs.ts &&
            (
              steps.create-migration-smoke-branch.outcome == 'failure' ||
              steps.run-migration-smoke-test.outcome == 'failure' ||
              steps.delete-migration-smoke-branch.outcome == 'failure'
            )
          }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*Database Migration Smoke* ❌ Smoke check failed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Database Migration Smoke* ❌ Smoke check failed\n📦 Version: `${{ needs.release-please.outputs.web_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n⚠️ Production database migration was not run. The failure happened before the real production DB migration, on the Neon smoke branch `release-smoke/production-migration` or its cleanup.\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/web-v${{ needs.release-please.outputs.web_version }}|View Release>\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"

      - name: Notify Slack - Failure
        if: >-
          ${{
            failure() &&
            steps.slack-start.outputs.ts &&
            steps.create-migration-smoke-branch.outcome != 'failure' &&
            steps.run-migration-smoke-test.outcome != 'failure' &&
            steps.delete-migration-smoke-branch.outcome != 'failure'
          }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*Database Migration* ❌ Migration failed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Database Migration* ❌ Migration failed\n📦 Version: `${{ needs.release-please.outputs.web_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/web-v${{ needs.release-please.outputs.web_version }}|View Release>\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"

  # Build web app production deployment (Staged - prod-eligible, not serving traffic)
  build-web-production:
    needs: release-please
    if: ${{ needs.release-please.outputs.web_release_created == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260419
    outputs:
      deployment_url: ${{ steps.deploy.outputs.url }}
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init

      - name: Install neonctl
        run: npm install -g neonctl@2.15.0

      - name: Notify Slack - Starting
        id: slack-start
        if: ${{ vars.SLACK_RELEASE_CHANNEL_ID != '' }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            text: "*Web App* building staged production deployment..."
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Web App* building staged production deployment...\n📦 Version: `${{ needs.release-please.outputs.web_version }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/web-v${{ needs.release-please.outputs.web_version }}|View Release>"

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Get Production Database URL
        id: get-db-url
        run: |
          # Get the main branch database URL (production)
          DATABASE_URL=$(neonctl connection-string production --project-id ${{ vars.NEON_PROJECT_ID }} --database-name neondb --pooled)
          echo "database-url=$DATABASE_URL" >> "$GITHUB_OUTPUT"
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

      - name: Resolve Web production environment
        id: web-production-env
        uses: ./.github/actions/web-api-env
        with:
          app: web
          environment: production
          database-url: ${{ steps.get-db-url.outputs.database-url }}
          web-url: https://www.vm0.ai
          app-url: https://app.vm0.ai
          api-url: ${{ vars.VM0_API_URL }}
        env:
          REPO_VARS_JSON: ${{ toJSON(vars) }}
          REPO_SECRETS_JSON: ${{ toJSON(secrets) }}

      - name: Build Web Staged Production Deployment
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ vars.VERCEL_TEAM_ID }}
          vercel-project-id: ${{ vars.VERCEL_PROJECT_ID_WEB }}
          environment: production
          deployment-env: web
          prebuilt: "true"
          skip-domain: "true"
          skip-start: "true"
          skip-finish: "true"
          environment-file: ${{ steps.web-production-env.outputs.file }}

      - name: Calculate duration
        id: duration
        if: ${{ always() && steps.timer.outputs.start }}
        run: |
          elapsed=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          h=$((elapsed / 3600)) m=$(( (elapsed % 3600) / 60 )) s=$((elapsed % 60))
          if [ $h -gt 0 ]; then text="${h}h ${m}m ${s}s"
          elif [ $m -gt 0 ]; then text="${m}m ${s}s"
          else text="${s}s"; fi
          echo "text=$text" >> "$GITHUB_OUTPUT"

      - name: Notify Slack - Success
        if: ${{ success() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*Web App* ✅ Staged build ready (not yet serving)"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Web App* ✅ Staged build ready (not yet serving)\n📦 Version: `${{ needs.release-please.outputs.web_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/web-v${{ needs.release-please.outputs.web_version }}|View Release>"

      - name: Notify Slack - Failure
        if: ${{ failure() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*Web App* ❌ Staged build failed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Web App* ❌ Staged build failed\n📦 Version: `${{ needs.release-please.outputs.web_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/web-v${{ needs.release-please.outputs.web_version }}|View Release>\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"

  # Build API production deployment (Staged - prod-eligible, not serving traffic)
  build-api-production:
    needs: release-please
    if: ${{ needs.release-please.outputs.api_release_created == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260419
    outputs:
      deployment_url: ${{ steps.deploy.outputs.url }}
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init

      - name: Install neonctl
        run: npm install -g neonctl@2.15.0

      - name: Notify Slack - Starting
        id: slack-start
        if: ${{ vars.SLACK_RELEASE_CHANNEL_ID != '' }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            text: "*API* building staged production deployment..."
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*API* building staged production deployment...\n📦 Version: `${{ needs.release-please.outputs.api_version }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/api-v${{ needs.release-please.outputs.api_version }}|View Release>"

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Get Production Database URL
        id: get-db-url
        run: |
          DATABASE_URL=$(neonctl connection-string production --project-id ${{ vars.NEON_PROJECT_ID }} --database-name neondb --pooled)
          echo "database-url=$DATABASE_URL" >> "$GITHUB_OUTPUT"
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}

      - name: Resolve API production environment
        id: api-production-env
        uses: ./.github/actions/web-api-env
        with:
          app: api
          environment: production
          database-url: ${{ steps.get-db-url.outputs.database-url }}
          web-url: https://www.vm0.ai
          app-url: https://app.vm0.ai
          api-url: ${{ vars.VM0_API_URL }}
        env:
          REPO_VARS_JSON: ${{ toJSON(vars) }}
          REPO_SECRETS_JSON: ${{ toJSON(secrets) }}

      - name: Build API Staged Production Deployment
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ vars.VERCEL_TEAM_ID }}
          vercel-project-id: ${{ vars.VERCEL_PROJECT_ID_API }}
          environment: production
          deployment-env: api
          prebuilt: "true"
          prebuilt-build-command: |
            pnpm --dir turbo/apps/api build
            rm -rf .vercel/output
            cp -R turbo/apps/api/.vercel/output .vercel/output
          skip-domain: "true"
          skip-start: "true"
          skip-finish: "true"
          environment-file: ${{ steps.api-production-env.outputs.file }}

      - name: Calculate duration
        id: duration
        if: ${{ always() && steps.timer.outputs.start }}
        run: |
          elapsed=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          h=$((elapsed / 3600)) m=$(( (elapsed % 3600) / 60 )) s=$((elapsed % 60))
          if [ $h -gt 0 ]; then text="${h}h ${m}m ${s}s"
          elif [ $m -gt 0 ]; then text="${m}m ${s}s"
          else text="${s}s"; fi
          echo "text=$text" >> "$GITHUB_OUTPUT"

      - name: Notify Slack - Success
        if: ${{ success() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*API* ✅ Staged build ready (not yet serving)"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*API* ✅ Staged build ready (not yet serving)\n📦 Version: `${{ needs.release-please.outputs.api_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/api-v${{ needs.release-please.outputs.api_version }}|View Release>"

      - name: Notify Slack - Failure
        if: ${{ failure() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*API* ❌ Staged build failed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*API* ❌ Staged build failed\n📦 Version: `${{ needs.release-please.outputs.api_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/api-v${{ needs.release-please.outputs.api_version }}|View Release>\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"

  # Promote web staged deployment to production (traffic switch)
  # Fan-in barrier: all build-phase jobs must finish (success or skipped) before
  # any promote-phase job starts. If any build fails, this job fails, which in
  # turn blocks every promote via their `needs: builds-complete` edge.
  builds-complete:
    needs:
      - release-please
      - build-web-production
      - build-api-production
      - build-app-production
      - build-runner-production
      - build-e2b-template-production
      - sbom
      - resolve-image-cache
    # Use always() so this job runs even when upstream build jobs are skipped.
    # !cancelled() is insufficient — it still propagates "skipped" from needs
    # dependencies, which causes builds-complete (and transitively
    # migrate-production) to be skipped whenever any build job is skipped.
    # The jq step below performs the actual failure check and exits 1, making
    # the barrier explicit.
    if: ${{ always() && needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify no build failed
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        shell: bash
        run: |
          set -euo pipefail
          echo "$NEEDS_JSON" | jq .
          # "skipped" is acceptable: some build jobs (e.g. build-e2b-template-production)
          # are component-conditional and only run when their component has a release.
          failures=$(echo "$NEEDS_JSON" | jq -r '
            to_entries[]
            | select(.value.result != "success" and .value.result != "skipped")
            | .key
          ')
          if [ -n "$failures" ]; then
            echo "::error::Build-phase jobs did not succeed: $failures"
            exit 1
          fi
          echo "✅ All build-phase jobs succeeded or were skipped."

  promote-web-production:
    needs:
      [
        release-please,
        builds-complete,
        build-web-production,
        migrate-production,
      ]
    if: >-
      !failure() && !cancelled() &&
      needs.release-please.outputs.web_release_created == 'true' &&
      needs.migrate-production.result == 'success'
    runs-on: ubuntu-latest
    container:
