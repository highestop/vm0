          echo "text=$text" >> $GITHUB_OUTPUT

      - name: Notify Slack - Success
        if: ${{ success() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*Platform* ✅ Deployed successfully"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Platform* ✅ Deployed successfully\n📦 Version: `${{ needs.release-please.outputs.platform_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/platform-v${{ needs.release-please.outputs.platform_version }}|View Release>"

      - name: Notify Slack - Failure
        if: ${{ failure() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*Platform* ❌ Deploy failed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Platform* ❌ Deploy failed\n📦 Version: `${{ needs.release-please.outputs.platform_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/platform-v${{ needs.release-please.outputs.platform_version }}|View Release>\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"

  publish-npm:
    needs: release-please
    if: ${{ needs.release-please.outputs.cli_release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Notify Slack - Starting
        id: slack-start
        if: ${{ vars.SLACK_RELEASE_CHANNEL_ID != '' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            text: "*CLI* publishing to npm..."
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*CLI* publishing to npm...\n📦 Version: `${{ needs.release-please.outputs.cli_version }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/cli-v${{ needs.release-please.outputs.cli_version }}|View Release>"

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Install dependencies
        run: cd turbo && pnpm install --frozen-lockfile

      - name: Use latest npm for OIDC support
        run: npm install -g npm@latest

      - name: Build CLI
        run: cd turbo && pnpm --filter @vm0/cli build
        env:
          DEFAULT_SENTRY_DSN: ${{ vars.SENTRY_DSN_CLI }}

      - name: Publish to npm with OIDC
        run: cd turbo/apps/cli/dist && npm publish --access public

      - name: Calculate duration
        id: duration
        if: ${{ always() && steps.timer.outputs.start }}
        run: |
          elapsed=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          h=$((elapsed / 3600)) m=$(( (elapsed % 3600) / 60 )) s=$((elapsed % 60))
          if [ $h -gt 0 ]; then text="${h}h ${m}m ${s}s"
          elif [ $m -gt 0 ]; then text="${m}m ${s}s"
          else text="${s}s"; fi
          echo "text=$text" >> $GITHUB_OUTPUT

      - name: Notify Slack - Success
        if: ${{ success() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*CLI* ✅ Published successfully"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*CLI* ✅ Published successfully\n📦 Version: `${{ needs.release-please.outputs.cli_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/cli-v${{ needs.release-please.outputs.cli_version }}|View Release>\n📦 <https://www.npmjs.com/package/@vm0/cli/v/${{ needs.release-please.outputs.cli_version }}|View on npm>"

      - name: Notify Slack - Failure
        if: ${{ failure() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*CLI* ❌ Publish failed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*CLI* ❌ Publish failed\n📦 Version: `${{ needs.release-please.outputs.cli_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/cli-v${{ needs.release-please.outputs.cli_version }}|View Release>\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"

  # Deploy runner to production metal instances
  deploy-runner-production:
    needs: [release-please]
    if: ${{ needs.release-please.outputs.runner_rs_release_created == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain-rust:20260306
    permissions:
      contents: write
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init

      - name: Install Python3 and Ansible
        run: |
          apt-get update && apt-get install -y python3 python3-pip
          pip3 install ansible

      - name: Notify Slack - Starting
        id: slack-start
        if: ${{ vars.SLACK_RELEASE_CHANNEL_ID != '' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            text: "*Runner RS* deploying to production servers..."
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Runner RS* deploying to production servers...\n📦 Version: `${{ needs.release-please.outputs.runner_rs_version }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/runner-rs-v${{ needs.release-please.outputs.runner_rs_version }}|View Release>"

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      # Cross-compile Rust binaries for ARM64 (metal runners are ARM64)
      - name: Cross-compile guest binaries for ARM64
        run: |
          cd crates
          cargo build --release --target aarch64-unknown-linux-musl \
            -p guest-agent -p guest-download -p guest-init -p guest-mock-claude

      - name: Cross-compile runner with embedded guests for ARM64
        run: |
          cd crates
          GUEST_AGENT_PATH=target/aarch64-unknown-linux-musl/release/guest-agent \
          GUEST_DOWNLOAD_PATH=target/aarch64-unknown-linux-musl/release/guest-download \
          GUEST_INIT_PATH=target/aarch64-unknown-linux-musl/release/guest-init \
          GUEST_MOCK_CLAUDE_PATH=target/aarch64-unknown-linux-musl/release/guest-mock-claude \
            cargo build --release --target aarch64-unknown-linux-musl -p runner

      - name: Upload runner binary to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.runner_rs_version }}
        run: |
          TAG="runner-rs-v${VERSION}"
          ASSET_NAME="runner-v${VERSION}-aarch64-linux"
          ASSET_PATH="crates/target/aarch64-unknown-linux-musl/release/runner"

          # Get the release ID from the tag
          RELEASE_ID=$(curl -sfL \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" \
            | jq -r '.id')

          # Delete existing asset with the same name (--clobber equivalent)
          EXISTING=$(curl -sfL \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" \
            | jq -r --arg name "${ASSET_NAME}" '.[] | select(.name==$name) | .id') || true
          for aid in $EXISTING; do
            curl -sfL -X DELETE \
              -H "Authorization: token ${GH_TOKEN}" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${aid}"
          done

          # Upload binary
          curl -sfL \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@${ASSET_PATH}" \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${ASSET_NAME}"

      - name: Deploy to production with Ansible
        env:
          AWS_METAL_RUNNER_HOSTS: ${{ secrets.AWS_METAL_RUNNER_HOSTS }}
          AWS_METAL_RUNNER_USER: ${{ vars.AWS_METAL_RUNNER_USER }}
          AWS_METAL_RUNNER_SSH_KEY: ${{ secrets.AWS_METAL_RUNNER_SSH_KEY }}
          OFFICIAL_RUNNER_SECRET: ${{ secrets.OFFICIAL_RUNNER_SECRET }}
          RUNNER_VERSION: ${{ needs.release-please.outputs.runner_rs_version }}
        run: |
          mkdir -p ~/.ssh
          echo "$AWS_METAL_RUNNER_SSH_KEY" > ~/.ssh/prod-runner.pem
          chmod 600 ~/.ssh/prod-runner.pem
          cd ansible
          ansible-playbook \
            -i "${AWS_METAL_RUNNER_HOSTS}," \
            playbooks/provision-metal.yml \
            --private-key ~/.ssh/prod-runner.pem \
            -e "ansible_user=${AWS_METAL_RUNNER_USER}" \
            -v
          ansible-playbook \
            -i "${AWS_METAL_RUNNER_HOSTS}," \
            playbooks/deploy-runner.yml \
            --private-key ~/.ssh/prod-runner.pem \
            -e "ansible_user=${AWS_METAL_RUNNER_USER}" \
            -e "official_runner_secret=${OFFICIAL_RUNNER_SECRET}" \
            -e "api_url=https://www.vm0.ai" \
            -e "runner_version=${RUNNER_VERSION}" \
            -v

      - name: Calculate duration
        id: duration
        if: ${{ always() && steps.timer.outputs.start }}
        run: |
          elapsed=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          h=$((elapsed / 3600)) m=$(( (elapsed % 3600) / 60 )) s=$((elapsed % 60))
          if [ $h -gt 0 ]; then text="${h}h ${m}m ${s}s"
          elif [ $m -gt 0 ]; then text="${m}m ${s}s"
          else text="${s}s"; fi
          echo "text=$text" >> $GITHUB_OUTPUT

      - name: Notify Slack - Success
        if: ${{ success() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*Runner RS* ✅ Deployed successfully"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Runner RS* ✅ Deployed successfully\n📦 Version: `${{ needs.release-please.outputs.runner_rs_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/runner-rs-v${{ needs.release-please.outputs.runner_rs_version }}|View Release>"

      - name: Notify Slack - Failure
        if: ${{ failure() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*Runner RS* ❌ Deploy failed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Runner RS* ❌ Deploy failed\n📦 Version: `${{ needs.release-please.outputs.runner_rs_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/runner-rs-v${{ needs.release-please.outputs.runner_rs_version }}|View Release>\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"

  # Build E2B templates to production account
  # Uses production environment E2B_API_KEY secret
  build-e2b-template-production:
    needs: [release-please]
    # Build when any release is created
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260306
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init

      - name: Build E2B templates
        working-directory: turbo
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        run: |
          pnpm e2b:build
          pnpm e2b:codex:build
          pnpm e2b:cli:build

      - name: Build summary
        run: echo "✅ E2B templates built successfully (production account)"

  # Publish Docker images to GHCR on release
  # Uses native ARM runners instead of QEMU for faster builds
  # Pattern: build per-platform digests in parallel, then merge into multi-arch manifest
  publish-docker-web-build:
    needs: release-please
    if: ${{ needs.release-please.outputs.web_release_created == 'true' }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/vm0-ai/vm0,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=web-${{ matrix.platform }}
          cache-to: type=gha,scope=web-${{ matrix.platform }},mode=max
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.release-please.outputs.web_version }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: web-digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-docker-web-merge:
    needs: [release-please, publish-docker-web-build]
    if: ${{ needs.release-please.outputs.web_release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: web-digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/vm0-ai/vm0:${{ needs.release-please.outputs.web_version }} \
            -t ghcr.io/vm0-ai/vm0:latest \
            $(printf 'ghcr.io/vm0-ai/vm0@sha256:%s ' *)

