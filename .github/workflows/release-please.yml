  # Update rollback dashboard issue after deployments
  update-rollback-dashboard:
    needs:
      [
        release-please,
        promote-web-production,
        promote-api-production,
        promote-app-production,
        promote-runner-production,
      ]
    if: >-
      always() &&
      (needs.promote-web-production.result == 'success' ||
       needs.promote-api-production.result == 'success' ||
       needs.promote-app-production.result == 'success' ||
       needs.promote-runner-production.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect migration safety
        id: migration-safety
        env:
          WEB_VERSION: ${{ needs.release-please.outputs.web_version }}
        run: |
          if [ -z "$WEB_VERSION" ]; then
            echo "indicator=safe" >> "$GITHUB_OUTPUT"
            echo "details=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_TAG="web-v${WEB_VERSION}"

          # Find previous web tag
          PREV_TAG=$(git tag --list 'web-v*' --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1)

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            echo "indicator=safe" >> "$GITHUB_OUTPUT"
            echo "details=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find new migration files
          NEW_MIGRATIONS=$(git diff --name-only "$PREV_TAG".."$CURRENT_TAG" -- turbo/apps/web/src/db/migrations/ | grep '\.sql$' || true)

          if [ -z "$NEW_MIGRATIONS" ]; then
            echo "indicator=safe" >> "$GITHUB_OUTPUT"
            echo "details=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for destructive operations
          DESTRUCTIVE=false
          FILENAMES=""
          for FILE in $NEW_MIGRATIONS; do
            BASENAME=$(basename "$FILE")
            FILENAMES="${FILENAMES:+$FILENAMES, }$BASENAME"
            if git show "$CURRENT_TAG:$FILE" 2>/dev/null | grep -qiE 'DROP\s+(COLUMN|TABLE|INDEX)|RENAME\s+(COLUMN|TABLE)|ALTER.*DROP'; then
              DESTRUCTIVE=true
            fi
          done

          # Check for major version bump
          PREV_MAJOR=$(echo "$PREV_TAG" | sed 's/web-v//' | cut -d. -f1)
          CURR_MAJOR=$(echo "$WEB_VERSION" | cut -d. -f1)

          if [ "$DESTRUCTIVE" = true ]; then
            SAFETY="destructive"
          elif [ "$PREV_MAJOR" != "$CURR_MAJOR" ]; then
            SAFETY="major"
          else
            SAFETY="migration"
          fi

          echo "indicator=$SAFETY" >> "$GITHUB_OUTPUT"
          echo "details=$FILENAMES" >> "$GITHUB_OUTPUT"

      - name: Build dashboard entry
        id: entry
        env:
          WEB_VERSION: ${{ needs.release-please.outputs.web_version }}
          API_VERSION: ${{ needs.release-please.outputs.api_version }}
          APP_VERSION: ${{ needs.release-please.outputs.app_version }}
          RUNNER_VERSION: ${{ needs.release-please.outputs.runner_rs_version }}
          WEB_RESULT: ${{ needs.promote-web-production.result }}
          API_RESULT: ${{ needs.promote-api-production.result }}
          APP_RESULT: ${{ needs.promote-app-production.result }}
          RUNNER_RESULT: ${{ needs.promote-runner-production.result }}
          WEB_DASHBOARD_URL: ${{ needs.promote-web-production.outputs.vercel_dashboard_url }}
          API_DASHBOARD_URL: ${{ needs.promote-api-production.outputs.vercel_dashboard_url }}
          APP_DASHBOARD_URL: ${{ needs.promote-app-production.outputs.vercel_dashboard_url }}
          SAFETY: ${{ steps.migration-safety.outputs.indicator }}
          MIGRATION_FILES: ${{ steps.migration-safety.outputs.details }}
          RUNNER_ROLLBACK_URL: ${{ github.server_url }}/${{ github.repository }}/actions/workflows/rollback-runner.yml
        run: |
          DATE=$(date -u +%Y-%m-%d)

          # Build title parts
          TITLE_PARTS=""
          if [ "$WEB_RESULT" = "success" ] && [ -n "$WEB_VERSION" ]; then
            TITLE_PARTS="web v${WEB_VERSION}"
          fi
          if [ "$API_RESULT" = "success" ] && [ -n "$API_VERSION" ]; then
            TITLE_PARTS="${TITLE_PARTS:+$TITLE_PARTS / }api v${API_VERSION}"
          fi
          if [ "$APP_RESULT" = "success" ] && [ -n "$APP_VERSION" ]; then
            TITLE_PARTS="${TITLE_PARTS:+$TITLE_PARTS / }app v${APP_VERSION}"
          fi
          if [ "$RUNNER_RESULT" = "success" ] && [ -n "$RUNNER_VERSION" ]; then
            TITLE_PARTS="${TITLE_PARTS:+$TITLE_PARTS / }runner v${RUNNER_VERSION}"
          fi

          # Web/API/app migration-safety indicator (applies to web/API/app rollbacks)
          case "$SAFETY" in
            destructive)
              INDICATOR="🔴 **Warning: destructive migration** ($MIGRATION_FILES)"
              ;;
            major)
              INDICATOR="🔴 **Warning: major version bump**"
              ;;
            migration)
              INDICATOR="🟡 **Warning: includes migration** ($MIGRATION_FILES)"
              ;;
            *)
              INDICATOR="🟢 Safe to rollback"
              ;;
          esac

          # Helper: append a row, handling empty ROWS without a leading newline.
          append_row() {
            if [ -n "$ROWS" ]; then
              ROWS="${ROWS}
          $1"
            else
              ROWS="$1"
            fi
          }

          # Build table rows
          ROWS=""
          if [ -n "$WEB_VERSION" ]; then
            if [ "$WEB_RESULT" = "success" ] && [ -n "$WEB_DASHBOARD_URL" ]; then
              append_row "| web | v${WEB_VERSION} | [Rollback in Vercel](${WEB_DASHBOARD_URL}) |"
            elif [ "$WEB_RESULT" = "success" ]; then
              append_row "| web | v${WEB_VERSION} | _URL unavailable_ |"
            else
              append_row "| web | v${WEB_VERSION} | ❌ Deploy failed |"
            fi
          fi

          if [ -n "$API_VERSION" ]; then
            if [ "$API_RESULT" = "success" ] && [ -n "$API_DASHBOARD_URL" ]; then
              append_row "| api | v${API_VERSION} | [Rollback in Vercel](${API_DASHBOARD_URL}) |"
            elif [ "$API_RESULT" = "success" ]; then
              append_row "| api | v${API_VERSION} | _URL unavailable_ |"
            else
              append_row "| api | v${API_VERSION} | ❌ Deploy failed |"
            fi
          fi

          if [ -n "$APP_VERSION" ]; then
            if [ "$APP_RESULT" = "success" ] && [ -n "$APP_DASHBOARD_URL" ]; then
              append_row "| app | v${APP_VERSION} | [Rollback in Vercel](${APP_DASHBOARD_URL}) |"
            elif [ "$APP_RESULT" = "success" ]; then
              append_row "| app | v${APP_VERSION} | _URL unavailable_ |"
            else
              append_row "| app | v${APP_VERSION} | ❌ Deploy failed |"
            fi
          fi

          # Runner row. Link points to the rollback-runner.yml workflow
          # dispatch page; operator pastes the adjacent version (without
          # the leading `v`) into `target_version` and picks
          # `rollback_mode` / `confirmed_compatible` manually.
          if [ -n "$RUNNER_VERSION" ]; then
            if [ "$RUNNER_RESULT" = "success" ]; then
              append_row "| runner-rs | v${RUNNER_VERSION} | [Rollback workflow](${RUNNER_ROLLBACK_URL}) |"
            else
              append_row "| runner-rs | v${RUNNER_VERSION} | ❌ Deploy failed |"
            fi
          fi

          # Build full entry.
          # - The migration-safety INDICATOR only describes web DB migrations
          #   (see Detect migration safety step), so suppress it for release
          #   cycles with no web/api/app changes — otherwise a runner-only
          #   release would print a misleading "🟢 Safe to rollback".
          # - Runner has no auto-computed compatibility indicator. We print
          #   a static advisory whenever the release includes runner so the
          #   operator doesn't silently treat runner rollbacks the same as
          #   web/app (which are Vercel-level atomic flips). Deliberately
          #   NOT naming specific compat surfaces — that would encourage a
          #   checklist mindset and miss cases the list doesn't anticipate.
          {
            echo "### ${DATE} — ${TITLE_PARTS}"
            if [ -n "$WEB_VERSION" ] || [ -n "$API_VERSION" ] || [ -n "$APP_VERSION" ]; then
              echo "${INDICATOR}"
            fi
            if [ -n "$RUNNER_VERSION" ]; then
              echo "⚠️ **Runner rollback needs manual diff review.** The \`confirmed_compatible\` input gates it."
            fi
            echo "| Component | Version | Rollback |"
            echo "|-----------|---------|----------|"
            echo "${ROWS}"
          } > /tmp/dashboard-entry.md

      - name: Update rollback dashboard issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ vars.ROLLBACK_ISSUE_NUMBER }}
        run: |
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "ROLLBACK_ISSUE_NUMBER not set, skipping dashboard update"
            exit 0
          fi

          # Fetch current issue body
          BODY=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}" --jq '.body')

          # Insert new entry after start sentinel using file-based approach
          # This avoids awk -v issues with multi-line strings containing backslashes or special chars
          UPDATED_BODY=$(echo "$BODY" | awk '
            /<!-- ROLLBACK_ENTRIES_START -->/ {
              print
              while ((getline line < "/tmp/dashboard-entry.md") > 0) print line
              close("/tmp/dashboard-entry.md")
              next
            }
            { print }
          ')

          # Trim to 20 entries (count ### headers between sentinels)
          TRIMMED_BODY=$(echo "$UPDATED_BODY" | awk '
            BEGIN { in_section=0; entry_count=0; skip=0 }
            /<!-- ROLLBACK_ENTRIES_START -->/ { in_section=1; print; next }
            /<!-- ROLLBACK_ENTRIES_END -->/ { in_section=0; print; next }
            in_section && /^### / {
              entry_count++
              if (entry_count > 20) { skip=1 } else { skip=0 }
            }
            in_section && skip { next }
            { print }
          ')

          # Remove the placeholder text if present
          TRIMMED_BODY=$(echo "$TRIMMED_BODY" | grep -v '_No deployments recorded yet._')

          # Update issue
          gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}" \
            -X PATCH \
            -f body="$TRIMMED_BODY"

          echo "Updated rollback dashboard issue #${ISSUE_NUMBER}"

  publish-npm:
    needs: [release-please, builds-complete, migrate-production]
    if: >-
      !failure() && !cancelled() &&
      needs.release-please.outputs.cli_release_created == 'true'
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Notify Slack - Starting
        id: slack-start
        if: ${{ vars.SLACK_RELEASE_CHANNEL_ID != '' }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            text: "*CLI* publishing to npm..."
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*CLI* publishing to npm...\n📦 Version: `${{ needs.release-please.outputs.cli_version }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/cli-v${{ needs.release-please.outputs.cli_version }}|View Release>"

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: "https://registry.npmjs.org"

      - name: Install pnpm
        run: npm install -g pnpm@latest

      - name: Install dependencies
        run: cd turbo && pnpm install --frozen-lockfile

      - name: Use latest npm for OIDC support
        run: npm install -g npm@latest

      - name: Build CLI
        run: cd turbo && pnpm --filter @vm0/cli build
        env:
          DEFAULT_SENTRY_DSN: ${{ vars.SENTRY_DSN_CLI }}

      - name: Publish to npm with OIDC
        run: cd turbo/apps/cli/dist && npm publish --access public

      - name: Calculate duration
        id: duration
        if: ${{ always() && steps.timer.outputs.start }}
        run: |
          elapsed=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          h=$((elapsed / 3600)) m=$(( (elapsed % 3600) / 60 )) s=$((elapsed % 60))
          if [ $h -gt 0 ]; then text="${h}h ${m}m ${s}s"
          elif [ $m -gt 0 ]; then text="${m}m ${s}s"
          else text="${s}s"; fi
          echo "text=$text" >> "$GITHUB_OUTPUT"

      - name: Notify Slack - Success
        if: ${{ success() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*CLI* ✅ Published successfully"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*CLI* ✅ Published successfully\n📦 Version: `${{ needs.release-please.outputs.cli_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/cli-v${{ needs.release-please.outputs.cli_version }}|View Release>\n📦 <https://www.npmjs.com/package/@vm0/cli/v/${{ needs.release-please.outputs.cli_version }}|View on npm>"

      - name: Notify Slack - Failure
        if: ${{ failure() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*CLI* ❌ Publish failed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*CLI* ❌ Publish failed\n📦 Version: `${{ needs.release-please.outputs.cli_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/cli-v${{ needs.release-please.outputs.cli_version }}|View Release>\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"

  # Resolve repo-level R2 vars for the shared image cache bucket.
  # Must run WITHOUT `environment:` so vars/secrets resolve to repo-level
  # (dev bucket), not the production-scoped user-storage bucket.
  resolve-image-cache:
    runs-on: ubuntu-latest
    needs: [release-please]
    if: needs.release-please.outputs.runner_rs_release_created == 'true'
    outputs:
      r2-account-id: ${{ steps.resolve.outputs.r2-account-id }}
      r2-access-key-id: ${{ steps.resolve.outputs.r2-access-key-id }}
      r2-secret-access-key: ${{ steps.resolve.outputs.r2-secret-access-key }}
      r2-bucket: ${{ steps.resolve.outputs.r2-bucket }}
    steps:
      - id: resolve
        env:
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_USER_STORAGES_BUCKET_NAME }}
          # Borrow an existing repo-level-only secret as the symmetric
          # encryption passphrase.  GRAFANA_CLOUD_API_KEY exists at repo
          # level but NOT in the "production" environment, so both this
          # job (no environment) and build-runner-production /
          # promote-runner-production (environment: production, falls
          # back to repo level) resolve it to the same
          # value.  Because it is a registered secret GitHub masks it as
          # *** in all logs, keeping the passphrase invisible.
          PASSPHRASE: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          # GitHub redacts raw secret values AND their base64 encodings
          # from job outputs, so we AES-encrypt them before writing.
          # The ciphertext does not match any registered secret and
          # passes through unredacted.
          {
            echo "r2-account-id=$R2_ACCOUNT_ID"
            echo "r2-access-key-id=$(echo -n "$R2_ACCESS_KEY_ID" | openssl enc -aes-128-cbc -pbkdf2 -pass "pass:$PASSPHRASE" -a -A)"
            echo "r2-secret-access-key=$(echo -n "$R2_SECRET_ACCESS_KEY" | openssl enc -aes-128-cbc -pbkdf2 -pass "pass:$PASSPHRASE" -a -A)"
            echo "r2-bucket=$R2_BUCKET"
          } >> "$GITHUB_OUTPUT"

  # Build runner: compile binary, upload to GitHub Release, stage on
  # metal hosts (provision OS + monitoring + `runner build`
  # rootfs/snapshot). This job does not flip traffic — the systemd
  # service is still running the previous version. Runs in parallel
  # with build-web / build-app, only waits on release-please.
  build-runner-production:
    needs: [release-please, resolve-image-cache]
    if: ${{ needs.release-please.outputs.runner_rs_release_created == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain-rust:20260419
    permissions:
      contents: write
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target
          shared-key: aarch64-musl-release
          save-if: false

      - name: Notify Slack - Starting
        id: slack-start
        if: ${{ vars.SLACK_RELEASE_CHANNEL_ID != '' }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            text: "*Runner RS* building staged production deployment..."
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Runner RS* building staged production deployment...\n📦 Version: `${{ needs.release-please.outputs.runner_rs_version }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/runner-rs-v${{ needs.release-please.outputs.runner_rs_version }}|View Release>"

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      # IMPORTANT: these compile settings (--release, default linker, no
      # custom RUSTFLAGS) must match crates.yml / turbo.yml so guest binary
      # bytes and rootfs_hash are identical across pipelines. The shared
      # R2 template cache intentionally ignores guest binaries. See #9192.
      - name: Cross-compile guest binaries for ARM64
        run: |
          cd crates
          cargo build --release --target aarch64-unknown-linux-musl \
            -p guest-agent -p guest-download -p guest-init -p guest-mock-claude -p guest-mock-codex -p guest-reseed

      - name: Cross-compile runner with embedded guests for ARM64
        run: |
          cd crates
          GUEST_AGENT_PATH=target/aarch64-unknown-linux-musl/release/guest-agent \
          GUEST_DOWNLOAD_PATH=target/aarch64-unknown-linux-musl/release/guest-download \
          GUEST_INIT_PATH=target/aarch64-unknown-linux-musl/release/guest-init \
          GUEST_MOCK_CLAUDE_PATH=target/aarch64-unknown-linux-musl/release/guest-mock-claude \
          GUEST_MOCK_CODEX_PATH=target/aarch64-unknown-linux-musl/release/guest-mock-codex \
          GUEST_RESEED_PATH=target/aarch64-unknown-linux-musl/release/guest-reseed \
            cargo build --release --target aarch64-unknown-linux-musl -p runner

      - name: Upload runner binary to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.runner_rs_version }}
        run: |
          TAG="runner-rs-v${VERSION}"
          ASSET_NAME="runner-v${VERSION}-aarch64-linux"
          ASSET_PATH="crates/target/aarch64-unknown-linux-musl/release/runner"

          # Get the release ID from the tag
          RELEASE_ID=$(curl -sfL \
            --retry 5 \
            --retry-delay 2 \
            --retry-max-time 60 \
            --retry-all-errors \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" \
            | jq -r '.id')

          # Delete existing asset with the same name (--clobber equivalent)
          EXISTING=$(curl -sfL \
            --retry 5 \
            --retry-delay 2 \
            --retry-max-time 60 \
            --retry-all-errors \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" \
            | jq -r --arg name "${ASSET_NAME}" '.[] | select(.name==$name) | .id') || true
          for aid in $EXISTING; do
            curl -sfL -X DELETE \
              -H "Authorization: token ${GH_TOKEN}" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${aid}"
          done

          # Upload binary
          curl -sfL \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@${ASSET_PATH}" \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${ASSET_NAME}"

      - name: Setup SSH via Cloudflare Tunnel
        uses: ./.github/actions/setup-ssh-tunnel
        with:
          ssh-key: ${{ secrets.AWS_METAL_RUNNER_SSH_KEY }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      # Decrypt R2 secrets from resolve-image-cache.  The secrets were
      # AES-encrypted with GRAFANA_CLOUD_API_KEY (a repo-level-only
      # secret) to bypass GitHub's job-output redaction.  The same
      # secret is available here because the "production" environment
      # does not define it, so GitHub falls back to the repo-level
      # value.  The passphrase appears as *** in logs (registered
      # secret); the ciphertext is visible but useless without it.
      - name: Decrypt R2 image cache credentials
        env:
          _PASSPHRASE: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          _ENC_AK: ${{ needs.resolve-image-cache.outputs.r2-access-key-id }}
          _ENC_SK: ${{ needs.resolve-image-cache.outputs.r2-secret-access-key }}
        shell: bash
        run: |
          set -euo pipefail
          AK=$(echo -n "$_ENC_AK" | openssl enc -aes-128-cbc -pbkdf2 -pass "pass:$_PASSPHRASE" -d -a -A)
          SK=$(echo -n "$_ENC_SK" | openssl enc -aes-128-cbc -pbkdf2 -pass "pass:$_PASSPHRASE" -d -a -A)
          if [ -z "$AK" ] || [ -z "$SK" ]; then
            echo "::error::R2 credential decryption produced empty values"
            exit 1
          fi
          {
            echo "R2_ACCESS_KEY_ID=$AK"
            echo "R2_SECRET_ACCESS_KEY=$SK"
          } >> "$GITHUB_ENV"

      # Provision runner + monitoring. The action skips both playbooks when
      # the remote host's ~/.vm0-provision-hash matches the current
      # ansible/ tree hash — most releases don't touch ansible/, so this
      # is typically a no-op (one SSH hash check per host).
      - name: Provision metal hosts
        uses: ./.github/actions/provision
        with:
          hosts: ${{ secrets.AWS_METAL_RUNNER_HOSTS }}
          metal-user: ${{ vars.AWS_METAL_RUNNER_USER }}
          grafana-cloud-prometheus-url: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          grafana-cloud-prometheus-user: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
          grafana-cloud-api-key: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          env-label: prod

      - name: Build rootfs and snapshot on production hosts
        env:
          AWS_METAL_RUNNER_HOSTS: ${{ secrets.AWS_METAL_RUNNER_HOSTS }}
          AWS_METAL_RUNNER_USER: ${{ vars.AWS_METAL_RUNNER_USER }}
          OFFICIAL_RUNNER_SECRET: ${{ secrets.OFFICIAL_RUNNER_SECRET }}
          RUNNER_VERSION: ${{ needs.release-please.outputs.runner_rs_version }}
          API_URL: ${{ vars.VM0_API_URL }}
          # R2 image cache credentials — from resolve-image-cache job (repo-level,
          # not production-scoped) so the runner uses the same bucket as CI.
          # R2_ACCESS_KEY_ID and R2_SECRET_ACCESS_KEY come from $GITHUB_ENV
          # (decoded in previous step).
          R2_ACCOUNT_ID: ${{ needs.resolve-image-cache.outputs.r2-account-id }}
          R2_USER_STORAGES_BUCKET_NAME: ${{ needs.resolve-image-cache.outputs.r2-bucket }}
        run: |
          cd ansible
          ansible-playbook \
            -i "${AWS_METAL_RUNNER_HOSTS}," \
            playbooks/build-runner.yml \
            -e "ansible_user=${AWS_METAL_RUNNER_USER}" \
            -e "official_runner_secret=${OFFICIAL_RUNNER_SECRET}" \
            -e "api_url=${API_URL}" \
            -e "runner_version=${RUNNER_VERSION}" \
            -e "r2_account_id=${R2_ACCOUNT_ID:-}" \
            -e "r2_access_key_id=${R2_ACCESS_KEY_ID:-}" \
            -e "r2_secret_access_key=${R2_SECRET_ACCESS_KEY:-}" \
            -e "r2_bucket=${R2_USER_STORAGES_BUCKET_NAME:-}" \
            -v

      - name: Calculate duration
        id: duration
        if: ${{ always() && steps.timer.outputs.start }}
        run: |
          elapsed=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          h=$((elapsed / 3600)) m=$(( (elapsed % 3600) / 60 )) s=$((elapsed % 60))
          if [ $h -gt 0 ]; then text="${h}h ${m}m ${s}s"
          elif [ $m -gt 0 ]; then text="${m}m ${s}s"
          else text="${s}s"; fi
          echo "text=$text" >> "$GITHUB_OUTPUT"

      - name: Notify Slack - Success
        if: ${{ success() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*Runner RS* ✅ Staged build ready (not yet serving)"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Runner RS* ✅ Staged build ready (not yet serving)\n📦 Version: `${{ needs.release-please.outputs.runner_rs_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/runner-rs-v${{ needs.release-please.outputs.runner_rs_version }}|View Release>"

      - name: Notify Slack - Failure
        if: ${{ failure() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*Runner RS* ❌ Staged build failed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Runner RS* ❌ Staged build failed\n📦 Version: `${{ needs.release-please.outputs.runner_rs_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/runner-rs-v${{ needs.release-please.outputs.runner_rs_version }}|View Release>\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"

  # Promote runner: install systemd service (traffic cutover), drain
  # old runners, garbage-collect old artifacts, global health check.
  # Waits for build-runner-production plus migrate-production and
  # promote-web-production so the new runner only serves traffic after
  # the schema and API it targets are live. Host-level prep
  # (provision-runner, provision-monitoring) already ran in build.
  promote-runner-production:
    needs:
      [
        release-please,
        builds-complete,
        promote-web-production,
        resolve-image-cache,
        build-runner-production,
        migrate-production,
      ]
    if: >-
      !failure() && !cancelled() &&
      needs.release-please.outputs.runner_rs_release_created == 'true' &&
      needs.migrate-production.result == 'success'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain-rust:20260419
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Notify Slack - Starting
        id: slack-start
        if: ${{ vars.SLACK_RELEASE_CHANNEL_ID != '' }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            text: "*Runner RS* promoting staged deployment to production..."
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Runner RS* promoting staged deployment to production...\n📦 Version: `${{ needs.release-please.outputs.runner_rs_version }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/runner-rs-v${{ needs.release-please.outputs.runner_rs_version }}|View Release>"

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Setup SSH via Cloudflare Tunnel
        uses: ./.github/actions/setup-ssh-tunnel
        with:
          ssh-key: ${{ secrets.AWS_METAL_RUNNER_SSH_KEY }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      # Same decrypt as build; needed here so `runner gc` (inside
      # promote-runner.yml) can sweep stale image cache objects in R2.
      - name: Decrypt R2 image cache credentials
        env:
          _PASSPHRASE: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          _ENC_AK: ${{ needs.resolve-image-cache.outputs.r2-access-key-id }}
          _ENC_SK: ${{ needs.resolve-image-cache.outputs.r2-secret-access-key }}
        shell: bash
        run: |
          set -euo pipefail
          AK=$(echo -n "$_ENC_AK" | openssl enc -aes-128-cbc -pbkdf2 -pass "pass:$_PASSPHRASE" -d -a -A)
          SK=$(echo -n "$_ENC_SK" | openssl enc -aes-128-cbc -pbkdf2 -pass "pass:$_PASSPHRASE" -d -a -A)
          if [ -z "$AK" ] || [ -z "$SK" ]; then
            echo "::error::R2 credential decryption produced empty values"
            exit 1
          fi
          {
            echo "R2_ACCESS_KEY_ID=$AK"
            echo "R2_SECRET_ACCESS_KEY=$SK"
          } >> "$GITHUB_ENV"

      - name: Promote runner on production hosts with Ansible
        env:
          AWS_METAL_RUNNER_HOSTS: ${{ secrets.AWS_METAL_RUNNER_HOSTS }}
          AWS_METAL_RUNNER_USER: ${{ vars.AWS_METAL_RUNNER_USER }}
          SENTRY_DSN_RUNNER: ${{ secrets.SENTRY_DSN_RUNNER }}
          AXIOM_TOKEN_TELEMETRY: ${{ secrets.AXIOM_TOKEN_TELEMETRY }}
          RUNNER_VERSION: ${{ needs.release-please.outputs.runner_rs_version }}
          R2_ACCOUNT_ID: ${{ needs.resolve-image-cache.outputs.r2-account-id }}
          R2_USER_STORAGES_BUCKET_NAME: ${{ needs.resolve-image-cache.outputs.r2-bucket }}
        run: |
          cd ansible
          ansible-playbook \
            -i "${AWS_METAL_RUNNER_HOSTS}," \
            playbooks/promote-runner.yml \
            -e "ansible_user=${AWS_METAL_RUNNER_USER}" \
            -e "sentry_dsn=${SENTRY_DSN_RUNNER}" \
            -e "axiom_token_telemetry=${AXIOM_TOKEN_TELEMETRY}" \
            -e "axiom_dataset_suffix=prod" \
            -e "runner_version=${RUNNER_VERSION}" \
            -e "r2_account_id=${R2_ACCOUNT_ID:-}" \
            -e "r2_access_key_id=${R2_ACCESS_KEY_ID:-}" \
            -e "r2_secret_access_key=${R2_SECRET_ACCESS_KEY:-}" \
            -e "r2_bucket=${R2_USER_STORAGES_BUCKET_NAME:-}" \
            -v

      - name: Global health check (non-blocking)
        id: global-doctor
        if: ${{ success() }}
        env:
          AWS_METAL_RUNNER_HOSTS: ${{ secrets.AWS_METAL_RUNNER_HOSTS }}
          AWS_METAL_RUNNER_USER: ${{ vars.AWS_METAL_RUNNER_USER }}
          RUNNER_VERSION: ${{ needs.release-please.outputs.runner_rs_version }}
        run: |
          RUNNER_BIN="/var/lib/vm0-runner/bin/v${RUNNER_VERSION}/runner"
          has_warnings=false
          for host in $(echo "$AWS_METAL_RUNNER_HOSTS" | tr ',' ' '); do
            [ -z "$host" ] && continue
            # shellcheck disable=SC2029
            if ! ssh "${AWS_METAL_RUNNER_USER}@${host}" "sudo ${RUNNER_BIN} doctor" 2>&1; then
              has_warnings=true
            fi
          done
          echo "has_warnings=${has_warnings}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Calculate duration
        id: duration
        if: ${{ always() && steps.timer.outputs.start }}
        run: |
          elapsed=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          h=$((elapsed / 3600)) m=$(( (elapsed % 3600) / 60 )) s=$((elapsed % 60))
          if [ $h -gt 0 ]; then text="${h}h ${m}m ${s}s"
          elif [ $m -gt 0 ]; then text="${m}m ${s}s"
          else text="${s}s"; fi
          echo "text=$text" >> "$GITHUB_OUTPUT"

      - name: Notify Slack - Success
        if: ${{ success() && steps.slack-start.outputs.ts && steps.global-doctor.outputs.has_warnings != 'true' }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*Runner RS* ✅ Promoted to production"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Runner RS* ✅ Promoted to production\n📦 Version: `${{ needs.release-please.outputs.runner_rs_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/runner-rs-v${{ needs.release-please.outputs.runner_rs_version }}|View Release>\n🔄 <${{ github.server_url }}/${{ github.repository }}/issues/${{ vars.ROLLBACK_ISSUE_NUMBER }}|Rollback Dashboard>"

      - name: Notify Slack - Success with warnings
        if: ${{ success() && steps.slack-start.outputs.ts && steps.global-doctor.outputs.has_warnings == 'true' }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*Runner RS* ⚠️ Promoted with warnings"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Runner RS* ⚠️ Promoted with warnings\n📦 Version: `${{ needs.release-please.outputs.runner_rs_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/runner-rs-v${{ needs.release-please.outputs.runner_rs_version }}|View Release>\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>\n🔄 <${{ github.server_url }}/${{ github.repository }}/issues/${{ vars.ROLLBACK_ISSUE_NUMBER }}|Rollback Dashboard>"

      - name: Notify Slack - Failure
        if: ${{ failure() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*Runner RS* ❌ Promote failed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Runner RS* ❌ Promote failed\n📦 Version: `${{ needs.release-please.outputs.runner_rs_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/runner-rs-v${{ needs.release-please.outputs.runner_rs_version }}|View Release>\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"

  # Build E2B templates to production account
  # Uses production environment E2B_API_KEY secret
  build-e2b-template-production:
    needs: [release-please]
    # Build when any release is created
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260419
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init

      - name: Build E2B templates
        working-directory: turbo
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        run: |
          pnpm e2b:cli:build

      - name: Build summary
        run: echo "✅ E2B templates built successfully (production account)"

  # Generate Software Bill of Materials (SBOM) for CASA compliance (CASA-DEP-003)
  sbom:
    needs: [release-please]
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260419
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init

      - name: Generate Node.js SBOM
        working-directory: turbo
        run: npx @cyclonedx/cdxgen -o sbom-node.json --spec-version 1.5

      - name: Generate Rust SBOM
        working-directory: crates
        run: npx @cyclonedx/cdxgen -o sbom-rust.json --spec-version 1.5

      - name: Merge SBOMs
        run: |
          node <<'MERGE_SCRIPT'
          const fs = require("fs");
          const node = JSON.parse(fs.readFileSync("turbo/sbom-node.json", "utf8"));
          const rust = JSON.parse(fs.readFileSync("crates/sbom-rust.json", "utf8"));
          const seen = new Set();
          const components = [];
          for (const c of [...(node.components || []), ...(rust.components || [])]) {
            const key = c.purl || c["bom-ref"] || JSON.stringify(c);
            if (!seen.has(key)) { seen.add(key); components.push(c); }
          }
          const merged = { ...node, components };
          const deps = [...(node.dependencies || []), ...(rust.dependencies || [])];
          if (deps.length) merged.dependencies = deps;
          fs.writeFileSync("sbom.json", JSON.stringify(merged, null, 2));
          console.log("Merged SBOM: " + components.length + " components (" + (node.components || []).length + " Node.js + " + (rust.components || []).length + " Rust)");
          MERGE_SCRIPT

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.json
