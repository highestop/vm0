      contents: read
      deployments: write
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init

      - name: Start GitHub Deployment
        id: deployment
        uses: bobheadxi/deployments@v1
        with:
          step: start
          token: ${{ github.token }}
          env: app/production
          ref: ${{ github.ref }}
          desc: Promoting app staged deployment to production

      - name: Notify Slack - Starting
        id: slack-start
        if: ${{ vars.SLACK_RELEASE_CHANNEL_ID != '' }}
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            text: "*App* promoting staged deployment to production..."
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*App* promoting staged deployment to production...\n📦 Version: `${{ needs.release-please.outputs.app_version }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/platform-v${{ needs.release-please.outputs.app_version }}|View Release>"

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Promote App Deployment
        uses: ./.github/actions/vercel-promote
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ vars.VERCEL_TEAM_ID }}
          vercel-project-id: ${{ vars.VERCEL_PROJECT_ID_APP }}
          deployment-url: ${{ needs.build-app-production.outputs.deployment_url }}

      - name: Resolve Vercel dashboard URL
        id: vercel-dashboard
        if: ${{ needs.build-app-production.outputs.deployment_url != '' }}
        uses: ./.github/actions/vercel-dashboard-url
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          deployment-url: ${{ needs.build-app-production.outputs.deployment_url }}

      - name: Finish GitHub Deployment
        if: always()
        uses: bobheadxi/deployments@v1
        with:
          step: finish
          token: ${{ github.token }}
          status: ${{ job.status }}
          env: ${{ steps.deployment.outputs.env }}
          env_url: ${{ steps.vercel-dashboard.outputs.url }}
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}

      - name: Calculate duration
        id: duration
        if: ${{ always() && steps.timer.outputs.start }}
        run: |
          elapsed=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          h=$((elapsed / 3600)) m=$(( (elapsed % 3600) / 60 )) s=$((elapsed % 60))
          if [ $h -gt 0 ]; then text="${h}h ${m}m ${s}s"
          elif [ $m -gt 0 ]; then text="${m}m ${s}s"
          else text="${s}s"; fi
          echo "text=$text" >> "$GITHUB_OUTPUT"

      - name: Notify Slack - Success
        if: ${{ success() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*App* ✅ Promoted to production"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*App* ✅ Promoted to production\n📦 Version: `${{ needs.release-please.outputs.app_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/platform-v${{ needs.release-please.outputs.app_version }}|View Release>\n🔄 <${{ github.server_url }}/${{ github.repository }}/issues/${{ vars.ROLLBACK_ISSUE_NUMBER }}|Rollback Dashboard>"

      - name: Notify Slack - Failure
        if: ${{ failure() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*App* ❌ Promote failed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*App* ❌ Promote failed\n📦 Version: `${{ needs.release-please.outputs.app_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/platform-v${{ needs.release-please.outputs.app_version }}|View Release>\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"

  # Update rollback dashboard issue after deployments
  update-rollback-dashboard:
    needs: [release-please, promote-web-production, promote-app-production]
    if: >-
      always() &&
      (needs.promote-web-production.result == 'success' || needs.promote-app-production.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect migration safety
        id: migration-safety
        env:
          WEB_VERSION: ${{ needs.release-please.outputs.web_version }}
        run: |
          if [ -z "$WEB_VERSION" ]; then
            echo "indicator=safe" >> "$GITHUB_OUTPUT"
            echo "details=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CURRENT_TAG="web-v${WEB_VERSION}"

          # Find previous web tag
          PREV_TAG=$(git tag --list 'web-v*' --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1)

          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "$CURRENT_TAG" ]; then
            echo "indicator=safe" >> "$GITHUB_OUTPUT"
            echo "details=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find new migration files
          NEW_MIGRATIONS=$(git diff --name-only "$PREV_TAG".."$CURRENT_TAG" -- turbo/apps/web/src/db/migrations/ | grep '\.sql$' || true)

          if [ -z "$NEW_MIGRATIONS" ]; then
            echo "indicator=safe" >> "$GITHUB_OUTPUT"
            echo "details=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for destructive operations
          DESTRUCTIVE=false
          FILENAMES=""
          for FILE in $NEW_MIGRATIONS; do
            BASENAME=$(basename "$FILE")
            FILENAMES="${FILENAMES:+$FILENAMES, }$BASENAME"
            if git show "$CURRENT_TAG:$FILE" 2>/dev/null | grep -qiE 'DROP\s+(COLUMN|TABLE|INDEX)|RENAME\s+(COLUMN|TABLE)|ALTER.*DROP'; then
              DESTRUCTIVE=true
            fi
          done

          # Check for major version bump
          PREV_MAJOR=$(echo "$PREV_TAG" | sed 's/web-v//' | cut -d. -f1)
          CURR_MAJOR=$(echo "$WEB_VERSION" | cut -d. -f1)

          if [ "$DESTRUCTIVE" = true ]; then
            SAFETY="destructive"
          elif [ "$PREV_MAJOR" != "$CURR_MAJOR" ]; then
            SAFETY="major"
          else
            SAFETY="migration"
          fi

          echo "indicator=$SAFETY" >> "$GITHUB_OUTPUT"
          echo "details=$FILENAMES" >> "$GITHUB_OUTPUT"

      - name: Build dashboard entry
        id: entry
        env:
          WEB_VERSION: ${{ needs.release-please.outputs.web_version }}
          APP_VERSION: ${{ needs.release-please.outputs.app_version }}
          WEB_RESULT: ${{ needs.promote-web-production.result }}
          APP_RESULT: ${{ needs.promote-app-production.result }}
          WEB_DASHBOARD_URL: ${{ needs.promote-web-production.outputs.vercel_dashboard_url }}
          APP_DASHBOARD_URL: ${{ needs.promote-app-production.outputs.vercel_dashboard_url }}
          SAFETY: ${{ steps.migration-safety.outputs.indicator }}
          MIGRATION_FILES: ${{ steps.migration-safety.outputs.details }}
        run: |
          DATE=$(date -u +%Y-%m-%d)

          # Build title parts
          TITLE_PARTS=""
          if [ "$WEB_RESULT" = "success" ] && [ -n "$WEB_VERSION" ]; then
            TITLE_PARTS="web v${WEB_VERSION}"
          fi
          if [ "$APP_RESULT" = "success" ] && [ -n "$APP_VERSION" ]; then
            TITLE_PARTS="${TITLE_PARTS:+$TITLE_PARTS / }app v${APP_VERSION}"
          fi

          # Safety indicator
          case "$SAFETY" in
            destructive)
              INDICATOR="🔴 **Warning: destructive migration** ($MIGRATION_FILES)"
              ;;
            major)
              INDICATOR="🔴 **Warning: major version bump**"
              ;;
            migration)
              INDICATOR="🟡 **Warning: includes migration** ($MIGRATION_FILES)"
              ;;
            *)
              INDICATOR="🟢 Safe to rollback"
              ;;
          esac

          # Build table rows
          ROWS=""
          if [ -n "$WEB_VERSION" ]; then
            if [ "$WEB_RESULT" = "success" ] && [ -n "$WEB_DASHBOARD_URL" ]; then
              ROWS="| web | v${WEB_VERSION} | [Rollback in Vercel](${WEB_DASHBOARD_URL}) |"
            elif [ "$WEB_RESULT" = "success" ]; then
              ROWS="| web | v${WEB_VERSION} | _URL unavailable_ |"
            else
              ROWS="| web | v${WEB_VERSION} | ❌ Deploy failed |"
            fi
          fi

          if [ -n "$APP_VERSION" ]; then
            ROW=""
            if [ "$APP_RESULT" = "success" ] && [ -n "$APP_DASHBOARD_URL" ]; then
              ROW="| app | v${APP_VERSION} | [Rollback in Vercel](${APP_DASHBOARD_URL}) |"
            elif [ "$APP_RESULT" = "success" ]; then
              ROW="| app | v${APP_VERSION} | _URL unavailable_ |"
            else
              ROW="| app | v${APP_VERSION} | ❌ Deploy failed |"
            fi
            if [ -n "$ROWS" ]; then
              ROWS="${ROWS}
          ${ROW}"
            else
              ROWS="$ROW"
            fi
          fi

          # Build full entry
          {
            echo "### ${DATE} — ${TITLE_PARTS}"
            echo "${INDICATOR}"
            echo "| Component | Version | Rollback via Vercel |"
            echo "|-----------|---------|---------------------|"
            echo "${ROWS}"
          } > /tmp/dashboard-entry.md

      - name: Update rollback dashboard issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ vars.ROLLBACK_ISSUE_NUMBER }}
        run: |
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "ROLLBACK_ISSUE_NUMBER not set, skipping dashboard update"
            exit 0
          fi

          # Fetch current issue body
          BODY=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}" --jq '.body')

          # Insert new entry after start sentinel using file-based approach
          # This avoids awk -v issues with multi-line strings containing backslashes or special chars
          UPDATED_BODY=$(echo "$BODY" | awk '
            /<!-- ROLLBACK_ENTRIES_START -->/ {
              print
              while ((getline line < "/tmp/dashboard-entry.md") > 0) print line
              close("/tmp/dashboard-entry.md")
              next
            }
            { print }
          ')

          # Trim to 20 entries (count ### headers between sentinels)
          TRIMMED_BODY=$(echo "$UPDATED_BODY" | awk '
            BEGIN { in_section=0; entry_count=0; skip=0 }
            /<!-- ROLLBACK_ENTRIES_START -->/ { in_section=1; print; next }
            /<!-- ROLLBACK_ENTRIES_END -->/ { in_section=0; print; next }
            in_section && /^### / {
              entry_count++
              if (entry_count > 20) { skip=1 } else { skip=0 }
            }
            in_section && skip { next }
            { print }
          ')

          # Remove the placeholder text if present
          TRIMMED_BODY=$(echo "$TRIMMED_BODY" | grep -v '_No deployments recorded yet._')

          # Update issue
          gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}" \
            -X PATCH \
            -f body="$TRIMMED_BODY"

          echo "Updated rollback dashboard issue #${ISSUE_NUMBER}"

  publish-npm:
    needs: [release-please, migrate-production]
    if: ${{ needs.release-please.outputs.cli_release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Notify Slack - Starting
        id: slack-start
        if: ${{ vars.SLACK_RELEASE_CHANNEL_ID != '' }}
        uses: slackapi/slack-github-action@v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            text: "*CLI* publishing to npm..."
            blocks:
              - type: section
                text:
