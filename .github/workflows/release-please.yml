  # Deploy runner to production metal instances
  deploy-runner-production:
    needs: [release-please]
    if: ${{ needs.release-please.outputs.runner_rs_release_created == 'true' }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain-rust:20260310
    permissions:
      contents: write
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init

      - name: Install Python3 and Ansible
        run: |
          rm -rf /var/lib/apt/lists/* && apt-get update && apt-get install -y python3 python3-pip
          pip3 install ansible

      - name: Notify Slack - Starting
        id: slack-start
        if: ${{ vars.SLACK_RELEASE_CHANNEL_ID != '' }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.postMessage
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            text: "*Runner RS* deploying to production servers..."
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Runner RS* deploying to production servers...\n📦 Version: `${{ needs.release-please.outputs.runner_rs_version }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/runner-rs-v${{ needs.release-please.outputs.runner_rs_version }}|View Release>"

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      # Cross-compile Rust binaries for ARM64 (metal runners are ARM64)
      - name: Cross-compile guest binaries for ARM64
        run: |
          cd crates
          cargo build --release --target aarch64-unknown-linux-musl \
            -p guest-agent -p guest-download -p guest-init -p guest-mock-claude

      - name: Cross-compile runner with embedded guests for ARM64
        run: |
          cd crates
          GUEST_AGENT_PATH=target/aarch64-unknown-linux-musl/release/guest-agent \
          GUEST_DOWNLOAD_PATH=target/aarch64-unknown-linux-musl/release/guest-download \
          GUEST_INIT_PATH=target/aarch64-unknown-linux-musl/release/guest-init \
          GUEST_MOCK_CLAUDE_PATH=target/aarch64-unknown-linux-musl/release/guest-mock-claude \
            cargo build --release --target aarch64-unknown-linux-musl -p runner

      - name: Upload runner binary to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.runner_rs_version }}
        run: |
          TAG="runner-rs-v${VERSION}"
          ASSET_NAME="runner-v${VERSION}-aarch64-linux"
          ASSET_PATH="crates/target/aarch64-unknown-linux-musl/release/runner"

          # Get the release ID from the tag
          RELEASE_ID=$(curl -sfL \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" \
            | jq -r '.id')

          # Delete existing asset with the same name (--clobber equivalent)
          EXISTING=$(curl -sfL \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets" \
            | jq -r --arg name "${ASSET_NAME}" '.[] | select(.name==$name) | .id') || true
          for aid in $EXISTING; do
            curl -sfL -X DELETE \
              -H "Authorization: token ${GH_TOKEN}" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/assets/${aid}"
          done

          # Upload binary
          curl -sfL \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@${ASSET_PATH}" \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${ASSET_NAME}"

      - name: Setup SSH via Cloudflare Tunnel
        uses: ./.github/actions/setup-ssh-tunnel
        with:
          ssh-key: ${{ secrets.AWS_METAL_RUNNER_SSH_KEY }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Deploy to production with Ansible
        env:
          AWS_METAL_RUNNER_HOSTS: ${{ secrets.AWS_METAL_RUNNER_HOSTS }}
          AWS_METAL_RUNNER_USER: ${{ vars.AWS_METAL_RUNNER_USER }}
          OFFICIAL_RUNNER_SECRET: ${{ secrets.OFFICIAL_RUNNER_SECRET }}
          RUNNER_VERSION: ${{ needs.release-please.outputs.runner_rs_version }}
          GRAFANA_CLOUD_PROMETHEUS_URL: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          GRAFANA_CLOUD_PROMETHEUS_USER: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
          GRAFANA_CLOUD_API_KEY: ${{ secrets.GRAFANA_CLOUD_API_KEY }}
        run: |
          cd ansible
          ansible-playbook \
            -i "${AWS_METAL_RUNNER_HOSTS}," \
            playbooks/provision-runner.yml \
            -e "ansible_user=${AWS_METAL_RUNNER_USER}" \
            -v
          if [ -n "${GRAFANA_CLOUD_API_KEY}" ]; then
            ansible-playbook \
              -i "${AWS_METAL_RUNNER_HOSTS}," \
              playbooks/provision-monitoring.yml \
              -e "ansible_user=${AWS_METAL_RUNNER_USER}" \
              -e "grafana_cloud_prometheus_url=${GRAFANA_CLOUD_PROMETHEUS_URL}" \
              -e "grafana_cloud_prometheus_user=${GRAFANA_CLOUD_PROMETHEUS_USER}" \
              -e "grafana_cloud_api_key=${GRAFANA_CLOUD_API_KEY}" \
              -e "env_label=prod" \
              -v
          fi
          ansible-playbook \
            -i "${AWS_METAL_RUNNER_HOSTS}," \
            playbooks/deploy-runner.yml \
            -e "ansible_user=${AWS_METAL_RUNNER_USER}" \
            -e "official_runner_secret=${OFFICIAL_RUNNER_SECRET}" \
            -e "api_url=https://www.vm0.ai" \
            -e "runner_version=${RUNNER_VERSION}" \
            -v

      - name: Calculate duration
        id: duration
        if: ${{ always() && steps.timer.outputs.start }}
        run: |
          elapsed=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          h=$((elapsed / 3600)) m=$(( (elapsed % 3600) / 60 )) s=$((elapsed % 60))
          if [ $h -gt 0 ]; then text="${h}h ${m}m ${s}s"
          elif [ $m -gt 0 ]; then text="${m}m ${s}s"
          else text="${s}s"; fi
          echo "text=$text" >> $GITHUB_OUTPUT

      - name: Notify Slack - Success
        if: ${{ success() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*Runner RS* ✅ Deployed successfully"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Runner RS* ✅ Deployed successfully\n📦 Version: `${{ needs.release-please.outputs.runner_rs_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/runner-rs-v${{ needs.release-please.outputs.runner_rs_version }}|View Release>"

      - name: Notify Slack - Failure
        if: ${{ failure() && steps.slack-start.outputs.ts }}
        uses: slackapi/slack-github-action@v2.1.1
        with:
          method: chat.update
          token: ${{ secrets.CI_SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ vars.SLACK_RELEASE_CHANNEL_ID }}
            ts: "${{ steps.slack-start.outputs.ts }}"
            text: "*Runner RS* ❌ Deploy failed"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Runner RS* ❌ Deploy failed\n📦 Version: `${{ needs.release-please.outputs.runner_rs_version }}`\n⏱️ `${{ steps.duration.outputs.text }}`\n🔗 <${{ github.server_url }}/${{ github.repository }}/releases/tag/runner-rs-v${{ needs.release-please.outputs.runner_rs_version }}|View Release>\n🔗 <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"

