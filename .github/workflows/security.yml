name: Security Scanning

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6

      - name: Run Semgrep
        run: semgrep scan --config auto --json-output semgrep-results.json --sarif --output semgrep-results.sarif .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Check against baseline
        shell: python3 {0}
        run: |
          import json, sys

          with open(".github/semgrep-baseline.json") as f:
              baseline = json.load(f)

          with open("semgrep-results.json") as f:
              results = json.load(f)

          current = {}
          for r in results.get("results", []):
              rid = r["check_id"]
              current[rid] = current.get(rid, 0) + 1

          errors = []
          for rule, count in sorted(current.items()):
              allowed = baseline.get(rule, 0)
              if count > allowed:
                  if allowed == 0:
                      errors.append(f"NEW rule {rule}: {count} finding(s)")
                  else:
                      errors.append(f"REGRESSION {rule}: {count} (baseline: {allowed})")

          print(f"Semgrep: {len(current)} rules, {sum(current.values())} total findings")
          for rule, count in sorted(current.items()):
              status = "OK" if count <= baseline.get(rule, 0) else "FAIL"
              print(f"  [{status}] {rule}: {count} (baseline: {baseline.get(rule, 0)})")

          if errors:
              print(f"\n{len(errors)} regression(s) found:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          else:
              print("\nNo regressions. All findings within baseline.")

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql

  pnpm-audit:
    name: pnpm audit (SCA)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: turbo
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        run: corepack enable pnpm

      - name: Run pnpm audit
        run: |
          set -o pipefail
          echo "## pnpm audit results" >> "$GITHUB_STEP_SUMMARY"
          pnpm audit --prod 2>&1 | tee audit-output.txt
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat audit-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  gitleaks:
    name: Gitleaks Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep '"tag_name"' | sed 's/.*"v\(.*\)".*/\1/')
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect --source . --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" --verbose --redact
          else
            gitleaks detect --source . --log-opts="HEAD~1..HEAD" --verbose --redact
          fi
