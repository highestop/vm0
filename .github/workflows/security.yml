name: Security Scanning

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  # Detect release-please context across all event types (PR, push, merge queue).
  detect-release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check for release-please
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.head_ref || '' }}
          COMMIT_MSG: ${{ github.event.head_commit.message || '' }}
          EVENT_NAME: ${{ github.event_name }}
          MQ_HEAD_REF: ${{ github.event.merge_group.head_ref || '' }}
          REPO: ${{ github.repository }}
        run: |
          if [[ "$HEAD_REF" == release-please--branches--* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release-please PR detected (branch: $HEAD_REF)"
            exit 0
          fi
          if [[ "$EVENT_NAME" == "push" ]] && [[ "$COMMIT_MSG" == chore:\ release* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release-please push detected (message: $COMMIT_MSG)"
            exit 0
          fi
          if [[ "$EVENT_NAME" == "merge_group" ]] && [[ -n "$MQ_HEAD_REF" ]]; then
            PR_NUM=$(echo "$MQ_HEAD_REF" | grep -oE 'pr-[0-9]+' | head -1 | sed 's/pr-//')
            if [[ -n "$PR_NUM" ]]; then
              PR_BRANCH=$(gh pr view "$PR_NUM" --repo "$REPO" --json headRefName --jq .headRefName 2>/dev/null || echo "")
              if [[ "$PR_BRANCH" == release-please--branches--* ]]; then
                echo "skip=true" >> "$GITHUB_OUTPUT"
                echo "Release-please merge queue entry detected (PR #$PR_NUM, branch: $PR_BRANCH)"
                exit 0
              fi
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Not a release-please context"

  semgrep:
    needs: [detect-release]
    name: Semgrep SAST
    # Skip for release-please PRs, commits, and merge queue entries
    if: needs.detect-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6

      - name: Run Semgrep
        run: semgrep scan --config auto --json-output semgrep-results.json --sarif --output semgrep-results.sarif .
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Check against baseline
        shell: python3 {0}
        run: |
          import json, sys

          with open(".github/semgrep-baseline.json") as f:
              baseline = json.load(f)

          with open("semgrep-results.json") as f:
              results = json.load(f)

          current = {}
          for r in results.get("results", []):
              rid = r["check_id"]
              current[rid] = current.get(rid, 0) + 1

          errors = []
          for rule, count in sorted(current.items()):
              allowed = baseline.get(rule, 0)
              if count > allowed:
                  if allowed == 0:
                      errors.append(f"NEW rule {rule}: {count} finding(s)")
                  else:
                      errors.append(f"REGRESSION {rule}: {count} (baseline: {allowed})")

          print(f"Semgrep: {len(current)} rules, {sum(current.values())} total findings")
          for rule, count in sorted(current.items()):
              status = "OK" if count <= baseline.get(rule, 0) else "FAIL"
              print(f"  [{status}] {rule}: {count} (baseline: {baseline.get(rule, 0)})")

          if errors:
              print(f"\n{len(errors)} regression(s) found:")
              for e in errors:
                  print(f"  - {e}")
              sys.exit(1)
          else:
              print("\nNo regressions. All findings within baseline.")

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && github.event_name != 'merge_group'
        with:
          sarif_file: semgrep-results.sarif
          category: semgrep

  codeql:
    needs: [detect-release]
    name: CodeQL SAST
    # Skip for release-please PRs, commits, and merge queue entries
    if: needs.detect-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          trap-caching: false
        env:
          CODEQL_ACTION_OVERLAY_DATABASE_CACHE: false

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: codeql
          upload: ${{ github.event_name != 'merge_group' }}

  pnpm-audit:
    needs: [detect-release]
    name: pnpm audit (SCA)
    # Skip for release-please PRs, commits, and merge queue entries
    if: needs.detect-release.outputs.skip != 'true'
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: turbo
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pnpm
        run: corepack enable pnpm

      - name: Run pnpm audit
        run: |
          set -o pipefail
          echo "## pnpm audit results" >> "$GITHUB_STEP_SUMMARY"
          # --ignore-registry-errors: temporary workaround for transient npm registry
          # connectivity failures in CI that cause false audit failures unrelated to
          # actual vulnerability findings.
          pnpm audit --prod --ignore-registry-errors 2>&1 | tee audit-output.txt
          {
            echo '```'
            cat audit-output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  actionlint:
    needs: [detect-release]
    name: Workflow Lint
    # Skip for release-please PRs, commits, and merge queue entries
    if: needs.detect-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - name: Install actionlint
        run: bash <(curl -fsSL --retry 5 --retry-delay 2 --retry-max-time 60 --retry-all-errors https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Run workflow script tests
        run: |
          shopt -s nullglob
          script_files=(
            .github/scripts/*.sh
            .github/scripts/tests/*.sh
          )
          bash -n "${script_files[@]}"
          for test_script in .github/scripts/tests/*.sh; do
            bash "$test_script"
          done

      - name: Run actionlint
        run: ./actionlint

  gitleaks:
    needs: [detect-release]
    name: Gitleaks Secrets Detection
    # Skip for release-please PRs, commits, and merge queue entries
    if: needs.detect-release.outputs.skip != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSfL \
            --retry 5 \
            --retry-delay 2 \
            --retry-max-time 60 \
            --retry-all-errors \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect --source . --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" --verbose --redact
          else
            gitleaks detect --source . --log-opts="HEAD~1..HEAD" --verbose --redact
          fi

  ci-gate-security:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - detect-release
      - semgrep
      - codeql
      - pnpm-audit
      - actionlint
      - gitleaks
    # Always run so the gate reports an explicit result (not "skipped").
    if: always()
    steps:
      - name: Validate CI results
        env:
          IS_RELEASE: ${{ needs.detect-release.outputs.skip }}
        run: |
          # Auto-pass for release-please PRs, commits, and merge queue entries
          if [[ "$IS_RELEASE" == "true" ]]; then
            echo "✅ Release-please — skipping CI gate"
            exit 0
          fi
          echo "::group::CI Gate Results"
          FAILED=0

          check_result() {
            local job="$1" result="$2"
            if [ "$result" = "success" ]; then
              echo "✅ $job: $result"
            else
              echo "::error::$job: expected success, got $result"
              FAILED=1
            fi
          }

          check_result "semgrep" "${{ needs.semgrep.result }}"
          check_result "codeql" "${{ needs.codeql.result }}"
          check_result "pnpm-audit" "${{ needs.pnpm-audit.result }}"
          check_result "actionlint" "${{ needs.actionlint.result }}"
          check_result "gitleaks" "${{ needs.gitleaks.result }}"

          echo "::endgroup::"
          exit $FAILED
