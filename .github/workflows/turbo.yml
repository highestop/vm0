            TODOIST_OAUTH_CLIENT_ID=${{ vars.TODOIST_OAUTH_CLIENT_ID }}
            TODOIST_OAUTH_CLIENT_SECRET=${{ secrets.TODOIST_OAUTH_CLIENT_SECRET }}
            ASANA_OAUTH_CLIENT_ID=${{ vars.ASANA_OAUTH_CLIENT_ID }}
            ASANA_OAUTH_CLIENT_SECRET=${{ secrets.ASANA_OAUTH_CLIENT_SECRET }}
            STRIPE_OAUTH_CLIENT_ID=${{ vars.STRIPE_OAUTH_CLIENT_ID }}
            STRIPE_OAUTH_CLIENT_SECRET=${{ secrets.STRIPE_OAUTH_CLIENT_SECRET }}
            NGROK_API_KEY=${{ secrets.NGROK_API_KEY }}
            NGROK_COMPUTER_CONNECTOR_DOMAIN=${{ vars.NGROK_COMPUTER_CONNECTOR_DOMAIN }}
            PLATFORM_URL=${{ needs.prepare.outputs.platform-preview-url }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            RESEND_WEBHOOK_SECRET=${{ secrets.RESEND_WEBHOOK_SECRET }}
            RESEND_FROM_DOMAIN=${{ vars.RESEND_FROM_DOMAIN }}
            VM0_DEFAULT_AGENT=${{ vars.VM0_DEFAULT_AGENT }}
            STRAPI_URL=${{ vars.STRAPI_URL }}
            GITHUB_APP_SLUG=${{ vars.VM0_GITHUB_APP_SLUG }}
            GITHUB_APP_ID=${{ vars.VM0_GITHUB_APP_ID }}
            GITHUB_APP_CLIENT_ID=${{ vars.VM0_GITHUB_APP_CLIENT_ID }}
            GITHUB_APP_CLIENT_SECRET=${{ secrets.VM0_GITHUB_APP_CLIENT_SECRET }}
            GITHUB_APP_WEBHOOK_SECRET=${{ secrets.VM0_GITHUB_APP_WEBHOOK_SECRET }}
            GITHUB_APP_PRIVATE_KEY=${{ secrets.VM0_GITHUB_APP_PRIVATE_KEY }}

      - name: Finish deployment
        uses: bobheadxi/deployments@v1
        if: always() && !(github.event_name == 'pull_request' && vars.PREVIEW_DOMAIN != '')
        with:
          step: finish
          token: ${{ github.token }}
          status: ${{ job.status }}
          env: ${{ steps.deployment.outputs.env }}
          env_url: ${{ steps.deploy.outputs.url }}
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}

      # Step 5: Create stable preview URL alias (when PREVIEW_DOMAIN is configured)
      - name: Create Vercel Alias
        id: alias
        if: vars.PREVIEW_DOMAIN != ''
        uses: ./.github/actions/vercel-alias
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ vars.VERCEL_TEAM_ID }}
          deployment-url: ${{ steps.deploy.outputs.url }}
          app-name: www
          job-ref: ${{ needs.prepare.outputs.job-ref }}
          preview-domain: ${{ vars.PREVIEW_DOMAIN }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          deployment-env: ${{ steps.deployment.outputs.env }}

      # Step 6: Generate test tokens for E2E tests (one per test user)
      - name: Generate E2E test tokens
        run: |
          for variant in serial runner; do
            e2e/scripts/generate-test-token.sh "$variant"
            cp ~/.vm0/config.json "/tmp/e2e-token-${variant}.json"
          done
        env:
          VM0_API_URL: ${{ steps.alias.outputs.url || steps.deploy.outputs.url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - run: cp /tmp/e2e-token-serial.json ~/.vm0/config.json
      - name: Save serial token to cache
        uses: actions/cache/save@v5
        with:
          path: ~/.vm0
          key: e2e-token-serial-${{ github.run_id }}-${{ github.run_attempt }}


      - run: cp /tmp/e2e-token-runner.json ~/.vm0/config.json
      - name: Save runner token to cache
        uses: actions/cache/save@v5
        with:
          path: ~/.vm0
          key: e2e-token-runner-${{ github.run_id }}-${{ github.run_attempt }}

  # Deploy docs application
  deploy-docs:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    needs: [prepare]
    # Deploy if job-ref is set (PR or main), not a release-please commit, and docs changed
    if: "${{ (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore: release')) && needs.prepare.outputs.job-ref != '' && needs.prepare.outputs.docs-changed == 'true' }}"
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init

      - name: Deploy Docs to Vercel
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ vars.VERCEL_TEAM_ID }}
          vercel-project-id: ${{ vars.VERCEL_PROJECT_ID_DOCS }}
          environment: preview
          deployment-env: docs
          meta-branch: ${{ github.head_ref || github.ref_name }}
          meta-pr: ${{ needs.prepare.outputs.job-ref }}
          skip-finish: ${{ github.event_name == 'pull_request' && vars.PREVIEW_DOMAIN != '' }}

      - name: Create Vercel Alias
        if: vars.PREVIEW_DOMAIN != ''
        uses: ./.github/actions/vercel-alias
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ vars.VERCEL_TEAM_ID }}
          deployment-url: ${{ steps.deploy.outputs.url }}
          app-name: docs
          job-ref: ${{ needs.prepare.outputs.job-ref }}
          preview-domain: ${{ vars.PREVIEW_DOMAIN }}
          deployment-id: ${{ steps.deploy.outputs.deployment-id }}
          deployment-env: ${{ steps.deploy.outputs.deployment-env }}

  # Deploy platform (Vite SPA)
  deploy-platform:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    needs: [prepare]
    # Deploy if job-ref is set (PR or main), not a release-please commit, and platform changed
    if: "${{ (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore: release')) && needs.prepare.outputs.job-ref != '' && needs.prepare.outputs.platform-changed == 'true' }}"
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init

      - name: Deploy Platform to Vercel
        id: deploy
        uses: ./.github/actions/vercel-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ vars.VERCEL_TEAM_ID }}
          vercel-project-id: ${{ vars.VERCEL_PROJECT_ID_PLATFORM }}
          environment: preview
          deployment-env: platform
          environment-variables: |
            VITE_CLERK_PUBLISHABLE_KEY=${{ vars.CLERK_PUBLISHABLE_KEY }}
            VITE_API_URL=${{ needs.prepare.outputs.web-preview-url }}
            VITE_SENTRY_DSN=${{ secrets.SENTRY_DSN_PLATFORM }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ vars.SENTRY_ORG }}
            SENTRY_PROJECT=${{ vars.SENTRY_PROJECT_PLATFORM }}
          meta-branch: ${{ github.head_ref || github.ref_name }}
          meta-pr: ${{ needs.prepare.outputs.job-ref }}
          skip-finish: ${{ github.event_name == 'pull_request' && vars.PREVIEW_DOMAIN != '' }}

      - name: Create Vercel Alias
        if: vars.PREVIEW_DOMAIN != ''
        uses: ./.github/actions/vercel-alias
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ vars.VERCEL_TEAM_ID }}
          deployment-url: ${{ steps.deploy.outputs.url }}
          app-name: platform
          job-ref: ${{ needs.prepare.outputs.job-ref }}
          preview-domain: ${{ vars.PREVIEW_DOMAIN }}
          deployment-id: ${{ steps.deploy.outputs.deployment-id }}
          deployment-env: ${{ steps.deploy.outputs.deployment-env }}

  # Verify device flow authentication works end-to-end (uses Playwright)
  # This job runs in parallel with E2E tests - it does NOT block them
  # E2E tests use the token generated by deploy-web instead
  e2e-auth:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    needs: [prepare, deploy-web]
    if: |
      (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore: release')) &&
      needs.prepare.outputs.job-ref != '' && (
        needs.prepare.outputs.web-changed == 'true' ||
        needs.prepare.outputs.cli-changed == 'true'
      )
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/toolchain-init

      - name: Setup pnpm global directory
        run: |
          mkdir -p $HOME/.local/share/pnpm
          pnpm config set global-bin-dir $HOME/.local/share/pnpm
          echo "$HOME/.local/share/pnpm" >> $GITHUB_PATH

      - name: Build CLI
        run: cd turbo && pnpm --filter @vm0/cli build

      - name: Setup CLI globally
        run: cd turbo/apps/cli && pnpm link --global

      - name: Install E2E dependencies
        run: cd e2e && npm install

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install chromium

      - name: Verify device flow authentication
        run: |
          echo "Verifying device flow with ${{ needs.deploy-web.outputs.preview-url }}"
          cd e2e && npm run auth
        env:
          VM0_API_URL: ${{ needs.deploy-web.outputs.preview-url }}
          CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Verify sign-in flow
        run: cd e2e && npx playwright test sign-in.spec.ts
        env:
          VM0_API_URL: ${{ needs.deploy-web.outputs.preview-url }}
          CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

  # Run CLI E2E tests - Phase 1: Serial tests (scope/provider CRUD)
  cli-e2e-01-serial:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    needs:
      [
        prepare,
        deploy-web,
        lint-eslint,
        lint-types,
        lint-format,
        lint-knip,
        test-web,
        test-cli,
        test-platform,
        test-other,
      ]
    if: |
      (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore: release')) &&
      needs.prepare.outputs.job-ref != '' && (
        needs.prepare.outputs.web-changed == 'true' ||
        needs.prepare.outputs.cli-changed == 'true' ||
        needs.prepare.outputs.crates-changed == 'true' ||
        needs.prepare.outputs.ci-changed == 'true' ||
        needs.prepare.outputs.e2e-changed == 'true'
      )
    timeout-minutes: 5
    permissions:
      actions: read # Required to query cache API
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/toolchain-init

      - name: Setup pnpm global directory
        run: |
          mkdir -p $HOME/.local/share/pnpm
          pnpm config set global-bin-dir $HOME/.local/share/pnpm
          echo "$HOME/.local/share/pnpm" >> $GITHUB_PATH

      - name: Build CLI
        run: cd turbo && pnpm --filter @vm0/cli build

      - name: Setup CLI globally
        run: cd turbo/apps/cli && pnpm link --global

      - name: Restore test token from cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.vm0
          key: e2e-token-serial-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            e2e-token-serial-${{ github.run_id }}-
          fail-on-cache-miss: true

      - name: Start Cron Simulator
        run: |
          chmod +x ./e2e/scripts/cron-simulator.sh
          ./e2e/scripts/cron-simulator.sh "$VM0_API_URL" 60 &
          echo "CRON_SIMULATOR_PID=$!" >> $GITHUB_ENV
        env:
          VM0_API_URL: ${{ needs.deploy-web.outputs.preview-url }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Run Serial E2E Tests
        run: |
          echo "=== Running Serial E2E Tests ==="
          BATS_TEST_TIMEOUT=30 ./e2e/test/libs/bats/bin/bats -T ./e2e/tests/01-serial/*.bats
          echo "✅ Serial tests passed"
        env:
          VM0_API_URL: ${{ needs.deploy-web.outputs.preview-url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          USE_MOCK_CLAUDE: "true"

      - name: Stop Cron Simulator
        if: always()
        run: |
          if [ -n "$CRON_SIMULATOR_PID" ]; then
            kill "$CRON_SIMULATOR_PID" 2>/dev/null || true
            echo "Cron simulator stopped"
          fi


  # Deploy runner prepare: cross-compile, deploy to all metal hosts, build rootfs/snapshot with mock URL
  # Runs in parallel with deploy-web since rootfs/snapshot don't need the preview URL
  # Skip on push to main - runner deployment is only needed for PRs
  deploy-runner-prepare:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain-rust:20260310
    needs: [prepare]
    timeout-minutes: 10
    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS: "-C target-feature=+crt-static -C link-arg=-fuse-ld=mold"
      CARGO_PROFILE: ci
      TARGET_TRIPLE: aarch64-unknown-linux-musl
    if: |
      github.event_name != 'push' &&
      needs.prepare.outputs.job-ref != '' && (
        needs.prepare.outputs.web-changed == 'true' ||
        needs.prepare.outputs.cli-changed == 'true' ||
        needs.prepare.outputs.crates-changed == 'true' ||
        needs.prepare.outputs.ci-changed == 'true' ||
        needs.prepare.outputs.e2e-changed == 'true'
      )
    outputs:
      bin-dir: ${{ steps.host.outputs.bin-dir }}
      runner-dir: ${{ steps.host.outputs.runner-dir }}
      runner-matrix: ${{ steps.runner-matrix.outputs.matrix }}
      chunk-count: ${{ steps.runner-matrix.outputs.chunk-count }}
      rootfs-hash: ${{ steps.deploy.outputs.rootfs-hash }}
      snapshot-hash: ${{ steps.deploy.outputs.snapshot-hash }}
    steps:
      - uses: actions/checkout@v6

      - name: Install mold linker
        env:
          MOLD_VERSION: "2.40.4"
        run: |
          curl -fsSL "https://github.com/rui314/mold/releases/download/v${MOLD_VERSION}/mold-${MOLD_VERSION}-x86_64-linux.tar.gz" \
            | tar xz --strip-components=2 -C /usr/local/bin "mold-${MOLD_VERSION}-x86_64-linux/bin/mold"
          ln -sf /usr/local/bin/mold /usr/local/bin/ld.mold
          ln -sf /usr/local/bin/mold /usr/local/bin/aarch64-linux-gnu-ld.mold

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target
          shared-key: aarch64-musl-ci
          save-if: ${{ github.ref == 'refs/heads/main' }}
          cache-targets: false

      - name: Cross-compile guest binaries for ARM64
        run: |
          cd crates
          cargo build --profile $CARGO_PROFILE --target $TARGET_TRIPLE \
            -p guest-agent -p guest-download -p guest-init -p guest-mock-claude

      - name: Cross-compile runner with embedded guests for ARM64
        run: |
          cd crates
          GUEST_AGENT_PATH=target/$TARGET_TRIPLE/$CARGO_PROFILE/guest-agent \
          GUEST_DOWNLOAD_PATH=target/$TARGET_TRIPLE/$CARGO_PROFILE/guest-download \
          GUEST_INIT_PATH=target/$TARGET_TRIPLE/$CARGO_PROFILE/guest-init \
          GUEST_MOCK_CLAUDE_PATH=target/$TARGET_TRIPLE/$CARGO_PROFILE/guest-mock-claude \
          cargo build --profile $CARGO_PROFILE --target $TARGET_TRIPLE -p runner

      - name: Setup SSH via Cloudflare Tunnel
        uses: ./.github/actions/setup-ssh-tunnel
        with:
          ssh-key: ${{ secrets.AWS_METAL_RUNNER_SSH_KEY }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Provision metal hosts
        uses: ./.github/actions/provision
        with:
          hosts: ${{ secrets.AWS_METAL_RUNNER_HOSTS }}
          metal-user: ${{ vars.AWS_METAL_RUNNER_USER }}
          grafana-cloud-prometheus-url: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          grafana-cloud-prometheus-user: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
          grafana-cloud-api-key: ${{ secrets.GRAFANA_CLOUD_API_KEY }}

      - name: Resolve metal hosts
        id: host
        env:
          METAL_HOSTS: ${{ secrets.AWS_METAL_RUNNER_HOSTS }}
          JOB_REF: ${{ needs.prepare.outputs.job-ref }}
        run: |
          echo "bin-dir=~/.vm0-runner/bin/${JOB_REF}" >> "$GITHUB_OUTPUT"
          echo "runner-dir=~/.vm0-runner/runners/${JOB_REF}" >> "$GITHUB_OUTPUT"
          NUM_HOSTS=$(echo "$METAL_HOSTS" | tr ',' '\n' | grep -c .)
          if [ "$NUM_HOSTS" -lt 1 ]; then
            echo "::error::AWS_METAL_RUNNER_HOSTS is empty"
            exit 1
          fi
          echo "Deploying to ${NUM_HOSTS} metal hosts"

      - name: Generate runner E2E test matrix
        id: runner-matrix
        shell: bash
        run: |
          # Split test files into chunks via random round-robin for balanced runtime
          mapfile -t FILES < <(ls e2e/tests/03-experimental-runner/*.bats | shuf)
          NUM_FILES=${#FILES[@]}
          NUM_CHUNKS=8
          [ "$NUM_CHUNKS" -gt "$NUM_FILES" ] && NUM_CHUNKS=$NUM_FILES
          echo "Runner E2E: $NUM_FILES files, $NUM_CHUNKS chunks"

          declare -a CHUNK_FILES
          for ((i=0; i<NUM_CHUNKS; i++)); do CHUNK_FILES[$i]=""; done
          for ((i=0; i<NUM_FILES; i++)); do
            idx=$((i % NUM_CHUNKS))
            CHUNK_FILES[$idx]="${CHUNK_FILES[$idx]:+${CHUNK_FILES[$idx]} }${FILES[$i]}"
          done

          CHUNKS="["
          for ((i=0; i<NUM_CHUNKS; i++)); do
            [ $i -gt 0 ] && CHUNKS="$CHUNKS,"
            file_count=$(echo ${CHUNK_FILES[$i]} | wc -w)
            CHUNKS="$CHUNKS{\"index\":$((i+1)),\"files\":\"${CHUNK_FILES[$i]}\"}"
            echo "Chunk $((i+1)): $file_count files"
          done
          echo "matrix=${CHUNKS}]" >> $GITHUB_OUTPUT
          echo "chunk-count=${NUM_CHUNKS}" >> $GITHUB_OUTPUT

      - name: Deploy binaries and build rootfs/snapshot on all metal hosts
        id: deploy
        shell: bash
        env:
          METAL_USER: ${{ vars.AWS_METAL_RUNNER_USER }}
          OFFICIAL_RUNNER_SECRET: ${{ secrets.OFFICIAL_RUNNER_SECRET }}
          METAL_HOSTS: ${{ secrets.AWS_METAL_RUNNER_HOSTS }}
          JOB_REF: ${{ needs.prepare.outputs.job-ref }}
          BIN_DIR: ${{ steps.host.outputs.bin-dir }}
          RUNNER_DIR: ${{ steps.host.outputs.runner-dir }}
        run: |
          TARGET_DIR="crates/target/${TARGET_TRIPLE}/${CARGO_PROFILE}"

          deploy_to_host() {
            local HOST=$1
            local HOST_INDEX=$2
            local RUNNER_NAME="${JOB_REF}-${HOST_INDEX}"
            local REMOTE="${METAL_USER}@${HOST}"
            echo "=== Deploying to ${HOST} (runner: ${RUNNER_NAME}) ==="

            # Clean previous run artifacts and upload runner (guests are embedded)
            ssh $REMOTE "rm -rf ${BIN_DIR} ${RUNNER_DIR} && mkdir -p ${BIN_DIR}"
            scp "${TARGET_DIR}/runner" "${REMOTE}:${BIN_DIR}/"

            # Clean up old rootfs/snapshots, keep the 3 most recent
            ssh $REMOTE "${BIN_DIR}/runner gc --keep-latest 3"

            # Run setup (downloads firecracker/kernel/mitmdump, cached + idempotent)
            ssh $REMOTE "${BIN_DIR}/runner setup"

            # Run build to create rootfs + snapshot (outputs hashes to stdout)
            ssh $REMOTE "${BIN_DIR}/runner build \
              --vcpu ${RUNNER_VCPU} \
              --memory-mb ${RUNNER_MEMORY_MB}"
            echo "=== Done deploying to ${HOST} ==="
          }

          LOG_DIR=$(mktemp -d)
          HOSTS=()
          PIDS=()
          HOST_INDEX=0
          for HOST in $(echo "$METAL_HOSTS" | tr ',' ' '); do
            HOST_INDEX=$((HOST_INDEX + 1))
            deploy_to_host "$HOST" "$HOST_INDEX" > "${LOG_DIR}/${HOST}.log" 2>&1 &
            PIDS+=($!)
            HOSTS+=("$HOST")
          done

          FAILED=0
          for i in "${!PIDS[@]}"; do
            if ! wait "${PIDS[$i]}"; then
              FAILED=1
              echo "::error::Deployment failed on ${HOSTS[$i]}"
            fi
            echo "=== ${HOSTS[$i]} ==="
            cat "${LOG_DIR}/${HOSTS[$i]}.log"
          done
          if [ "$FAILED" -ne 0 ]; then
            rm -rf "$LOG_DIR"
            exit 1
          fi

          # Extract build hashes from any host's log (all hosts produce identical hashes)
          FIRST_LOG=$(ls ${LOG_DIR}/*.log | head -1)
          ROOTFS_HASH=$(grep '^rootfs_hash=' "$FIRST_LOG" | cut -d= -f2)
          SNAPSHOT_HASH=$(grep '^snapshot_hash=' "$FIRST_LOG" | cut -d= -f2)
          rm -rf "$LOG_DIR"
          if [ -z "$ROOTFS_HASH" ] || [ -z "$SNAPSHOT_HASH" ]; then
            echo "::error::Failed to extract build hashes from log"
            exit 1
          fi
          echo "rootfs-hash=${ROOTFS_HASH}" >> "$GITHUB_OUTPUT"
          echo "snapshot-hash=${SNAPSHOT_HASH}" >> "$GITHUB_OUTPUT"

  # Deploy runner start: generate config with real preview URL and start service
  # Waits for both deploy-runner-prepare (binaries + rootfs/snapshot) and deploy-web (preview URL)
  deploy-runner-start:
    runs-on: ubuntu-latest
    needs: [prepare, deploy-runner-prepare, deploy-web]
    outputs:
      total-capacity: ${{ steps.start.outputs.total-capacity }}
    timeout-minutes: 2
    if: |
      github.event_name != 'push' &&
      needs.prepare.outputs.job-ref != '' && (
        needs.prepare.outputs.web-changed == 'true' ||
        needs.prepare.outputs.cli-changed == 'true' ||
        needs.prepare.outputs.crates-changed == 'true' ||
        needs.prepare.outputs.ci-changed == 'true' ||
        needs.prepare.outputs.e2e-changed == 'true'
      )
    steps:
      - uses: actions/checkout@v6

      - name: Setup SSH via Cloudflare Tunnel
        uses: ./.github/actions/setup-ssh-tunnel
        with:
          ssh-key: ${{ secrets.AWS_METAL_RUNNER_SSH_KEY }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      # Read METAL_HOSTS from secret directly — GitHub Actions masks secret values in job outputs
      - name: Rebuild config and start runner service on all hosts
        id: start
        env:
          METAL_USER: ${{ vars.AWS_METAL_RUNNER_USER }}
          OFFICIAL_RUNNER_SECRET: ${{ secrets.OFFICIAL_RUNNER_SECRET }}
          METAL_HOSTS: ${{ secrets.AWS_METAL_RUNNER_HOSTS }}
          JOB_REF: ${{ needs.prepare.outputs.job-ref }}
          BIN_DIR: ${{ needs.deploy-runner-prepare.outputs.bin-dir }}
          RUNNER_DIR: ${{ needs.deploy-runner-prepare.outputs.runner-dir }}
          ROOTFS_HASH: ${{ needs.deploy-runner-prepare.outputs.rootfs-hash }}
          SNAPSHOT_HASH: ${{ needs.deploy-runner-prepare.outputs.snapshot-hash }}
          PREVIEW_URL: ${{ needs.deploy-web.outputs.preview-url }}
          VERCEL_BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          start_on_host() {
            local HOST=$1
            local HOST_INDEX=$2
            local RUNNER_NAME="${JOB_REF}-${HOST_INDEX}"
            local REMOTE="${METAL_USER}@${HOST}"
            echo "=== Starting runner ${RUNNER_NAME} on ${HOST} ==="

            # Guard: ensure binary exists (fails fast on "Re-run failed jobs" without prepare)
            if ! ssh "$REMOTE" "test -x ${BIN_DIR}/runner"; then
              echo "::error::Runner binary not found on ${HOST}. Use 'Re-run all jobs' to redeploy the runner first."
              return 1
            fi

            # Generate runner.yaml with real preview URL (no build needed, uses cached hashes)
            ssh $REMOTE "${BIN_DIR}/runner config \
              --rootfs-hash ${ROOTFS_HASH} \
              --snapshot-hash ${SNAPSHOT_HASH} \
              --name ${RUNNER_NAME} \
              --group vm0/development-${JOB_REF} \
              --runner-dirname ${JOB_REF} \
              --vcpu ${RUNNER_VCPU} \
              --memory-mb ${RUNNER_MEMORY_MB} \
              --api-url ${PREVIEW_URL} \
              --token vm0_official_${OFFICIAL_RUNNER_SECRET}"

            # Start as systemd transient service
            ssh $REMOTE "${BIN_DIR}/runner service start \
              --name ${RUNNER_NAME} \
              --config ${RUNNER_DIR}/runner.yaml \
              --env VERCEL_AUTOMATION_BYPASS_SECRET=${VERCEL_BYPASS} \
              --env USE_MOCK_CLAUDE=true \
              --balloon-reclaim"

            # Health check — wait for runner startup, then verify
            sleep 5
            ssh $REMOTE "${BIN_DIR}/runner doctor --name ${RUNNER_NAME}"
            echo "=== Runner started on ${HOST} ==="
          }

          LOG_DIR=$(mktemp -d)
          HOSTS=()
          PIDS=()
          HOST_INDEX=0
          for HOST in $(echo "$METAL_HOSTS" | tr ',' ' '); do
            HOST_INDEX=$((HOST_INDEX + 1))
            start_on_host "$HOST" "$HOST_INDEX" > "${LOG_DIR}/${HOST}.log" 2>&1 &
            PIDS+=($!)
            HOSTS+=("$HOST")
          done

          FAILED=0
          for i in "${!PIDS[@]}"; do
            if ! wait "${PIDS[$i]}"; then
              FAILED=1
              echo "::error::Runner start failed on ${HOSTS[$i]}"
            fi
            echo "=== ${HOSTS[$i]} ==="
            cat "${LOG_DIR}/${HOSTS[$i]}.log"
          done
          rm -rf "$LOG_DIR"
          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

          # Sum auto-detected max_concurrent from all hosts' status.json
          TOTAL=0
          for HOST in $(echo "$METAL_HOSTS" | tr ',' ' '); do
            MC=$(ssh "${METAL_USER}@${HOST}" "grep -o '\"max_concurrent\": [0-9]*' ${RUNNER_DIR}/status.json | grep -o '[0-9]*'") || true
            if [ -z "$MC" ] || ! [[ "$MC" =~ ^[0-9]+$ ]]; then
              echo "::error::Failed to read max_concurrent from ${HOST}"
              exit 1
            fi
            echo "Host ${HOST}: max_concurrent=${MC}"
            TOTAL=$((TOTAL + MC))
          done
          echo "total-capacity=${TOTAL}" >> "$GITHUB_OUTPUT"
          echo "Total capacity across all hosts: ${TOTAL}"

  # Run CLI E2E tests - Phase 3: Runner tests (needs runner deployed)
  # Skip on push to main - runner tests are only needed for PRs
  cli-e2e-03-runner:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    needs:
      [
        prepare,
        deploy-web,
        deploy-runner-prepare,
        deploy-runner-start,
      ]
    if: |
      github.event_name != 'push' &&
      needs.prepare.outputs.job-ref != '' && (
        needs.prepare.outputs.web-changed == 'true' ||
        needs.prepare.outputs.cli-changed == 'true' ||
        needs.prepare.outputs.crates-changed == 'true' ||
        needs.prepare.outputs.ci-changed == 'true' ||
        needs.prepare.outputs.e2e-changed == 'true'
      )
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.deploy-runner-prepare.outputs.runner-matrix) }}
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/toolchain-init

      - name: Setup pnpm global directory
        run: |
          mkdir -p $HOME/.local/share/pnpm
          pnpm config set global-bin-dir $HOME/.local/share/pnpm
          echo "$HOME/.local/share/pnpm" >> $GITHUB_PATH

      - name: Build CLI
        run: cd turbo && pnpm --filter @vm0/cli build

      - name: Setup CLI globally
        run: cd turbo/apps/cli && pnpm link --global

      - name: Install GNU parallel for bats
        run: rm -rf /var/lib/apt/lists/* && apt-get update && apt-get install -y parallel

      - name: Restore test token from cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.vm0
          key: e2e-token-runner-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            e2e-token-runner-${{ github.run_id }}-
          fail-on-cache-miss: true

      - name: Bootstrap test account
        run: |
          vm0 scope set "e2e-runner" --force
          vm0 model-provider setup --type "claude-code-oauth-token" --secret "mock-oauth-token-for-e2e"
        env:
          VM0_API_URL: ${{ needs.deploy-web.outputs.preview-url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Start Cron Simulator
        run: |
          chmod +x ./e2e/scripts/cron-simulator.sh
          ./e2e/scripts/cron-simulator.sh "$VM0_API_URL" 60 &
          echo "CRON_SIMULATOR_PID=$!" >> $GITHUB_ENV
        env:
          VM0_API_URL: ${{ needs.deploy-web.outputs.preview-url }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Setup SSH via Cloudflare Tunnel
        uses: ./.github/actions/setup-ssh-tunnel
        with:
          ssh-key: ${{ secrets.AWS_METAL_RUNNER_SSH_KEY }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Verify runners are deployed
        env:
          METAL_USER: ${{ vars.AWS_METAL_RUNNER_USER }}
          METAL_HOSTS: ${{ secrets.AWS_METAL_RUNNER_HOSTS }}
          BIN_DIR: ${{ needs.deploy-runner-prepare.outputs.bin-dir }}
          JOB_REF: ${{ needs.prepare.outputs.job-ref }}
        run: |
          HOST_INDEX=0
          for HOST in $(echo "$METAL_HOSTS" | tr ',' ' '); do
            HOST_INDEX=$((HOST_INDEX + 1))
            RUNNER_NAME="${JOB_REF}-${HOST_INDEX}"
            REMOTE="${METAL_USER}@${HOST}"
            echo "Checking runner ${RUNNER_NAME} on ${HOST}..."
            if ! ssh "$REMOTE" "test -x ${BIN_DIR}/runner"; then
              echo "::error::Runner binary not found on ${HOST}. The cleanup job may have already run. Use 'Re-run all jobs' to redeploy the runner first."
              exit 1
            fi
            if ! ssh "$REMOTE" "${BIN_DIR}/runner doctor --name ${RUNNER_NAME}"; then
              echo "::error::Runner ${RUNNER_NAME} not healthy on ${HOST}. Use 'Re-run all jobs' to redeploy the runner first."
              exit 1
            fi
          done
          echo "All runners reachable"

      - name: Run Runner E2E Tests (Chunk ${{ matrix.index }})
        run: |
          if [ -z "$RUNNER_CHUNK_COUNT" ] || [ "$RUNNER_CHUNK_COUNT" -eq 0 ]; then
            echo "::error::RUNNER_CHUNK_COUNT is empty or zero"
            exit 1
          fi
          PARALLEL=$(( RUNNER_TOTAL_CAPACITY / RUNNER_CHUNK_COUNT ))
          [ "$PARALLEL" -lt 1 ] && PARALLEL=1
          echo "=== Running Runner E2E Tests (Chunk ${{ matrix.index }}, ${PARALLEL} parallel, total capacity ${RUNNER_TOTAL_CAPACITY}) ==="
          echo "Files: ${{ matrix.files }}"
          BATS_TEST_TIMEOUT=60 RUNNER_GROUP="vm0/development-${JOB_REF}" ./e2e/test/libs/bats/bin/bats -T -j "${PARALLEL}" --no-parallelize-within-files ${{ matrix.files }}
          echo "✅ Chunk ${{ matrix.index }} tests passed"
        env:
          RUNNER_TOTAL_CAPACITY: ${{ needs.deploy-runner-start.outputs.total-capacity }}
          RUNNER_CHUNK_COUNT: ${{ needs.deploy-runner-prepare.outputs.chunk-count }}
          VM0_API_URL: ${{ needs.deploy-web.outputs.preview-url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          USE_MOCK_CLAUDE: "true"
          ANTHROPIC_API_KEY: ${{ secrets.CI_ANTHROPIC_API_KEY }}
          JOB_REF: ${{ needs.prepare.outputs.job-ref }}
          OFFICIAL_RUNNER_SECRET: ${{ secrets.OFFICIAL_RUNNER_SECRET }}
          CI_GITHUB_TOKEN: ${{ github.token }}

      - name: Stop Cron Simulator
        if: always()
        run: |
          if [ -n "$CRON_SIMULATOR_PID" ]; then
            kill "$CRON_SIMULATOR_PID" 2>/dev/null || true
            echo "Cron simulator stopped"
          fi

  # Runner stress test: submit concurrent jobs with mock Claude to validate queue + stability
  # Only runs on PRs with the 'stress-test' label (opt-in)
  runner-stress-test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    needs:
      [
        prepare,
        deploy-web,
        deploy-runner-prepare,
        deploy-runner-start,
        cli-e2e-03-runner,
      ]
    if: |
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'stress-test')
    timeout-minutes: 30
    env:
      STRESS_PROMPT: "sleep 10 && echo done"
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init

      - name: Setup pnpm global directory
        run: |
          mkdir -p $HOME/.local/share/pnpm
          pnpm config set global-bin-dir $HOME/.local/share/pnpm
          echo "$HOME/.local/share/pnpm" >> $GITHUB_PATH

      - name: Build CLI
        run: cd turbo && pnpm --filter @vm0/cli build

      - name: Setup CLI globally
        run: cd turbo/apps/cli && pnpm link --global

      - name: Restore test token from cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.vm0
          key: e2e-token-runner-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            e2e-token-runner-${{ github.run_id }}-
          fail-on-cache-miss: true

      - name: Bootstrap test account
        run: |
          vm0 scope set "e2e-runner" --force
          vm0 model-provider setup --type "claude-code-oauth-token" --secret "mock-oauth-token-for-e2e"
        env:
          VM0_API_URL: ${{ needs.deploy-web.outputs.preview-url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Start Cron Simulator
        run: |
          chmod +x ./e2e/scripts/cron-simulator.sh
          ./e2e/scripts/cron-simulator.sh "$VM0_API_URL" 60 &
          echo "CRON_SIMULATOR_PID=$!" >> $GITHUB_ENV
        env:
          VM0_API_URL: ${{ needs.deploy-web.outputs.preview-url }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}

      - name: Create stress test agent
        id: agent
        run: |
          AGENT_NAME="stress-test-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cat > /tmp/stress-agent.yaml <<EOF
          version: "1.0"
          agents:
            ${AGENT_NAME}:
              description: "Stress test agent"
              framework: claude-code
              experimental_runner:
                group: vm0/development-${JOB_REF}
          EOF
          vm0 compose /tmp/stress-agent.yaml
          echo "agent-name=${AGENT_NAME}" >> "$GITHUB_OUTPUT"
        env:
          VM0_API_URL: ${{ needs.deploy-web.outputs.preview-url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          JOB_REF: ${{ needs.prepare.outputs.job-ref }}

      - name: Run stress test
        run: |
          TOTAL_CAPACITY="${{ needs.deploy-runner-start.outputs.total-capacity }}"
          JOB_COUNT=$(( TOTAL_CAPACITY * 2 ))
          echo "Runner capacity: ${TOTAL_CAPACITY}, submitting ${JOB_COUNT} jobs (2x capacity)"
          chmod +x ./e2e/scripts/stress-test.sh
          ./e2e/scripts/stress-test.sh \
            "${{ steps.agent.outputs.agent-name }}" \
            "$JOB_COUNT" \
            "$STRESS_PROMPT" \
            "30" \
            "$TOTAL_CAPACITY"
        env:
          VM0_API_URL: ${{ needs.deploy-web.outputs.preview-url }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          JOB_REF: ${{ needs.prepare.outputs.job-ref }}
          OFFICIAL_RUNNER_SECRET: ${{ secrets.OFFICIAL_RUNNER_SECRET }}

      - name: Stop Cron Simulator
        if: always()
        run: |
          if [ -n "$CRON_SIMULATOR_PID" ]; then
            kill "$CRON_SIMULATOR_PID" 2>/dev/null || true
            echo "Cron simulator stopped"
          fi

  # Stop runner service and clean up after cli-e2e-03-runner completes (or fails/times out)
  # Skip on push to main - runner deployment is only needed for PRs
  cleanup-runner:
    runs-on: ubuntu-latest
    needs: [prepare, deploy-runner-prepare, deploy-runner-start, cli-e2e-03-runner, runner-stress-test]
    if: |
      always() &&
      github.event_name != 'push' &&
      needs.deploy-runner-prepare.outputs.bin-dir != ''
    steps:
      - uses: actions/checkout@v6

      - name: Install Ansible
        run: pip3 install ansible

      - name: Setup SSH via Cloudflare Tunnel
        uses: ./.github/actions/setup-ssh-tunnel
        with:
          ssh-key: ${{ secrets.AWS_METAL_RUNNER_SSH_KEY }}
          cf-access-client-id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          cf-access-client-secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Cleanup runner on all metal hosts
        env:
          METAL_USER: ${{ vars.AWS_METAL_RUNNER_USER }}
          METAL_HOSTS: ${{ secrets.AWS_METAL_RUNNER_HOSTS }}
          JOB_REF: ${{ needs.prepare.outputs.job-ref }}
        run: |
          cd ansible
          ansible-playbook \
            -i "${METAL_HOSTS}," \
            playbooks/cleanup-turbo-runner.yml \
            -e "ansible_user=${METAL_USER}" \
            -e "job_ref=${JOB_REF}" \
            -v || true

  # Build E2B templates (development account)
  # Uses repository-level E2B_API_KEY secret
  build-e2b-template:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    needs: [prepare]
    # Build on PR or main push when E2B templates changed, skip release-please commits
    if: |
      (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore: release')) &&
      needs.prepare.outputs.e2b-changed == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init

      - name: Build E2B templates
        working-directory: turbo
        env:
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
        run: |
          pnpm e2b:cli:build

      - name: Build summary
        run: echo "✅ E2B templates built successfully (development account)"

