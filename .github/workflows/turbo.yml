name: Turbo

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

env:
  # Sandbox VM parameters for runner build
  RUNNER_VCPU: 2
  RUNNER_MEMORY_MB: 2048

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || (github.event_name == 'merge_group' && format('merge-queue-{0}', github.run_id) || 'staging') }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Prepare: detect changes and set job-ref identifier
  prepare:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    outputs:
      job-ref: ${{ steps.set-job-ref.outputs.job-ref }}
      web-preview-url: ${{ steps.preview-urls.outputs.web-url }}
      platform-preview-url: ${{ steps.preview-urls.outputs.platform-url }}
      web-changed: ${{ steps.detect.outputs.web-changed }}
      docs-changed: ${{ steps.detect.outputs.docs-changed }}
      cli-changed: ${{ steps.detect.outputs.cli-changed }}
      platform-changed: ${{ steps.detect.outputs.platform-changed }}
      e2b-changed: ${{ steps.detect-e2b.outputs.e2b-changed }}
      migration-changed: ${{ steps.detect-migration.outputs.migration-changed }}
      crates-changed: ${{ steps.detect-crates.outputs.crates-changed }}
      ci-changed: ${{ steps.detect-ci.outputs.ci-changed }}
      e2e-changed: ${{ steps.detect-e2e.outputs.e2e-changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git safe directory
        run: git config --global --add safe.directory /__w/vm0/vm0

      - name: Detect changes
        id: detect
        run: |
          echo "Checking for changes..."

          # Determine base ref based on event type
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF=$(git merge-base ${{ github.event.pull_request.base.sha }} HEAD)
            echo "PR mode: comparing against merge base $BASE_REF"
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            BASE_REF="${{ github.event.merge_group.base_sha }}"
            echo "Merge queue mode: comparing against base $BASE_REF"
          else
            BASE_REF="HEAD^"
            echo "Main push mode: comparing against HEAD^"
          fi

          # Run changed.sh to get all package changes in one go
          CHANGES_JSON=$(./scripts/changed.sh $BASE_REF)

          # Parse JSON and set outputs for each app
          for app in $(ls turbo/apps); do
            # Get the package name from package.json
            if [ -f "turbo/apps/$app/package.json" ]; then
              PKG_NAME=$(jq -r '.name' "turbo/apps/$app/package.json")
              CHANGED=$(echo "$CHANGES_JSON" | jq -r ".\"$PKG_NAME\" // false")

              if [ "$CHANGED" = "true" ]; then
                echo "Changes detected in $app ($PKG_NAME)"
                echo "${app}-changed=true" >> $GITHUB_OUTPUT
              else
                echo "No changes in $app ($PKG_NAME)"
                echo "${app}-changed=false" >> $GITHUB_OUTPUT
              fi
            else
              echo "No package.json for $app, skipping"
              echo "${app}-changed=false" >> $GITHUB_OUTPUT
            fi
          done

      - name: Detect E2B template changes
        id: detect-e2b
        run: |
          # Determine base ref based on event type
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF=$(git merge-base ${{ github.event.pull_request.base.sha }} HEAD)
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            BASE_REF="${{ github.event.merge_group.base_sha }}"
          else
            BASE_REF="HEAD^"
          fi

          # Check if E2B template files changed
          if git diff --name-only "$BASE_REF" HEAD | grep -q "^turbo/scripts/e2b/"; then
            echo "E2B template changes detected"
            echo "e2b-changed=true" >> $GITHUB_OUTPUT
          else
            echo "No E2B template changes"
            echo "e2b-changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect migration/schema changes
        id: detect-migration
        run: |
          # Determine base ref based on event type
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF=$(git merge-base ${{ github.event.pull_request.base.sha }} HEAD)
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            BASE_REF="${{ github.event.merge_group.base_sha }}"
          else
            BASE_REF="HEAD^"
          fi

          # Check if migration or schema files changed
          if git diff --name-only "$BASE_REF" HEAD | grep -qE "^turbo/apps/web/src/db/(migrations|schema)/"; then
            echo "Migration or schema changes detected"
            echo "migration-changed=true" >> $GITHUB_OUTPUT
          else
            echo "No migration or schema changes"
            echo "migration-changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect crates changes
        id: detect-crates
        run: |
          # Determine base ref based on event type
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF=$(git merge-base ${{ github.event.pull_request.base.sha }} HEAD)
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            BASE_REF="${{ github.event.merge_group.base_sha }}"
          else
            BASE_REF="HEAD^"
          fi

          if git diff --name-only "$BASE_REF" HEAD | grep -q "^crates/"; then
            echo "Crates changes detected"
            echo "crates-changed=true" >> $GITHUB_OUTPUT
          else
            echo "No crates changes"
            echo "crates-changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect CI workflow changes
        id: detect-ci
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF=$(git merge-base ${{ github.event.pull_request.base.sha }} HEAD)
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            BASE_REF="${{ github.event.merge_group.base_sha }}"
          else
            BASE_REF="HEAD^"
          fi

          if git diff --name-only "$BASE_REF" HEAD | grep -qE "^\.github/workflows/turbo\.yml$|^ansible/"; then
            echo "CI workflow changes detected"
            echo "ci-changed=true" >> $GITHUB_OUTPUT
          else
            echo "No CI workflow changes"
            echo "ci-changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect E2E test changes
        id: detect-e2e
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF=$(git merge-base ${{ github.event.pull_request.base.sha }} HEAD)
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            BASE_REF="${{ github.event.merge_group.base_sha }}"
          else
            BASE_REF="HEAD^"
          fi

          if git diff --name-only "$BASE_REF" HEAD | grep -q "^e2e/"; then
            echo "E2E test changes detected"
            echo "e2e-changed=true" >> $GITHUB_OUTPUT
          else
            echo "No E2E test changes"
            echo "e2e-changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set job-ref
        id: set-job-ref
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "job-ref=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "Job ref set to: pr-${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "merge_group" ]; then
            echo "job-ref=" >> $GITHUB_OUTPUT
            echo "Job ref set to: (empty - merge_group will skip deployments)"
          else
            echo "job-ref=staging" >> $GITHUB_OUTPUT
            echo "Job ref set to: staging"
          fi

      - name: Set preview URLs
        id: preview-urls
        run: |
          JOB_REF="${{ steps.set-job-ref.outputs.job-ref }}"
          PREVIEW_DOMAIN="${{ vars.PREVIEW_DOMAIN }}"

          if [ -n "$PREVIEW_DOMAIN" ] && [ -n "$JOB_REF" ]; then
            echo "web-url=https://${JOB_REF}-www.${PREVIEW_DOMAIN}" >> $GITHUB_OUTPUT
            echo "platform-url=https://${JOB_REF}-platform.${PREVIEW_DOMAIN}" >> $GITHUB_OUTPUT
            echo "Preview URL set to: https://${JOB_REF}-www.${PREVIEW_DOMAIN}"
          else
            echo "web-url=" >> $GITHUB_OUTPUT
            echo "platform-url=" >> $GITHUB_OUTPUT
            echo "Preview URL not set (PREVIEW_DOMAIN or job-ref is empty)"
          fi


  file-size-check:
    runs-on: ubuntu-latest
    # Skip for release-please commits (only version bumps and changelogs)
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore: release') }}"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check file sizes
        run: |
          # Get changed files in PR
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA=${{ github.event.pull_request.base.sha }}
          else
            BASE_SHA="HEAD^"
          fi

          # Get list of added/modified files (exclude deleted)
          CHANGED_FILES=$(git diff --name-only --diff-filter=AM "$BASE_SHA" HEAD)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No files changed"
            exit 0
          fi

          # Filter out whitelisted files
          FILTERED_FILES=$(echo "$CHANGED_FILES" | grep -v -E '^turbo/apps/web/public/(og-image\.png|assets/(cta-ellipse\.png|code_illustration\.svg))$' || true)

          if [ -z "$FILTERED_FILES" ]; then
            echo "All changed files are whitelisted"
            exit 0
          fi

          # Check file sizes
          ./scripts/check-file-size.sh $FILTERED_FILES

  # Lint jobs - split into 4 parallel jobs for faster CI
  lint-eslint:
    runs-on: ubuntu-latest
    # Skip for release-please commits (only version bumps and changelogs)
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore: release') }}"
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init
      - name: Lint
        working-directory: turbo
        run: pnpm lint

  lint-types:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init
      - name: Type Check
        working-directory: turbo
        run: pnpm check-types

  lint-format:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init
      - name: Prettier
        working-directory: turbo
        run: pnpm prettier --check .

  lint-knip:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init
      - name: Knip
        working-directory: turbo
        run: pnpm knip

  # Test jobs - split into 4 parallel jobs by project
  test-web:
    needs: prepare
    runs-on: ubuntu-latest
    # Skip for release-please commits (only version bumps and changelogs)
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore: release') }}"
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    services:
      postgres:
        image: postgres:17-alpine
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init
      - name: Run Database Migrations
        working-directory: turbo
        env:
          DATABASE_URL: postgresql://postgres@postgres:5432/postgres
        run: pnpm --filter web db:migrate
      - name: Test Web
        working-directory: turbo
        env:
          DATABASE_URL: postgresql://postgres@postgres:5432/postgres
        run: pnpm vitest run --project=web

  test-migrate:
    needs: prepare
    runs-on: ubuntu-latest
    # Only run when migration or schema files changed
    if: needs.prepare.outputs.migration-changed == 'true'
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    services:
      postgres:
        image: postgres:17-alpine
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init
      - name: Test Migration Consistency
        working-directory: turbo/apps/web
        env:
          DATABASE_URL: postgresql://postgres@postgres:5432/postgres
        run: pnpm tsx scripts/test-migration-consistency-schema.ts

  test-cli:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init
      - name: Test CLI
        working-directory: turbo
        run: pnpm vitest run --project=@vm0/cli

  test-platform:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init
      - name: Test Platform
        working-directory: turbo
        run: pnpm vitest run --project=@vm0/platform

  test-other:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain-rust:20260310
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init
      - name: Test Other Packages
        working-directory: turbo
        run: pnpm vitest run --project=@vm0/core --project=@vm0/ui

  # Deploy web application with database
  deploy-web:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/vm0-ai/vm0-toolchain:20260310
    needs: [prepare]
    # Deploy if job-ref is set (PR or main), not a release-please commit, and web, CLI, runner, or platform changed
    if: |
      (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore: release')) &&
      needs.prepare.outputs.job-ref != '' && (
        needs.prepare.outputs.web-changed == 'true' ||
        needs.prepare.outputs.cli-changed == 'true' ||
        needs.prepare.outputs.platform-changed == 'true' ||
        needs.prepare.outputs.crates-changed == 'true' ||
        needs.prepare.outputs.ci-changed == 'true' ||
        needs.prepare.outputs.e2e-changed == 'true'
      )
    outputs:
      preview-url: ${{ steps.alias.outputs.url || steps.deploy.outputs.url }}
    permissions:
      contents: read
      pull-requests: write
      deployments: write
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/toolchain-init

      # Step 1: Setup Vercel CLI and project config (needed by build)
      - name: Setup Vercel
        uses: ./.github/actions/vercel-setup
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ vars.VERCEL_TEAM_ID }}
          vercel-project-id: ${{ vars.VERCEL_PROJECT_ID_WEB }}

      # Step 2: Create Neon branch + Build web in parallel
      - name: Create Neon Branch and Build Web
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          BLOG_BASE_URL: ${{ needs.prepare.outputs.web-preview-url }}
          CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_USER_STORAGES_BUCKET_NAME: ${{ vars.R2_USER_STORAGES_BUCKET_NAME }}
          SECRETS_ENCRYPTION_KEY: ${{ secrets.SECRETS_ENCRYPTION_KEY }}
          OFFICIAL_RUNNER_SECRET: ${{ secrets.OFFICIAL_RUNNER_SECRET }}
          AXIOM_TOKEN_SESSIONS: ${{ secrets.AXIOM_TOKEN_SESSIONS }}
          AXIOM_TOKEN_TELEMETRY: ${{ secrets.AXIOM_TOKEN_TELEMETRY }}
          AXIOM_DATASET_SUFFIX: dev
          USE_MOCK_CLAUDE: "true"
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          ABLY_API_KEY: ${{ secrets.ABLY_API_KEY }}
          CONCURRENT_RUN_LIMIT: "0"
          VM0_DEBUG: "*"
          CLAUDE_CODE_VERSION_URL: ${{ vars.CLAUDE_CODE_VERSION_URL }}
          SLACK_CLIENT_ID: ${{ vars.SLACK_CLIENT_ID }}
          SLACK_CLIENT_SECRET: ${{ secrets.SLACK_CLIENT_SECRET }}
          SLACK_SIGNING_SECRET: ${{ secrets.SLACK_SIGNING_SECRET }}
          SLACK_REDIRECT_BASE_URL: ${{ needs.prepare.outputs.web-preview-url }}
          SLACK_DEFAULT_AGENT: ${{ vars.SLACK_DEFAULT_AGENT }}
          SENTRY_DSN_WEB: ${{ secrets.SENTRY_DSN_WEB }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_WEB }}
          GH_OAUTH_CLIENT_ID: ${{ vars.GH_OAUTH_CLIENT_ID }}
          GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          NOTION_OAUTH_CLIENT_ID: ${{ vars.NOTION_OAUTH_CLIENT_ID }}
          NOTION_OAUTH_CLIENT_SECRET: ${{ secrets.NOTION_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          MICROSOFT_OAUTH_CLIENT_ID: ${{ vars.MICROSOFT_OAUTH_CLIENT_ID }}
          MICROSOFT_OAUTH_CLIENT_SECRET: ${{ secrets.MICROSOFT_OAUTH_CLIENT_SECRET }}
          LINEAR_OAUTH_CLIENT_ID: ${{ vars.LINEAR_OAUTH_CLIENT_ID }}
          LINEAR_OAUTH_CLIENT_SECRET: ${{ secrets.LINEAR_OAUTH_CLIENT_SECRET }}
          FIGMA_OAUTH_CLIENT_ID: ${{ vars.FIGMA_OAUTH_CLIENT_ID }}
          FIGMA_OAUTH_CLIENT_SECRET: ${{ secrets.FIGMA_OAUTH_CLIENT_SECRET }}
          DEEL_OAUTH_CLIENT_ID: ${{ vars.DEEL_OAUTH_CLIENT_ID }}
          DEEL_OAUTH_CLIENT_SECRET: ${{ secrets.DEEL_OAUTH_CLIENT_SECRET }}
          DOCUSIGN_OAUTH_CLIENT_ID: ${{ vars.DOCUSIGN_OAUTH_CLIENT_ID }}
          DOCUSIGN_OAUTH_CLIENT_SECRET: ${{ secrets.DOCUSIGN_OAUTH_CLIENT_SECRET }}
          DROPBOX_OAUTH_CLIENT_ID: ${{ vars.DROPBOX_OAUTH_CLIENT_ID }}
          DROPBOX_OAUTH_CLIENT_SECRET: ${{ secrets.DROPBOX_OAUTH_CLIENT_SECRET }}
          NEON_OAUTH_CLIENT_ID: ${{ vars.NEON_OAUTH_CLIENT_ID }}
          NEON_OAUTH_CLIENT_SECRET: ${{ secrets.NEON_OAUTH_CLIENT_SECRET }}
          REDDIT_OAUTH_CLIENT_ID: ${{ vars.REDDIT_OAUTH_CLIENT_ID }}
          REDDIT_OAUTH_CLIENT_SECRET: ${{ secrets.REDDIT_OAUTH_CLIENT_SECRET }}
          X_OAUTH_CLIENT_ID: ${{ vars.X_OAUTH_CLIENT_ID }}
          X_OAUTH_CLIENT_SECRET: ${{ secrets.X_OAUTH_CLIENT_SECRET }}
          VERCEL_OAUTH_CLIENT_ID: ${{ vars.VERCEL_OAUTH_CLIENT_ID }}
          VERCEL_OAUTH_CLIENT_SECRET: ${{ secrets.VERCEL_OAUTH_CLIENT_SECRET }}
          VERCEL_INTEGRATION_SLUG: ${{ vars.VERCEL_INTEGRATION_SLUG }}
          SENTRY_OAUTH_CLIENT_ID: ${{ vars.SENTRY_OAUTH_CLIENT_ID }}
          SENTRY_OAUTH_CLIENT_SECRET: ${{ secrets.SENTRY_OAUTH_CLIENT_SECRET }}
          INTERVALS_ICU_OAUTH_CLIENT_ID: ${{ vars.INTERVALS_ICU_OAUTH_CLIENT_ID }}
          INTERVALS_ICU_OAUTH_CLIENT_SECRET: ${{ secrets.INTERVALS_ICU_OAUTH_CLIENT_SECRET }}
          XERO_OAUTH_CLIENT_ID: ${{ vars.XERO_OAUTH_CLIENT_ID }}
          MONDAY_OAUTH_CLIENT_ID: ${{ vars.MONDAY_OAUTH_CLIENT_ID }}
          MONDAY_OAUTH_APP_ID: ${{ vars.MONDAY_OAUTH_APP_ID }}
          XERO_OAUTH_CLIENT_SECRET: ${{ secrets.XERO_OAUTH_CLIENT_SECRET }}
          MONDAY_OAUTH_CLIENT_SECRET: ${{ secrets.MONDAY_OAUTH_CLIENT_SECRET }}
          WEBFLOW_OAUTH_CLIENT_ID: ${{ vars.WEBFLOW_OAUTH_CLIENT_ID }}
          WEBFLOW_OAUTH_CLIENT_SECRET: ${{ secrets.WEBFLOW_OAUTH_CLIENT_SECRET }}
          CANVA_OAUTH_CLIENT_ID: ${{ vars.CANVA_OAUTH_CLIENT_ID }}
          CANVA_OAUTH_CLIENT_SECRET: ${{ secrets.CANVA_OAUTH_CLIENT_SECRET }}
          SUPABASE_OAUTH_CLIENT_ID: ${{ vars.SUPABASE_OAUTH_CLIENT_ID }}
          SUPABASE_OAUTH_CLIENT_SECRET: ${{ secrets.SUPABASE_OAUTH_CLIENT_SECRET }}
          HUBSPOT_OAUTH_CLIENT_ID: ${{ vars.HUBSPOT_OAUTH_CLIENT_ID }}
          HUBSPOT_OAUTH_CLIENT_SECRET: ${{ secrets.HUBSPOT_OAUTH_CLIENT_SECRET }}
          CLOSE_OAUTH_CLIENT_ID: ${{ vars.CLOSE_OAUTH_CLIENT_ID }}
          CLOSE_OAUTH_CLIENT_SECRET: ${{ secrets.CLOSE_OAUTH_CLIENT_SECRET }}
          META_ADS_OAUTH_CLIENT_ID: ${{ vars.META_ADS_OAUTH_CLIENT_ID }}
          META_ADS_OAUTH_CLIENT_SECRET: ${{ secrets.META_ADS_OAUTH_CLIENT_SECRET }}
          AHREFS_OAUTH_CLIENT_ID: ${{ vars.AHREFS_OAUTH_CLIENT_ID }}
          AHREFS_OAUTH_CLIENT_SECRET: ${{ secrets.AHREFS_OAUTH_CLIENT_SECRET }}
          AIRTABLE_OAUTH_CLIENT_ID: ${{ vars.AIRTABLE_OAUTH_CLIENT_ID }}
          AIRTABLE_OAUTH_CLIENT_SECRET: ${{ secrets.AIRTABLE_OAUTH_CLIENT_SECRET }}
          TODOIST_OAUTH_CLIENT_ID: ${{ vars.TODOIST_OAUTH_CLIENT_ID }}
          TODOIST_OAUTH_CLIENT_SECRET: ${{ secrets.TODOIST_OAUTH_CLIENT_SECRET }}
          ASANA_OAUTH_CLIENT_ID: ${{ vars.ASANA_OAUTH_CLIENT_ID }}
          ASANA_OAUTH_CLIENT_SECRET: ${{ secrets.ASANA_OAUTH_CLIENT_SECRET }}
          POSTHOG_OAUTH_CLIENT_ID: ${{ vars.POSTHOG_OAUTH_CLIENT_ID }}
          POSTHOG_OAUTH_CLIENT_SECRET: ${{ secrets.POSTHOG_OAUTH_CLIENT_SECRET }}
          STRIPE_OAUTH_CLIENT_ID: ${{ vars.STRIPE_OAUTH_CLIENT_ID }}
          STRIPE_OAUTH_CLIENT_SECRET: ${{ secrets.STRIPE_OAUTH_CLIENT_SECRET }}
          NGROK_API_KEY: ${{ secrets.NGROK_API_KEY }}
          NGROK_COMPUTER_CONNECTOR_DOMAIN: ${{ vars.NGROK_COMPUTER_CONNECTOR_DOMAIN }}
          PLATFORM_URL: ${{ needs.prepare.outputs.platform-preview-url }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_WEBHOOK_SECRET: ${{ secrets.RESEND_WEBHOOK_SECRET }}
          RESEND_FROM_DOMAIN: ${{ vars.RESEND_FROM_DOMAIN }}
          VM0_DEFAULT_AGENT: ${{ vars.VM0_DEFAULT_AGENT }}
          STRAPI_URL: ${{ vars.STRAPI_URL }}
          GITHUB_APP_SLUG: ${{ vars.VM0_GITHUB_APP_SLUG }}
          GITHUB_APP_ID: ${{ vars.VM0_GITHUB_APP_ID }}
          GITHUB_APP_CLIENT_ID: ${{ vars.VM0_GITHUB_APP_CLIENT_ID }}
          GITHUB_APP_CLIENT_SECRET: ${{ secrets.VM0_GITHUB_APP_CLIENT_SECRET }}
          GITHUB_APP_WEBHOOK_SECRET: ${{ secrets.VM0_GITHUB_APP_WEBHOOK_SECRET }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.VM0_GITHUB_APP_PRIVATE_KEY }}
        run: |
          # --- Start Neon branch creation in background ---
          (
            if ! command -v neonctl &> /dev/null; then
              npm install -g neonctl@2.15.0
            fi

            BRANCH_NAME="preview/${{ needs.prepare.outputs.job-ref }}"

            if neonctl branches list --project-id "$NEON_PROJECT_ID" --output json | jq -e ".[] | select(.name == \"$BRANCH_NAME\")" > /dev/null 2>&1; then
              echo "Branch $BRANCH_NAME already exists, resetting..."
              neonctl branches reset "$BRANCH_NAME" --project-id "$NEON_PROJECT_ID" --parent

              for i in {1..30}; do
                CURRENT_STATE=$(neonctl branches list --project-id "$NEON_PROJECT_ID" --output json | jq -r ".[] | select(.name == \"$BRANCH_NAME\") | .current_state")
                if [ "$CURRENT_STATE" = "ready" ]; then
                  echo "Branch reset complete"
                  break
                fi
                echo "Branch state: $CURRENT_STATE (attempt $i/30)"
                sleep 2
              done
            else
              echo "Creating branch $BRANCH_NAME"
              neonctl branches create --name "$BRANCH_NAME" --project-id "$NEON_PROJECT_ID"
            fi

            DATABASE_URL=$(neonctl connection-string "$BRANCH_NAME" --project-id "$NEON_PROJECT_ID" --database-name neondb --pooled)
            if [ -z "$DATABASE_URL" ]; then
              DATABASE_URL=$(neonctl connection-string "$BRANCH_NAME" --project-id "$NEON_PROJECT_ID" --database-name neondb)
            fi
            echo "$DATABASE_URL" > /tmp/neon-database-url

            cd turbo && DATABASE_URL="$DATABASE_URL" pnpm -F web db:migrate
            echo "Neon branch ready"
          ) > /tmp/neon-log 2>&1 &
          NEON_PID=$!

          # --- Build web in foreground ---
          echo "::group::Vercel Build"
          vercel build --token="$VERCEL_TOKEN"
          echo "::endgroup::"

          # --- Wait for Neon (child process, so wait works) ---
          echo "::group::Neon Branch"
          if ! wait $NEON_PID; then
            cat /tmp/neon-log
            echo "::error::Neon branch creation failed"
            exit 1
          fi
          cat /tmp/neon-log
          echo "::endgroup::"

          echo "database-url=$(cat /tmp/neon-database-url)" >> "$GITHUB_OUTPUT"

      # Step 4: Deploy prebuilt artifacts with database URL
      - name: Start deployment
        id: deployment
        uses: bobheadxi/deployments@v1
        with:
          step: start
          token: ${{ github.token }}
          env: web/preview/${{ github.head_ref || github.ref_name }}
          ref: ${{ github.head_ref && format('refs/heads/{0}', github.head_ref) || github.ref }}
          desc: Deploying preview environment

      - name: Deploy Web to Vercel
        id: deploy
        run: |
          DEPLOY_CMD="vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }}"
          DEPLOY_CMD="$DEPLOY_CMD --meta branch=${{ github.head_ref || github.ref_name }}"
          DEPLOY_CMD="$DEPLOY_CMD --meta pr=${{ needs.prepare.outputs.job-ref }}"

          while IFS= read -r line; do
            line=$(echo "$line" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
            if [ -n "$line" ]; then
              KEY="${line%%=*}"
              VALUE="${line#*=}"
              DEPLOY_CMD="$DEPLOY_CMD --env $KEY=\"$VALUE\""
            fi
          done <<< "$ENV_VARS"

          DEPLOYMENT_URL=$(eval $DEPLOY_CMD)
          echo "url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: $DEPLOYMENT_URL"
        env:
          ENV_VARS: |
            DATABASE_URL=${{ steps.neon.outputs.database-url }}
            BLOG_BASE_URL=${{ needs.prepare.outputs.web-preview-url }}
            CLERK_PUBLISHABLE_KEY=${{ vars.CLERK_PUBLISHABLE_KEY }}
            CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
            E2B_API_KEY=${{ secrets.E2B_API_KEY }}
            R2_ACCOUNT_ID=${{ vars.R2_ACCOUNT_ID }}
            R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
            R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            R2_USER_STORAGES_BUCKET_NAME=${{ vars.R2_USER_STORAGES_BUCKET_NAME }}
            SECRETS_ENCRYPTION_KEY=${{ secrets.SECRETS_ENCRYPTION_KEY }}
            OFFICIAL_RUNNER_SECRET=${{ secrets.OFFICIAL_RUNNER_SECRET }}
            AXIOM_TOKEN_SESSIONS=${{ secrets.AXIOM_TOKEN_SESSIONS }}
            AXIOM_TOKEN_TELEMETRY=${{ secrets.AXIOM_TOKEN_TELEMETRY }}
            AXIOM_DATASET_SUFFIX=dev
            USE_MOCK_CLAUDE=true
            CRON_SECRET=${{ secrets.CRON_SECRET }}
            ABLY_API_KEY=${{ secrets.ABLY_API_KEY }}
            CONCURRENT_RUN_LIMIT=0
            VM0_DEBUG=*
            CLAUDE_CODE_VERSION_URL=${{ vars.CLAUDE_CODE_VERSION_URL }}
            SLACK_CLIENT_ID=${{ vars.SLACK_CLIENT_ID }}
            SLACK_CLIENT_SECRET=${{ secrets.SLACK_CLIENT_SECRET }}
            SLACK_SIGNING_SECRET=${{ secrets.SLACK_SIGNING_SECRET }}
            SLACK_REDIRECT_BASE_URL=${{ needs.prepare.outputs.web-preview-url }}
            SLACK_DEFAULT_AGENT=${{ vars.SLACK_DEFAULT_AGENT }}
            SENTRY_DSN_WEB=${{ secrets.SENTRY_DSN_WEB }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ vars.SENTRY_ORG }}
            SENTRY_PROJECT=${{ vars.SENTRY_PROJECT_WEB }}
            GH_OAUTH_CLIENT_ID=${{ vars.GH_OAUTH_CLIENT_ID }}
            GH_OAUTH_CLIENT_SECRET=${{ secrets.GH_OAUTH_CLIENT_SECRET }}
            NOTION_OAUTH_CLIENT_ID=${{ vars.NOTION_OAUTH_CLIENT_ID }}
            NOTION_OAUTH_CLIENT_SECRET=${{ secrets.NOTION_OAUTH_CLIENT_SECRET }}
            GOOGLE_OAUTH_CLIENT_ID=${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
            GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
            MICROSOFT_OAUTH_CLIENT_ID=${{ vars.MICROSOFT_OAUTH_CLIENT_ID }}
            MICROSOFT_OAUTH_CLIENT_SECRET=${{ secrets.MICROSOFT_OAUTH_CLIENT_SECRET }}
            LINEAR_OAUTH_CLIENT_ID=${{ vars.LINEAR_OAUTH_CLIENT_ID }}
