  verify-production:
    needs: validate-production-ref
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.scope == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Fetch production Doppler OAuth config
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          auth-method: oidc
          doppler-identity-id: ${{ vars.DOPPLER_SERVICE_IDENTITY_ID }}
          doppler-project: vm0
          doppler-config: prd

      - name: Verify production OAuth config
        shell: bash
        env:
          DOPPLER_PROJECT: vm0
          DOPPLER_CONFIG: prd
          # Connector OAuth client ids and secrets passed to Vercel by
          # .github/actions/web-api-env/action.yml.
          AIRTABLE_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.AIRTABLE_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_AIRTABLE_OAUTH_CLIENT_ID: ${{ vars.AIRTABLE_OAUTH_CLIENT_ID }}
          AIRTABLE_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.AIRTABLE_OAUTH_CLIENT_SECRET }}
