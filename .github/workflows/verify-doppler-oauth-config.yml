          REPOSITORY_VAR_GH_OAUTH_CLIENT_ID: ${{ vars.GH_OAUTH_CLIENT_ID }}
          GH_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.GH_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.GOOGLE_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_GOOGLE_OAUTH_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.GOOGLE_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GUMROAD_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.GUMROAD_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_GUMROAD_OAUTH_CLIENT_ID: ${{ vars.GUMROAD_OAUTH_CLIENT_ID }}
          GUMROAD_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.GUMROAD_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_GUMROAD_OAUTH_CLIENT_SECRET: ${{ secrets.GUMROAD_OAUTH_CLIENT_SECRET }}
          AHREFS_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.AHREFS_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_AHREFS_OAUTH_CLIENT_ID: ${{ vars.AHREFS_OAUTH_CLIENT_ID }}
          AHREFS_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.AHREFS_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_AHREFS_OAUTH_CLIENT_SECRET: ${{ secrets.AHREFS_OAUTH_CLIENT_SECRET }}
          HUBSPOT_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.HUBSPOT_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_HUBSPOT_OAUTH_CLIENT_ID: ${{ vars.HUBSPOT_OAUTH_CLIENT_ID }}
          HUBSPOT_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.HUBSPOT_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_HUBSPOT_OAUTH_CLIENT_SECRET: ${{ secrets.HUBSPOT_OAUTH_CLIENT_SECRET }}
          INTERVALS_ICU_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.INTERVALS_ICU_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_INTERVALS_ICU_OAUTH_CLIENT_ID: ${{ vars.INTERVALS_ICU_OAUTH_CLIENT_ID }}
          INTERVALS_ICU_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.INTERVALS_ICU_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_INTERVALS_ICU_OAUTH_CLIENT_SECRET: ${{ secrets.INTERVALS_ICU_OAUTH_CLIENT_SECRET }}
          LINEAR_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.LINEAR_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_LINEAR_OAUTH_CLIENT_ID: ${{ vars.LINEAR_OAUTH_CLIENT_ID }}
          LINEAR_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.LINEAR_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_LINEAR_OAUTH_CLIENT_SECRET: ${{ secrets.LINEAR_OAUTH_CLIENT_SECRET }}
          NEON_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.NEON_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_NEON_OAUTH_CLIENT_ID: ${{ vars.NEON_OAUTH_CLIENT_ID }}
          NEON_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.NEON_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_NEON_OAUTH_CLIENT_SECRET: ${{ secrets.NEON_OAUTH_CLIENT_SECRET }}
          META_ADS_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.META_ADS_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_META_ADS_OAUTH_CLIENT_ID: ${{ vars.META_ADS_OAUTH_CLIENT_ID }}
          META_ADS_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.META_ADS_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_META_ADS_OAUTH_CLIENT_SECRET: ${{ secrets.META_ADS_OAUTH_CLIENT_SECRET }}
          MERCURY_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.MERCURY_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_MERCURY_OAUTH_CLIENT_ID: ${{ vars.MERCURY_OAUTH_CLIENT_ID }}
          MERCURY_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.MERCURY_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_MERCURY_OAUTH_CLIENT_SECRET: ${{ secrets.MERCURY_OAUTH_CLIENT_SECRET }}
          MICROSOFT_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.MICROSOFT_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_MICROSOFT_OAUTH_CLIENT_ID: ${{ vars.MICROSOFT_OAUTH_CLIENT_ID }}
          MICROSOFT_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.MICROSOFT_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_MICROSOFT_OAUTH_CLIENT_SECRET: ${{ secrets.MICROSOFT_OAUTH_CLIENT_SECRET }}
          MONDAY_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.MONDAY_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_MONDAY_OAUTH_CLIENT_ID: ${{ vars.MONDAY_OAUTH_CLIENT_ID }}
          MONDAY_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.MONDAY_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_MONDAY_OAUTH_CLIENT_SECRET: ${{ secrets.MONDAY_OAUTH_CLIENT_SECRET }}
          NOTION_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.NOTION_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_NOTION_OAUTH_CLIENT_ID: ${{ vars.NOTION_OAUTH_CLIENT_ID }}
          NOTION_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.NOTION_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_NOTION_OAUTH_CLIENT_SECRET: ${{ secrets.NOTION_OAUTH_CLIENT_SECRET }}
          POSTHOG_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.POSTHOG_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_POSTHOG_OAUTH_CLIENT_ID: ${{ vars.POSTHOG_OAUTH_CLIENT_ID }}
          POSTHOG_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.POSTHOG_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_POSTHOG_OAUTH_CLIENT_SECRET: ${{ secrets.POSTHOG_OAUTH_CLIENT_SECRET }}
          REDDIT_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.REDDIT_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_REDDIT_OAUTH_CLIENT_ID: ${{ vars.REDDIT_OAUTH_CLIENT_ID }}
          REDDIT_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.REDDIT_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_REDDIT_OAUTH_CLIENT_SECRET: ${{ secrets.REDDIT_OAUTH_CLIENT_SECRET }}
          SENTRY_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.SENTRY_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_SENTRY_OAUTH_CLIENT_ID: ${{ vars.SENTRY_OAUTH_CLIENT_ID }}
          SENTRY_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.SENTRY_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_SENTRY_OAUTH_CLIENT_SECRET: ${{ secrets.SENTRY_OAUTH_CLIENT_SECRET }}
          SLACK_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.SLACK_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_SLACK_OAUTH_CLIENT_ID: ${{ vars.SLACK_OAUTH_CLIENT_ID }}
          SLACK_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.SLACK_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_SLACK_OAUTH_CLIENT_SECRET: ${{ secrets.SLACK_OAUTH_CLIENT_SECRET }}
          SPOTIFY_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.SPOTIFY_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_SPOTIFY_OAUTH_CLIENT_ID: ${{ vars.SPOTIFY_OAUTH_CLIENT_ID }}
          SPOTIFY_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.SPOTIFY_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_SPOTIFY_OAUTH_CLIENT_SECRET: ${{ secrets.SPOTIFY_OAUTH_CLIENT_SECRET }}
          STRAVA_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.STRAVA_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_STRAVA_OAUTH_CLIENT_ID: ${{ vars.STRAVA_OAUTH_CLIENT_ID }}
          STRAVA_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.STRAVA_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_STRAVA_OAUTH_CLIENT_SECRET: ${{ secrets.STRAVA_OAUTH_CLIENT_SECRET }}
          STRIPE_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.STRIPE_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_STRIPE_OAUTH_CLIENT_ID: ${{ vars.STRIPE_OAUTH_CLIENT_ID }}
          STRIPE_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.STRIPE_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_STRIPE_OAUTH_CLIENT_SECRET: ${{ secrets.STRIPE_OAUTH_CLIENT_SECRET }}
          SUPABASE_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.SUPABASE_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_SUPABASE_OAUTH_CLIENT_ID: ${{ vars.SUPABASE_OAUTH_CLIENT_ID }}
          SUPABASE_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.SUPABASE_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_SUPABASE_OAUTH_CLIENT_SECRET: ${{ secrets.SUPABASE_OAUTH_CLIENT_SECRET }}
          TODOIST_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.TODOIST_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_TODOIST_OAUTH_CLIENT_ID: ${{ vars.TODOIST_OAUTH_CLIENT_ID }}
          TODOIST_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.TODOIST_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_TODOIST_OAUTH_CLIENT_SECRET: ${{ secrets.TODOIST_OAUTH_CLIENT_SECRET }}
          VERCEL_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.VERCEL_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_VERCEL_OAUTH_CLIENT_ID: ${{ vars.VERCEL_OAUTH_CLIENT_ID }}
