          REPOSITORY_SECRET_VERCEL_OAUTH_CLIENT_SECRET: ${{ secrets.VERCEL_OAUTH_CLIENT_SECRET }}
          WEBFLOW_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.WEBFLOW_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_WEBFLOW_OAUTH_CLIENT_ID: ${{ vars.WEBFLOW_OAUTH_CLIENT_ID }}
          WEBFLOW_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.WEBFLOW_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_WEBFLOW_OAUTH_CLIENT_SECRET: ${{ secrets.WEBFLOW_OAUTH_CLIENT_SECRET }}
          XERO_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.XERO_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_XERO_OAUTH_CLIENT_ID: ${{ vars.XERO_OAUTH_CLIENT_ID }}
          XERO_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.XERO_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_XERO_OAUTH_CLIENT_SECRET: ${{ secrets.XERO_OAUTH_CLIENT_SECRET }}
          X_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.X_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_X_OAUTH_CLIENT_ID: ${{ vars.X_OAUTH_CLIENT_ID }}
          X_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.X_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_X_OAUTH_CLIENT_SECRET: ${{ secrets.X_OAUTH_CLIENT_SECRET }}
          EXPECTED_KEYS: |
            AIRTABLE_OAUTH_CLIENT_ID
            AIRTABLE_OAUTH_CLIENT_SECRET
            ASANA_OAUTH_CLIENT_ID
            ASANA_OAUTH_CLIENT_SECRET
            CANVA_OAUTH_CLIENT_ID
            CANVA_OAUTH_CLIENT_SECRET
            CLOSE_OAUTH_CLIENT_ID
            CLOSE_OAUTH_CLIENT_SECRET
            DEEL_OAUTH_CLIENT_ID
