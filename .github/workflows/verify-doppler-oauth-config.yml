name: Verify Connector OAuth Doppler Config

on:
  pull_request:
  workflow_dispatch:
    inputs:
      scope:
        description: "OAuth config scope to verify"
        required: true
        type: choice
        options:
          - development
          - production
        default: development

jobs:
  validate-production-ref:
    if: github.event_name == 'workflow_dispatch' && inputs.scope == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    permissions:
      contents: read
    steps:
      - name: Require main branch
        shell: bash
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "::error::Run this workflow from the main branch"
            exit 1
          fi

  verify-development:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.scope == 'development') ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Fetch development Doppler OAuth config
        id: doppler
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          auth-method: oidc
          doppler-identity-id: ${{ vars.DOPPLER_SERVICE_IDENTITY_ID }}
          doppler-project: vm0
          doppler-config: dev

      - name: Verify development OAuth config
        shell: bash
        env:
          DOPPLER_PROJECT: vm0
          DOPPLER_CONFIG: dev
          # Connector OAuth client ids and secrets passed to Vercel by
          # .github/actions/web-api-env/action.yml.
          AIRTABLE_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.AIRTABLE_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_AIRTABLE_OAUTH_CLIENT_ID: ${{ vars.AIRTABLE_OAUTH_CLIENT_ID }}
          AIRTABLE_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.AIRTABLE_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_AIRTABLE_OAUTH_CLIENT_SECRET: ${{ secrets.AIRTABLE_OAUTH_CLIENT_SECRET }}
          ASANA_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.ASANA_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_ASANA_OAUTH_CLIENT_ID: ${{ vars.ASANA_OAUTH_CLIENT_ID }}
          ASANA_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.ASANA_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_ASANA_OAUTH_CLIENT_SECRET: ${{ secrets.ASANA_OAUTH_CLIENT_SECRET }}
          CANVA_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.CANVA_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_CANVA_OAUTH_CLIENT_ID: ${{ vars.CANVA_OAUTH_CLIENT_ID }}
          CANVA_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.CANVA_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_CANVA_OAUTH_CLIENT_SECRET: ${{ secrets.CANVA_OAUTH_CLIENT_SECRET }}
          CLOSE_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.CLOSE_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_CLOSE_OAUTH_CLIENT_ID: ${{ vars.CLOSE_OAUTH_CLIENT_ID }}
          CLOSE_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.CLOSE_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_CLOSE_OAUTH_CLIENT_SECRET: ${{ secrets.CLOSE_OAUTH_CLIENT_SECRET }}
          DEEL_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.DEEL_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_DEEL_OAUTH_CLIENT_ID: ${{ vars.DEEL_OAUTH_CLIENT_ID }}
          DEEL_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.DEEL_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_DEEL_OAUTH_CLIENT_SECRET: ${{ secrets.DEEL_OAUTH_CLIENT_SECRET }}
          DOCUSIGN_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.DOCUSIGN_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_DOCUSIGN_OAUTH_CLIENT_ID: ${{ vars.DOCUSIGN_OAUTH_CLIENT_ID }}
          DOCUSIGN_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.DOCUSIGN_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_DOCUSIGN_OAUTH_CLIENT_SECRET: ${{ secrets.DOCUSIGN_OAUTH_CLIENT_SECRET }}
          DROPBOX_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.DROPBOX_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_DROPBOX_OAUTH_CLIENT_ID: ${{ vars.DROPBOX_OAUTH_CLIENT_ID }}
          DROPBOX_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.DROPBOX_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_DROPBOX_OAUTH_CLIENT_SECRET: ${{ secrets.DROPBOX_OAUTH_CLIENT_SECRET }}
