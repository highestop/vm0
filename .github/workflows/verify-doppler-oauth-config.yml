          REPOSITORY_SECRET_ASANA_OAUTH_CLIENT_SECRET: ${{ secrets.ASANA_OAUTH_CLIENT_SECRET }}
          CANVA_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.CANVA_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_CANVA_OAUTH_CLIENT_ID: ${{ vars.CANVA_OAUTH_CLIENT_ID }}
          CANVA_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.CANVA_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_CANVA_OAUTH_CLIENT_SECRET: ${{ secrets.CANVA_OAUTH_CLIENT_SECRET }}
          CLOSE_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.CLOSE_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_CLOSE_OAUTH_CLIENT_ID: ${{ vars.CLOSE_OAUTH_CLIENT_ID }}
          CLOSE_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.CLOSE_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_CLOSE_OAUTH_CLIENT_SECRET: ${{ secrets.CLOSE_OAUTH_CLIENT_SECRET }}
          DEEL_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.DEEL_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_DEEL_OAUTH_CLIENT_ID: ${{ vars.DEEL_OAUTH_CLIENT_ID }}
          DEEL_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.DEEL_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_DEEL_OAUTH_CLIENT_SECRET: ${{ secrets.DEEL_OAUTH_CLIENT_SECRET }}
          DOCUSIGN_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.DOCUSIGN_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_DOCUSIGN_OAUTH_CLIENT_ID: ${{ vars.DOCUSIGN_OAUTH_CLIENT_ID }}
          DOCUSIGN_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.DOCUSIGN_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_DOCUSIGN_OAUTH_CLIENT_SECRET: ${{ secrets.DOCUSIGN_OAUTH_CLIENT_SECRET }}
          DROPBOX_OAUTH_CLIENT_ID: ${{ steps.doppler.outputs.DROPBOX_OAUTH_CLIENT_ID }}
          REPOSITORY_VAR_DROPBOX_OAUTH_CLIENT_ID: ${{ vars.DROPBOX_OAUTH_CLIENT_ID }}
          DROPBOX_OAUTH_CLIENT_SECRET: ${{ steps.doppler.outputs.DROPBOX_OAUTH_CLIENT_SECRET }}
          REPOSITORY_SECRET_DROPBOX_OAUTH_CLIENT_SECRET: ${{ secrets.DROPBOX_OAUTH_CLIENT_SECRET }}
