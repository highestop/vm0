# Deploy VM0 Runner (Rust)
#
# This playbook deploys a new version of the Rust-based VM0 runner to production
# metal instances. Each version gets its own bin dir and systemd service, allowing
# the old runner to drain gracefully while the new one starts accepting jobs.
#
# Usage:
#   ansible-playbook -i "host1,host2," playbooks/deploy-runner.yml \
#     -e "ansible_user=ubuntu" \
#     -e "official_runner_secret=xxx" \
#     -e "api_url=https://www.vm0.ai" \
#     -e "runner_version=0.3.0"
#
# Required Variables:
#   - runner_version: Semantic version of the runner being deployed
#   - official_runner_secret: Runner authentication secret
#   - api_url: vm0 API URL

- name: Deploy VM0 Runner
  hosts: all
  serial: 1

  vars:
    runner_name: "v{{ runner_version }}"
    runner_group: vm0/production
    vcpu: 2
    memory_mb: 1024
    max_concurrent: 8
    home_dir: "{{ ansible_facts['env']['HOME'] }}"
    bin_dir: "{{ home_dir }}/.vm0-runner/bin/{{ runner_name }}"
    runner_dir: "{{ home_dir }}/.vm0-runner/runners/{{ runner_name }}"

  tasks:
    # ========================================
    # Phase 0: Stop legacy TS runner
    # ========================================
    - name: List pm2 processes
      command: pm2 list
      changed_when: false
      ignore_errors: true

    - name: Stop pm2 daemon
      command: pm2 kill
      ignore_errors: true

    # ========================================
    # Phase 1: Deploy binaries
    # ========================================
    - name: Ensure bin directory exists
      file:
        path: "{{ bin_dir }}"
        state: directory
        mode: '0755'

    - name: Copy runner and guest binaries
      copy:
        src: "{{ item }}"
        dest: "{{ bin_dir }}/"
        mode: '0755'
      with_fileglob:
        - "{{ playbook_dir }}/../../crates/target/aarch64-unknown-linux-musl/release/runner"
        - "{{ playbook_dir }}/../../crates/target/aarch64-unknown-linux-musl/release/guest-init"
        - "{{ playbook_dir }}/../../crates/target/aarch64-unknown-linux-musl/release/guest-download"
        - "{{ playbook_dir }}/../../crates/target/aarch64-unknown-linux-musl/release/guest-agent"
        - "{{ playbook_dir }}/../../crates/target/aarch64-unknown-linux-musl/release/guest-mock-claude"

    # ========================================
    # Phase 2: Setup + Build
    # ========================================
    - name: Download dependencies (Firecracker, kernel, mitmproxy)
      command: "{{ bin_dir }}/runner setup"

    - name: Ensure kvm group membership
      user:
        name: "{{ ansible_user }}"
        groups: kvm
        append: true
      become: true

    - name: Build rootfs and snapshot
      command: >
        {{ bin_dir }}/runner build
        --guest-init {{ bin_dir }}/guest-init
        --guest-download {{ bin_dir }}/guest-download
        --guest-agent {{ bin_dir }}/guest-agent
        --guest-mock-claude {{ bin_dir }}/guest-mock-claude
        --vcpu {{ vcpu }}
        --memory-mb {{ memory_mb }}
      register: build_output

    - name: Parse build hashes
      set_fact:
        rootfs_hash: "{{ build_output.stdout_lines | select('match', '^rootfs_hash=') | first | regex_replace('^rootfs_hash=', '') }}"
        snapshot_hash: "{{ build_output.stdout_lines | select('match', '^snapshot_hash=') | first | regex_replace('^snapshot_hash=', '') }}"

    # ========================================
    # Phase 3: Configure + Install
    # ========================================
    - name: Generate runner config
      command: >
        {{ bin_dir }}/runner config
        --rootfs-hash {{ rootfs_hash }}
        --snapshot-hash {{ snapshot_hash }}
        --name {{ runner_name }}
        --group {{ runner_group }}
        --runner-dirname {{ runner_name }}
        --vcpu {{ vcpu }}
        --memory-mb {{ memory_mb }}
        --max-concurrent {{ max_concurrent }}
        --api-url {{ api_url }}
        --token vm0_official_{{ official_runner_secret }}

    - name: Install and start runner service
      command: >
        {{ bin_dir }}/runner service install
        --name {{ runner_name }}
        --config {{ runner_dir }}/runner.yaml

    # ========================================
    # Phase 4: Health check
    # ========================================
    - name: Verify runner health
      command: "{{ bin_dir }}/runner doctor"
      retries: 5
      delay: 10
      register: health
      until: health.rc == 0

    # ========================================
    # Phase 5: Drain old runners + Cleanup
    # ========================================
    - name: Find running runner services
      shell: >
        systemctl list-units 'vm0-runner-*.service' --state=running
        --plain --no-legend | awk '{print $1}'
        | sed 's/^vm0-runner-//;s/\.service$//'
      register: running_runners
      changed_when: false
      ignore_errors: true

    - name: Drain old runner services
      command: "{{ bin_dir }}/runner service drain --name {{ item }}"
      loop: "{{ running_runners.stdout_lines | default([]) }}"
      when: item != runner_name
      ignore_errors: true

    - name: Garbage collect old artifacts
      command: "{{ bin_dir }}/runner gc --keep-latest 3"

    # Kill orphan firecracker/mitmproxy processes left behind by crashed
    # runners or the legacy TS runner. Run after drain so we don't hit
    # processes that belong to the still-active old runner.
    - name: Find orphan firecracker processes
      command: pgrep -x firecracker
      register: orphan_fc
      changed_when: false
      failed_when: false

    - name: Kill orphan firecracker processes
      command: kill {{ orphan_fc.stdout_lines | join(' ') }}
      when: orphan_fc.stdout_lines | length > 0

    - name: Find orphan mitmproxy processes
      command: pgrep -x mitmdump
      register: orphan_mitm
      changed_when: false
      failed_when: false

    - name: Kill orphan mitmproxy processes
      command: kill {{ orphan_mitm.stdout_lines | join(' ') }}
      when: orphan_mitm.stdout_lines | length > 0
