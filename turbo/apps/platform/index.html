<!doctype html>
<html lang="en">
  <head>
    <title>VM0 App</title>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <script>
      // Inline theme detection — mirrors signals/theme.ts resolveTheme() + applyTheme()
      (function () {
        var p = localStorage.getItem("theme");
        var t =
          p === "dark" || p === "light"
            ? p
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.dataset.theme = t;
        if (t === "dark") document.documentElement.classList.add("dark");
      })();
    </script>
    <script type="module" src="/src/main.ts" defer></script>
    <script>
      function __initPlausible() {
        var url = "%VITE_PLAUSIBLE_SCRIPT_URL%";
        if (url && url.indexOf("plausible") !== -1) {
          var s = document.createElement("script");
          s.async = true;
          s.src = url;
          document.head.appendChild(s);
          ((window.plausible =
            window.plausible ||
            function () {
              (plausible.q = plausible.q || []).push(arguments);
            }),
            (plausible.init =
              plausible.init ||
              function (i) {
                plausible.o = i || {};
              }));
          plausible.init({
            transformRequest: function (payload) {
              payload.u = payload.u.replace(
                /\/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/gi,
                "/:id",
              );
              return payload;
            },
          });
        }
      }
      if (typeof requestIdleCallback === "function") {
        requestIdleCallback(__initPlausible, { timeout: 3000 });
      } else {
        setTimeout(__initPlausible, 100);
      }
    </script>
  </head>
  <body>
    <div id="root">
      <style>
        .sk {
          display: flex;
          height: 100dvh;
          background: #fdfdfe;
        }
        .sk-side {
          width: 300px;
          flex-shrink: 0;
          background: #fafbfc;
          border-right: 0.7px solid #dce1e8;
          padding: 16px;
          display: flex;
          flex-direction: column;
          gap: 12px;
        }
        .sk-bar {
          height: 32px;
          border-radius: 8px;
          background: #e7ebf0;
          animation: sk-pulse 2s ease-in-out infinite;
        }
        .sk-content {
          flex: 1;
          background: #fdfdfe;
        }
        @keyframes sk-pulse {
          0%,
          100% {
            opacity: 1;
          }
          50% {
            opacity: 0.4;
          }
        }
        [data-theme="dark"] .sk {
          background: #19191b;
        }
        [data-theme="dark"] .sk-side {
          background: hsl(240 5% 8%);
          border-color: #292a2e;
        }
        [data-theme="dark"] .sk-bar {
          background: #222325;
        }
        [data-theme="dark"] .sk-content {
          background: #19191b;
        }
        @media (max-width: 767px) {
          .sk-side {
            display: none;
          }
        }
      </style>
      <div class="sk">
        <aside class="sk-side">
          <div class="sk-bar"></div>
          <div class="sk-bar" style="margin-top: 8px"></div>
          <div class="sk-bar"></div>
          <div class="sk-bar"></div>
          <div class="sk-bar"></div>
        </aside>
        <div class="sk-content"></div>
      </div>
    </div>
    <script
      src="https://api.dashboard.instatus.com/widget?host=status.vm0.ai&code=02c0ef5a&locale=en"
      integrity="sha384-PeueJ613SmtgegJQz/JL0K6uh1Q5Q4os+b/FZsvK9GoMFvyFlyBv8FiP62B3rilT"
      crossorigin="anonymous"
      defer
    ></script>
  </body>
</html>
