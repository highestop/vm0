    <script>
      // Inline theme detection — mirrors signals/theme.ts resolveTheme() + applyTheme()
      (function () {
        var p = localStorage.getItem("theme");
        var t =
          p === "dark" || p === "light"
            ? p
            : window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        document.documentElement.dataset.theme = t;
        if (t === "dark") document.documentElement.classList.add("dark");
      })();
    </script>
    <script type="module" src="/src/main.ts" defer></script>
    <script>
      function __initPlausible() {
        var url = "%VITE_PLAUSIBLE_SCRIPT_URL%";
        if (url && url.indexOf("plausible") !== -1) {
          var s = document.createElement("script");
          s.async = true;
          s.src = url;
          document.head.appendChild(s);
          ((window.plausible =
            window.plausible ||
            function () {
              (plausible.q = plausible.q || []).push(arguments);
            }),
            (plausible.init =
              plausible.init ||
              function (i) {
                plausible.o = i || {};
              }));
          plausible.init({
            transformRequest: function (payload) {
              payload.u = payload.u.replace(
                /\/[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}/gi,
                "/:id",
              );
              return payload;
            },
          });
        }
      }
      if (typeof requestIdleCallback === "function") {
        requestIdleCallback(__initPlausible, { timeout: 3000 });
      } else {
        setTimeout(__initPlausible, 100);
      }
    </script>
