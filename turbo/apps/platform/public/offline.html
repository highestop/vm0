<!doctype html>
<html lang="en">
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zero — Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      background: #fafafa;
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #171717;
    }
    .card {
      text-align: center;
      padding: 40px 32px;
      max-width: 360px;
    }
    .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 24px;
      border-radius: 16px;
      background: #171717;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #fafafa;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #737373;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    button {
      display: inline-block;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      color: #fafafa;
      background: #171717;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #404040;
    }
    .status {
      margin-top: 16px;
      font-size: 12px;
      color: #a3a3a3;
    }
  </style>

  <div class="card">
    <div class="icon">Z</div>
    <h1>No internet connection</h1>
    <p>
      Check your connection and try again. You&rsquo;ll be right back where you
      left off.
    </p>
    <button id="retry">Retry</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const btn = document.getElementById("retry");
    const status = document.getElementById("status");

    btn.addEventListener("click", () => {
      status.textContent = "Reconnecting…";
      location.reload();
    });

    async function tryReconnect() {
      try {
        // Use a timestamped URL to bypass the service worker cache,
        // since cached paths like /favicon.ico would falsely signal
        // connectivity even when offline.
        await fetch("/?_t=" + Date.now(), { cache: "no-store" });
        location.reload();
      } catch (_) {
        // still offline
      }
    }

    // Reload the original URL when connectivity returns.
    addEventListener("online", () => {
      status.textContent = "Reconnecting…";
      tryReconnect();
    });
  </script>
</html>
